판사장은 그 점에 대해 더 이상 묻지 않겠다고 하면서 검사에게 더 물을 것이 있는지 물었다.\n검사는 반쯤 등을 돌린 채 나를 보지 않고, 판사장의 허락을 받아 샘물로 혼자 돌아간 것이 아랍인을 죽이려는 의도에서였냐고 묻고 싶다고 했다.\n\"아니요\"라고 했다. \"그러면 왜 무장하고 있었으며 왜 하필 그 장소로 돌아갔습니까?\" 우연이었다고 했다. 검사는 심술궂은 어조로 \"지금은 이것으로 충분합니다\"라고 메모했다.\n그다음은 조금 뒤죽박죽이었다. 적어도 나에게는. 하지만 몇 차례 협의가 있은 후 판사장은 오후에 증인 심문을 위해 공판을 연기한다고 선언했다.\n생각할 틈도 없었다. 데려가서 호송차에 태워 교도소로 돌아왔고 밥을 먹었다.\n아주 짧은 시간이 지나 — 내가 피곤하다는 것을 겨우 알아챌 만큼 — 다시 데리러 왔다.\n모든 것이 다시 시작됐고 같은 방, 같은 얼굴들 앞에 있게 됐다.\n다만 열기가 훨씬 강해져 있었고 기적처럼 배심원 모두, 검사, 변호사, 몇몇 기자들이 짚으로 만든 부채를 들고 있었다.\n젊은 기자와 작은 여자는 여전히 거기 있었다. 부채질을 하지 않고 여전히 말없이 나를 바라보고 있었다.\n얼굴에 땀을 닦았다. 양로원 원장이 불렸을 때 비로소 장소와 나 자신에 대한 감각을 조금 되찾았다.\n엄마가 나에 대해 불평을 했냐는 질문에 그는 했다고 했지만 입소자들이 가까운 사람에게 불평하는 것은 어느 정도 버릇 같은 것이라고 했다.\n판사장은 엄마가 나를 양로원에 보낸 것을 원망했냐고 더 물었다. 원장은 또 그렇다고 했다. 하지만 이번에는 아무것도 덧붙이지 않았다.\n다른 질문에 그는 장례식 날 내 침착함에 놀랐다고 했다. 침착함이 무슨 의미냐는 질문에 원장은 구두 끝을 바라보더니 내가 엄마를 보지 않으려 했고, 한 번도 울지 않았으며, 장례가 끝나자마자 무덤 앞에 잠시 서 있지도 않고 떠났다고 했다.\n또 한 가지가 놀라웠다고 했다. 장의사 직원이 내가 엄마의 나이를 몰랐다고 했다는 것이었다.\n잠시 침묵이 흘렀고 판사장이 지금 얘기한 것이 정말 나에 관한 것이냐고 물었다. 원장이 질문을 이해하지 못하자 판사장이 \"그것이 법입니다\"라고 했다.\n그런 다음 판사장은 검찰 측에 증인에게 더 물을 것이 있는지 물었다.\n검사는 \"아, 아닙니다. 충분합니다\"라고 아주 큰 소리와 함께 나를 향해 승리의 눈빛을 던지며 외쳤다.\n수년 만에 처음으로 나는 울고 싶다는 어리석은 충동을 느꼈다. 이 모든 사람들이 얼마나 나를 미워하는지 느꼈기 때문이었다.\n판사장이 배심단과 변호사에게 질문이 있는지 묻고 나서 수위를 심문했다. 그와 다른 모든 사람들에게 같은 절차가 반복됐다.\n들어오면서 수위는 나를 바라보다가 눈을 돌렸다. 질문들에 대답했다. 내가 엄마를 보지 않으려 했고, 담배를 피웠고, 잠을 잤고, 카페오레를 마셨다고 했다.\n그때 방청석 전체를 뒤흔드는 무언가가 느껴졌다. 처음으로 내가 유죄라는 것을 이해했다. 수위에게 카페오레와 담배 이야기를 다시 말하게 했다.\n검사가 아이러니한 빛을 담아 나를 바라보았다. 그때 변호사가 수위에게 자신도 나와 함께 담배를 피우지 않았냐고 물었다.\n하지만 검사는 이 질문에 격렬하게 반발했다. \"이 자리의 범죄자가 누구입니까. 그리고 기소 측 증인들을 흠집 내어 부정할 수 없는 증언을 축소하려는 이 방식은 무엇입니까!\"\n그래도 판사장은 수위에게 질문에 대답하라고 했다. 노인은 당황한 표정으로 말했다.\n\"제가 잘못한 것을 압니다. 하지만 이 분이 권하신 담배를 감히 거절하지 못했어요.\" 마지막으로 내게 덧붙일 말이 있는지 물었다. \"없습니다\"라고 했다.\n\"다만 증인의 말이 맞습니다. 사실 제가 담배를 권했습니다.\" 수위는 그때 약간 놀란 표정과 함께 일종의 감사함을 담아 나를 바라보았다.\n망설이다가 카페오레를 권한 것은 자신이라고 했다. 변호사가 시끄럽게 승리를 선언하며 배심원들이 이것을 평가할 것이라고 했다.\n하지만 검사가 우리 머리 위에서 천둥을 쳤다. \"그렇습니다, 배심원 여러분은 평가할 것입니다. 그리고 다음과 같은 결론을 내릴 것입니다. 이방인은 커피를 권할 수 있지만, 아들은 자신을 세상에 낳아준 자의 시신 앞에서 거절했어야 합니다.\"\n수위는 자기 자리로 돌아갔다.\n토마 페레가 출석할 차례가 됐을 때 집행관이 증인대까지 부축해야 했다.\n페레는 주로 내 어머니를 알았고 나는 장례식 날 딱 한 번 봤을 뿐이라고 했다.\n그날 내가 어떻게 했냐는 질문에 그는 대답했다. \"아시다시피 저 자신도 너무 슬펐어요. 그래서 아무것도 못 봤어요. 슬픔이 보는 것을 방해했거든요. 저한테는 정말 크나큰 슬픔이었으니까요. 그리고 저는 기절까지 했어요. 그래서 이 분을 볼 수 없었습니다.\"\n검사가 적어도 내가 우는 것을 봤냐고 물었다. 페레는 못 봤다고 했다. 검사는 다시 말했다. \"배심원 여러분은 평가할 것입니다.\"\n하지만 변호사가 화를 냈다. 과장된 어조로 느껴졌지만 페레에게 내가 울지 않는 것을 봤냐고 물었다. 페레는 \"아니요\"라고 했다. 방청석에서 웃음이 났다.\n변호사는 소매를 걷어 올리며 단호하게 선언했다. \"이것이 이 재판의 단면입니다. 모든 것이 사실이고 아무것도 사실이 아닙니다!\"\n검사는 굳은 표정으로 파일 표지에 연필을 찌르고 있었다.\n오 분 정지 후 변호사가 모든 것이 잘 되고 있다고 했다. 그런 다음 변호인 측이 신청한 셀레스트가 증언했다.\n변호인 측이 나였다. 셀레스트는 이따금 내 쪽을 바라보며 파나마모자를 두 손으로 돌리고 있었다.\n그는 어떤 일요일에 나와 함께 경마를 보러 갈 때 입던 새 양복을 입고 있었다.\n하지만 깃을 달 수 없었던 것 같았다. 셔츠를 닫기 위해 구리 단추 하나만 달고 있었다.\n내 단골 손님이냐는 질문에 \"그렇습니다, 하지만 친구이기도 했어요\"라고 했다. 나를 어떻게 생각하냐는 질문에 \"사람답다\"고 했다.\n그 말의 의미가 뭐냐는 질문에 \"다들 그 말이 무슨 뜻인지 알잖아요\"라고 했다.\n내가 말수가 적다는 것을 알아챘냐는 질문에 그는 내가 쓸데없는 말을 하지 않는다고만 인정했다. 검사가 내가 식사비를 제때 냈냐고 물었다.\n셀레스트는 웃으며 \"그런 것은 우리끼리 알아서 하는 일이에요\"라고 했다. 내 범죄에 대해 어떻게 생각하냐는 질문이 들어왔다.\n그는 두 손을 증인대에 올려놓았고 무언가를 준비했다는 것이 보였다. 그는 말했다.\n\"제 생각에는 불행한 일입니다. 불행이 뭔지는 다 아시죠. 그것이 사람을 속수무책으로 만드는 거예요. 그래서 저한테는 불행한 일입니다.\"\n계속 하려는데 판사장이 그것으로 충분하고 감사하다고 했다. 셀레스트는 잠시 어리둥절했다. 하지만 더 말하고 싶다고 했다. 간략하게 해달라고 했다.\n그는 다시 불행한 일이라고 했다. 판사장이 \"알겠습니다. 하지만 우리는 그런 불행들을 재판하기 위해 있습니다. 감사합니다\"라고 했다.\n자신의 지식과 선의의 끝에 닿은 것처럼 셀레스트는 나를 돌아보았다. 눈이 빛나고 입술이 떨리는 것 같았다.\n내게 무엇을 더 할 수 있는지 묻는 것 같았다. 나는 아무 말도 하지 않았고 아무 몸짓도 하지 않았다.\n하지만 그것이 살면서 처음으로 남자를 껴안고 싶다고 느낀 순간이었다. 판사장이 다시 증인대를 떠나라고 했다. 셀레스트는 방청석으로 가 앉았다.\n나머지 심리 내내 거기서 조금 앞으로 기울어 팔꿈치를 무릎 위에 올리고 파나마모자를 두 손에 든 채 이야기되는 것들을 귀 기울여 들었다.\n마리가 들어왔다. 모자를 쓰고 있었고 여전히 아름다웠다. 하지만 머리를 풀었을 때가 더 좋았다.\n내 자리에서 가슴의 가벼운 무게가 짐작됐고 늘 조금 부어 있는 아랫입술을 알아볼 수 있었다. 몹시 긴장해 보였다.\n바로 나를 언제부터 알았냐는 질문을 받았다. 우리 사무실에서 일하던 시절이라고 했다. 판사장은 나와의 관계가 어떠냐고 알고 싶어했다. 친구라고 했다.\n다른 질문에 나와 결혼할 예정이었다는 것이 맞다고 대답했다. 파일을 넘기던 검사가 갑자기 우리 관계가 언제 시작됐냐고 물었다. 날짜를 말했다.\n검사는 무관심한 표정으로 엄마의 사망 다음 날인 것 같다고 했다.\n그런 다음 약간 아이러니하게 민감한 상황을 굳이 다루고 싶지 않고 마리의 거리낌을 이해하지만 (그리고 여기서 그의 어조가 더 단호해졌다) 그의 직무는 관례 위에 서야 한다고 했다.\n그래서 마리에게 그날을 요약해달라고 했다. 마리는 말하고 싶지 않았지만 검사의 집요함에 우리의 수영, 영화 외출, 내 집으로의 귀가를 말했다.\n검사는 마리의 수사 진술을 검토하고 그 날짜의 상영 프로그램을 확인했다고 했다. 마리 자신이 어떤 영화가 상영됐는지 말할 것이라고 덧붙였다.\n거의 하얗게 질린 목소리로 그녀는 페르낭델 영화라고 했다. 그녀가 말을 마쳤을 때 방청석이 완전히 조용했다.\n검사는 일어서더니 아주 무겁게, 내가 정말 감동받았다고 느낀 목소리로, 손가락을 나를 향해 내밀며 천천히 또렷이 말했다.\n\"배심원 여러분, 어머니가 돌아가신 다음 날 이 남자는 수영을 하고, 문란한 관계를 시작하고, 코미디 영화를 보며 웃었습니다. 더 드릴 말씀이 없습니다.\"\n그는 앉았다. 여전히 침묵 속에서. 하지만 갑자기 마리가 울음을 터뜨리며 그런 것이 아니라고, 다른 것이 있다고, 자신이 생각하는 것과 반대로 말하도록 강요받고 있다고, 나를 잘 안다고, 내가 잘못한 것이 없다고 했다.\n하지만 집행관이 판사장의 신호에 그녀를 데려갔고 심리가 계속됐다.\n그다음에는 마송이 나는 정직한 사람이고 \"더 말하자면, 좋은 사람\"이라고 한 것을 거의 듣지 않았다.\n살라마노가 내가 자신의 개에게 잘 해주었다고 하고, 엄마와 나에 대한 질문에 내가 엄마와 더 이상 할 말이 없어서 그 이유로 양로원에 보냈다고 말했을 때도 거의 듣지 않았다.\n\"이해해야 합니다\"라고 살라마노가 말했다. \"이해해야 해요.\" 하지만 아무도 이해하는 것 같지 않았다. 그를 데려갔다.\n마지막 증인인 레몽의 차례가 됐다. 레몽이 내게 작은 신호를 보내고 바로 내가 무죄라고 했다.\n하지만 판사장은 의견을 묻는 것이 아니라 사실을 묻는다고 했다. 질문을 기다려 대답하라고 했다. 피해자와의 관계를 명확하게 설명하라는 요청이 들어왔다.\n레몽은 이 기회를 이용해 피해자가 자신을 미워한 것은 자신이 그의 누이를 때렸기 때문이라고 했다.\n하지만 판사장은 피해자가 나를 미워할 이유가 없었냐고 물었다. 레몽은 내가 해변에 있었던 것은 우연이었다고 했다.\n검사는 사건의 발단이 된 편지를 내가 쓴 것이 어떻게 된 것이냐고 물었다. 레몽은 우연이라고 했다.\n검사는 이 이야기에서 우연이 이미 많은 죄를 지고 있다고 받아쳤다.\n레몽이 피해자의 정부를 때릴 때 내가 개입하지 않은 것도 우연이냐고, 경찰서에서 증인이 된 것도 우연이냐고, 그 증언이 순전한 편의에서 비롯됐다는 것이 밝혀진 것도 우연이냐고 묻고 싶다고 했다.\n마지막으로 레몽의 생계 수단을 묻고 \"창고 관리인\"이라는 대답을 듣자 검사는 배심원들에게 이 증인은 일반적으로 알려진 대로 포주 직업을 갖고 있다고 선언했다.\n나는 그의 공범이고 친구였다. 이 사건은 최하류의 추잡한 범죄였고 도덕적 괴물을 상대하고 있다는 사실로 인해 더 가중됐다.\n레몽이 반박하려 했고 변호사가 항의했지만 검사가 말을 마치도록 해야 한다는 말이 돌아왔다. 검사가 말했다. \"덧붙일 말이 별로 없습니다. 당신의 친구였습니까?\"\n레몽에게 물었다. \"그렇습니다, 제 친구였죠\"라고 레몽이 대답했다. 검사가 나에게 같은 질문을 했다. 나는 눈을 돌리지 않은 레몽을 바라보았다. \"그렇습니다\"라고 했다.\n검사가 배심단을 향해 돌아서서 선언했다. \"어머니의 죽음 다음 날 가장 수치스러운 방탕에 빠진 이 남자가 사소한 이유로, 그리고 용납할 수 없는 풍기 문란 사건을 처리하기 위해 살인을 저질렀습니다.\"\n그러자 변호사가 참지 못하고 팔을 들어 올리며 소매가 내려가 풀 먹인 셔츠의 주름을 드러내며 외쳤다.\n\"그래서 그는 어머니를 묻은 죄로 기소된 겁니까, 사람을 죽인 죄로 기소된 겁니까?\" 방청석에서 웃음이 났다.\n하지만 검사가 다시 일어나 법복을 두르고 변명의 여지없이 그 두 가지 사실 사이에 깊은, 절절한, 본질적인 관계가 있다고 느끼지 못하는 것은 변호인의 순진함이라고 했다.\n\"그렇습니다\"라고 그는 강하게 외쳤다. \"나는 이 남자가 범죄자의 마음으로 어머니를 묻었다고 기소합니다.\" 이 선언은 방청석에 상당한 효과를 일으킨 것 같았다.\n변호사는 어깨를 으쓱하고 이마의 땀을 닦았다. 하지만 그 자신도 흔들린 것 같았고 일이 나에게 불리하게 돌아가고 있다는 것을 이해했다.\n공판이 종료됐다. 법원을 나와 호송차에 오르면서 나는 잠깐이나마 여름 저녁의 냄새와 빛깔을 알아챘다.\n달리는 교도소의 어둠 속에서 피로의 깊은 곳에서처럼 하나씩, 내가 좋아했던 도시의 낯익은 소리들과 내가 행복하다고 느꼈던 그 어떤 시간이 되살아났다.\n이미 풀려 있는 공기 속 신문 팔이의 외침, 광장의 마지막 새들, 샌드위치 파는 사람들의 소리, 도시의 높은 커브 길에서 전차의 울부짖음, 밤이 항구로 기울기 전 하늘의 웅얼거림.\n이 모든 것이 교도소에 들어오기 전에 잘 알았던 눈먼 자의 경로를 나를 위해 다시 그려냈다. 그렇다.\n아주 오래전에 행복하다고 느꼈던 그 시간이었다. 그때 나를 기다리던 것은 언제나 가볍고 꿈 없는 잠이었다. 그런데 무언가가 달라져 있었다.\n내일에 대한 기다림과 함께 다시 찾아온 것은 내 감방이었다. 마치 여름 하늘에 새겨진 낯익은 길들이 교도소로도, 순수한 잠으로도 똑같이 이어질 수 있는 것처럼.";

T[9]="피고석에 앉아 있어도 자기 자신에 대한 이야기를 듣는 것은 언제나 흥미롭다.\n검사와 변호사의 최후 변론 동안 나에 대한 이야기가 많이 나왔다. 어쩌면 내 범죄보다 나 자신에 대한 이야기가 더 많았을 것이다.\n그런데 두 변론이 그렇게 다른 것이었을까. 변호사는 팔을 들어 올리며 유죄를 주장했다. 단 변명을 곁들여.\n검사는 두 손을 내밀며 유죄를 지적했다. 단 변명 없이. 그래도 한 가지가 막연하게 불편했다.\n여러 생각이 있었음에도 가끔 끼어들고 싶었고 변호사는 \"조용히 하세요. 사건에 더 유리합니다\"라고 했다.\n어떤 의미에서 이 사건은 나 없이 처리되는 것 같았다. 모든 것이 내 개입 없이 진행됐다.\n내 운명이 내 의사와 무관하게 결정됐다. 이따금 모두를 가로막고 싶었다.\n\"그래도 피고가 누구입니까? 피고라는 것은 중요한 일이에요. 저도 할 말이 있어요.\" 하지만 생각해보니 할 말이 없었다.\n게다가 사람들의 관심을 끄는 데서 찾는 흥미는 오래 가지 않는다는 것을 인정해야 한다. 예를 들어 검사의 변론은 아주 빨리 지루해졌다.\n전체에서 분리된 단편들, 몸짓들, 아니면 완전한 일부 대목들만이 나를 인상시키거나 흥미를 불러일으켰다.\n내가 제대로 이해했다면 그의 생각의 핵심은 내가 범행을 계획했다는 것이었다. 적어도 그것을 증명하려 했다.\n그 자신의 말대로: \"여러분, 저는 그것을 증명해 보이겠습니다. 이중으로 증명하겠습니다. 먼저 사실의 눈부신 명백함으로, 그리고 이 범죄적 영혼의 심리가 제공하는 어두운 조명으로.\"\n그는 엄마의 죽음에서부터 사실을 요약했다. 나의 무감각함, 엄마의 나이를 몰랐던 것, 다음 날 한 여자와의 수영, 영화, 페르낭델, 마지막으로 마리와 함께 집으로 돌아온 것을 상기시켰다.\n그 순간 그가 \"그의 정부\"라고 했기 때문에 이해하는 데 시간이 걸렸다. 나에게는 마리였으니까. 그런 다음 레몽의 이야기로 넘어갔다.\n사건을 보는 그의 방식은 나름의 명확함이 있다고 생각했다. 그가 하는 말은 그럴듯했다.\n나는 레몽과 공모하여 그의 정부를 유혹하고 \"도덕적으로 수상한\" 남자의 학대에 내맡기기 위해 편지를 썼다. 해변에서 레몽의 적들을 자극했다.\n레몽이 부상을 입었다. 내가 권총을 달라고 했다. 그것을 사용하기 위해 혼자 돌아왔다. 계획한 대로 아랍인을 쐈다. 기다렸다.\n그리고 \"일이 제대로 됐는지 확인하기 위해\" 네 발을 더 쐈다. 차분하게, 확실하게, 어떤 의미에서 숙고된 방식으로.\n\"이상입니다, 여러분\"이라고 검사가 말했다. \"저는 이 남자가 완전히 의식하면서 살인을 저지르게 된 사건들의 실을 여러분 앞에 펼쳐 보였습니다. 이 점을 강조합니다. 왜냐하면 이것은 평범한 살인이 아니기 때문입니다. 여러분이 정황에 의해 완화되었다고 볼 수 있는 충동적인 행위가 아닙니다. 이 남자는, 여러분, 이 남자는 지능적입니다. 들으셨지요? 그는 대답할 줄 압니다. 말의 가치를 압니다. 자신이 하는 일을 알면서도 행동했다고 말할 수 없습니다.\"\n나는 귀를 기울이며 지능적이라는 평가를 들었다. 하지만 평범한 사람의 자질이 어떻게 피고인에게 불리한 무거운 혐의가 될 수 있는지 잘 이해하지 못했다.\n적어도 그것이 나를 놀라게 했고 나는 검사의 말을 더 이상 듣지 않다가 이런 말이 들렸다.\n\"그가 후회를 표한 적이 있었습니까? 없습니다, 여러분. 수사 과정에서 단 한 번도 이 남자는 자신의 가증스러운 범행에 동요한 것처럼 보인 적이 없었습니다.\"\n그때 그는 나를 향해 돌아서서 손가락으로 나를 지목하며 내가 왜인지 잘 이해할 수 없는 방식으로 계속 나를 몰아붙였다.\n물론 그의 말이 맞다는 것을 인정하지 않을 수 없었다. 내 행동을 그다지 후회하지 않았다. 하지만 그렇게 집요한 것이 놀라웠다.\n한 번 따뜻하게, 거의 다정하게 이야기해서 내가 진심으로 무언가를 후회한 적이 결코 없었다는 것을 설명하고 싶었다.\n나는 언제나 앞으로 일어날 일에, 오늘이나 내일에 붙잡혀 있었다. 하지만 물론 내가 처한 상태에서 그런 어조로 아무에게도 말할 수 없었다.\n다정하게 굴거나 선의를 보일 권리가 없었다. 검사가 내 영혼 이야기를 꺼냈기 때문에 다시 귀를 기울이려 했다.\n그는 영혼에 몸을 기울여 들여다보았지만 아무것도 찾지 못했다고 했다, 여러분.\n사실 나에게는 영혼이 없으며, 인간적인 것은 아무것도, 사람들의 마음을 지키는 도덕적 원칙들 중 어떤 것도 나에게는 닿을 수 없다고 했다.\n\"물론\"이라고 그는 덧붙였다. \"그것을 그에게 탓할 수는 없습니다. 그가 가질 수 없는 것이니 그것이 없다고 우리가 불평할 수 없습니다. 하지만 이 법원에서 관용이라는 온전히 소극적인 덕목은 더 어렵지만 더 높은 정의라는 덕목으로 바뀌어야 합니다. 특히 이 남자에게서 발견되는 마음의 공허가 사회가 잠길 수 있는 심연이 될 때는.\"\n그때 엄마에 대한 내 태도를 이야기했다. 심리 중에 했던 말을 반복했다. 하지만 내 범죄를 이야기할 때보다 훨씬 길었다.\n너무 길어서 결국 그 아침의 열기밖에 느끼지 못했다. 적어도 검사가 멈추고 잠시 침묵 후 아주 낮고 깊이 스민 목소리로 다시 말할 때까지.\n\"이 같은 법원이 내일 가장 끔찍한 범죄를 재판할 것입니다. 아버지를 살해한 죄를.\" 그에 따르면 그 무시무시한 범행 앞에서 상상력도 움츠러들었다.\n인간의 정의가 흔들림 없이 응징하길 감히 바랐다. 하지만 그 범죄가 자신에게 불러일으키는 공포가 나의 무감각 앞에서 느끼는 공포에 거의 미치지 못한다고 두려움 없이 말하겠다고 했다.\n그의 생각으로는 도덕적으로 어머니를 죽인 사람은 자신을 세상에 낳아준 자에게 살인의 손을 뻗은 사람과 같은 의미에서 인간 사회에서 스스로를 단절시키는 것이었다.\n어쨌든 전자는 후자의 행위들을 준비하고, 어떤 의미에서 예고하고, 정당화한다. \"저는 확신합니다, 여러분\"이라고 그는 목소리를 높이며 덧붙였다.\n\"제 생각이 너무 대담하다고는 여기지 않으실 것입니다. 이 피고석에 앉아 있는 남자가 내일 이 법원이 재판하게 될 살인의 죄도 있다고 말한다면. 그에 걸맞은 처벌을 받아야 합니다.\"\n그때 검사는 땀으로 빛나는 얼굴을 닦았다. 마지막으로 자신의 임무가 고통스럽지만 단호하게 수행하겠다고 했다.\n내가 가장 본질적인 규칙들을 무시하는 사회와는 아무 상관이 없으며 기본적인 반응조차 알지 못하는 그 인간적인 마음에 호소할 수도 없다고 선언했다.\n\"이 사람의 목을 요구합니다. 그것을 가벼운 마음으로 요구합니다. 이미 긴 경력 동안 사형을 구형한 적이 있었지만, 오늘처럼 이 무거운 의무가 거역할 수 없고 신성한 명령의 의식에 의해, 그리고 괴물적인 것 외에는 아무것도 읽히지 않는 어떤 인간의 얼굴 앞에서 내가 느끼는 공포에 의해 보상받고, 균형 잡히고, 밝혀진다고 느낀 적이 없었습니다.\"\n검사가 자리에 앉자 꽤 긴 침묵이 흘렀다. 나는 열기와 놀라움에 어지러웠다.\n판사장이 조금 기침을 하고 아주 낮은 목소리로 덧붙일 말이 없냐고 물었다.\n나는 일어섰고 말하고 싶었기 때문에 조금 되는 대로 아랍인을 죽이려는 의도가 없었다고 했다.\n판사장은 그것은 주장에 불과하다고, 지금까지 나의 변호 논리를 잘 파악하지 못했다고, 변호사의 진술을 듣기 전에 내 행동을 이끈 동기를 좀 더 명확하게 말해주면 좋겠다고 했다.\n빠르게, 말이 조금 뒤섞이고 자신이 우스꽝스럽다는 것을 알면서 햇볕 때문이었다고 했다. 방청석에서 웃음이 났다. 변호사는 어깨를 으쓱했다.\n바로 그에게 발언권이 주어졌다. 하지만 그는 늦었고 몇 시간이 걸릴 것이기 때문에 오후로 연기를 요청한다고 했다. 재판부가 동의했다.\n오후에도 커다란 선풍기들이 여전히 방 안의 탁한 공기를 저었고 배심원들의 형형색색 작은 부채들이 모두 같은 방향으로 움직였다.\n변호사의 변론은 끝날 것 같지 않았다. 그래도 한 순간 귀를 기울였다. \"사실 제가 죽였습니다\"라고 그가 말했기 때문이었다.\n그런 다음 같은 어조로 나에 대해 말할 때마다 \"나\"라고 하면서 계속했다. 몹시 놀라웠다. 옆 헌병에게 몸을 기울여 왜냐고 물었다.\n조용히 하라고 했다가 잠시 후 덧붙였다. \"모든 변호사들이 그렇게 해요.\"\n그것이 사건에서 나를 더 밀어내고, 나를 아무것도 아닌 존재로 만들고, 어떤 의미에서 나를 대신하는 것이라고 생각했다.\n하지만 나는 이미 이 법정에서 아주 멀리 있는 것 같았다. 게다가 변호사는 우스꽝스럽게 느껴졌다.\n그는 자극을 아주 빠르게 다루고 나서 역시 내 영혼 이야기를 했다. 하지만 검사보다 재능이 훨씬 덜해 보였다.\n\"저도 이 영혼에 몸을 기울였습니다. 하지만 존경하는 검찰 측 대표와 달리 저는 무언가를 발견했으며 거기서 열린 책을 읽을 수 있었습니다.\"\n그는 거기서 내가 정직한 사람, 성실하고 지칠 줄 모르는 노동자, 회사에 충직하고 모두의 사랑을 받으며 타인의 불행에 공감하는 사람이라는 것을 읽었다고 했다.\n그에게 나는 할 수 있는 한 오랫동안 어머니를 부양한 모범적인 아들이었다.\n결국 양로원이 내 형편이 허락하지 않는 안락을 노모에게 제공하기를 바랐다. \"여러분, 저는 놀랍습니다\"라고 그가 덧붙였다.\n\"이 양로원에 대해 이렇게 큰 소란이 있다는 것이. 왜냐하면 결국, 이런 시설들의 유용성과 위대함을 증명해야 한다면 국가 자체가 그것을 지원한다고 말해야 하니까요.\"\n하지만 그는 장례식 이야기를 하지 않았고 변론에서 그 부분이 빠져 있는 것이 느껴졌다.\n하지만 이 모든 긴 문장들, 내 영혼에 대해 이야기한 이 모든 날들과 끝없는 시간들 때문에 모든 것이 아무 빛깔도 없는 물이 되어 그 안에서 현기증을 느끼는 것 같았다.\n마지막으로 기억나는 것은 다만, 변호사가 계속 말하는 동안, 법원 밖 거리에서 방청석들과 법정의 공간을 가로질러 아이스크림 장수의 나팔 소리가 내게까지 울려 왔다는 것이다.\n더 이상 내 것이 아니지만 그 안에서 가장 소박하고 가장 질긴 기쁨들을 찾았던 삶의 기억들이 밀려왔다.\n여름의 냄새들, 내가 좋아하던 동네, 어떤 저녁 하늘, 마리의 웃음과 원피스들.\n이 자리에서 내가 하는 아무 소용없는 모든 것이 목에 치밀어 올랐고 나는 오직 하나만을 바랐다.\n이것이 끝나고 잠과 함께 내 감방으로 돌아가는 것. 변호사가 마지막으로, 배심원들이 한 순간의 방황으로 길을 잃은 정직한 노동자를 죽음으로 보내지 않을 것이라고, 이미 가장 확실한 처벌로서 영원한 회한을 꾸미고 있는 범죄에 대해 정상 참작을 요청한다고 외치는 것이 겨우 들렸다.\n법원이 정회를 선언했고 변호사는 지친 표정으로 자리에 앉았다. 하지만 동료들이 와서 악수를 했다. \"훌륭했어요, 친애하는 동료.\"\n한 사람은 나를 증인으로 삼기까지 했다. \"어때요?\" 고개를 끄덕였지만 진심이 아니었다. 너무 피곤했다.\n그래도 밖에서 낮이 기울고 있었고 열기가 약해졌다. 들려오는 거리의 소리들에서 저녁의 부드러움이 느껴졌다. 우리는 모두 거기 앉아 기다리고 있었다.\n그리고 우리 모두가 함께 기다리는 것은 오직 나에 관한 것이었다. 다시 방 안을 둘러보았다. 첫날과 모든 것이 같았다.\n회색 재킷 기자와 자동인형 여자의 시선과 마주쳤다. 재판이 진행되는 내내 마리를 눈으로 찾지 않았다는 생각이 들었다.\n잊은 것이 아니었지만 처리해야 할 일이 너무 많았다. 셀레스트와 레몽 사이에서 마리를 발견했다.\n그녀가 마침내라는 듯 작은 신호를 보냈고 약간 불안한 얼굴로 웃고 있는 것이 보였다.\n하지만 마음이 닫혀 있었고 그 미소에 응답조차 할 수 없었다.\n재판부가 돌아왔다. 아주 빠르게 배심단에게 일련의 질문들이 낭독됐다. \"살인 유죄\"... \"계획적\"... \"정상 참작 사유.\"\n배심원들이 나갔고 나는 이미 기다렸던 그 작은 방으로 이송됐다. 변호사가 합류했다. 전보다 훨씬 수다스러웠고 이전에 없던 자신감과 다정함으로 말했다.\n모든 것이 잘 될 거라고 생각하며 몇 년 형이나 유형 정도로 벗어날 것이라고 했다.\n판결이 불리할 경우 파기 환송의 기회가 있냐고 물었다. 없다고 했다. 그의 전략은 배심단을 자극하지 않기 위해 답변서를 제출하지 않는 것이었다.\n판결은 그냥 파기되지 않는다고 설명했다. 당연해 보였고 그의 논리에 동의했다. 냉정하게 생각하면 아주 자연스러운 일이었다.\n그렇지 않으면 쓸모없는 서류 작업이 너무 많아질 것이었다. \"어쨌든\"이라고 변호사가 말했다. \"상소가 있습니다. 하지만 결과가 유리하게 나올 거라고 확신합니다.\"\n아주 오래 기다렸다. 사십오 분쯤. 그 시간이 지나 벨이 울렸다.\n변호사가 \"배심원 대표가 답변을 낭독할 것입니다. 판결 선고 때만 입장하게 됩니다\"라는 말을 남기고 떠났다. 문들이 쾅 닫혔다.\n어디에 있는지 알 수 없는 계단에서 사람들이 달리는 소리가 났다.\n그런 다음 방 안에서 목이 쉰 목소리가 뭔가를 읽는 것이 들렸다.\n벨이 다시 울리고 피고인석 문이 열렸을 때 방청석의 침묵이 나를 향해 올라왔다.\n침묵, 그리고 젊은 기자가 눈을 돌렸다는 것을 알아챘을 때 느낀 그 특이한 감각. 마리 쪽을 바라보지 않았다.\n판사장이 이상한 형식으로 내가 프랑스 국민의 이름으로 공개 장소에서 참수형에 처해질 것이라고 말했기 때문에 시간이 없었다.\n그때 모든 얼굴에서 읽히던 감정을 알아챈 것 같았다. 경의였을 것이다. 헌병들이 나에게 아주 부드럽게 대했다.\n변호사는 손을 내 손목 위에 올려놓았다. 나는 더 이상 아무 생각도 없었다. 하지만 판사장이 — \"아니요.\" 그러고 나서 나는 끌려갔다.";

T[10]="세 번째로 사제의 면회를 거절했다. 그에게 할 말이 없다. 말하고 싶지 않다. 늦지 않게 보게 될 것이다.\n지금 내가 관심을 두는 것은 기계에서 벗어나는 것, 불가피한 것이 출구를 가질 수 있는지 아는 것이다. 감방을 바꿔주었다.\n여기서는 누우면 하늘이 보인다. 하늘만 보인다. 낮이 밤으로 이어지는 색들의 쇠퇴를 그 얼굴 위에서 바라보며 하루하루를 보낸다.\n누워서 두 손을 머리 아래 받치고 기다린다. 사형 선고를 받은 이들 중 냉혹한 기계에서 벗어나 처형 전에 사라지고 경관들의 포위를 뚫은 사례가 있는지 얼마나 많이 자문했는지 모른다.\n처형 이야기에 충분한 관심을 기울이지 않았다고 스스로를 나무랐다. 이런 문제들에는 항상 관심을 가져야 한다. 무슨 일이 생길지 모르는 법이니까.\n다른 모든 사람들처럼 신문에서 기사를 읽은 적이 있었다. 하지만 한 번도 찾아볼 생각을 하지 않은 전문 서적들이 분명히 있었다.\n거기서 어쩌면 탈출 이야기들을 찾았을 것이다. 적어도 한 경우에는 바퀴가 멈췄다는 것을, 이 거역할 수 없는 필연 속에서 우연과 행운이 단 한 번은 무언가를 바꿔놓았다는 것을 알았을 것이다.\n단 한 번! 어떤 의미에서 그것으로 충분했을 것이다. 나의 마음이 나머지를 했을 것이다.\n신문들은 사회에 갚아야 할 빚이 있다고 자주 말했다. 그것을 갚아야 한다고. 하지만 그런 말은 상상력에 닿지 않는다.\n중요한 것은 탈출의 가능성이었다. 냉혹한 의례 밖으로의 도약, 희망의 모든 기회를 열어두는 광기의 질주.\n물론 그 희망이란 거리 모퉁이에서, 전속력으로 달리는 도중에, 날아오는 총알에 쓰러지는 것이었다.\n하지만 냉정하게 따지면 그런 사치를 허락하는 것은 아무것도 없었다. 모든 것이 그것을 금했다. 기계가 나를 다시 붙잡았다.\n선의를 다했지만 이 뻔뻔한 확신을 받아들일 수 없었다. 결국 그것을 만들어낸 판결과 그 판결이 내려진 순간부터 흔들림 없이 전개되는 것 사이에는 우스꽝스러운 불균형이 있었다.\n판결이 다섯 시가 아닌 여덟 시에 낭독됐다는 사실, 달리 내려질 수도 있었다는 사실, 속옷을 갈아입는 사람들이 내렸다는 사실, 프랑스 국민이라는 — 혹은 독일 국민, 중국 국민이라는 — 그토록 모호한 개념을 근거로 했다는 사실, 이 모든 것이 그런 결정에서 심각성을 많이 빼앗아 간다는 생각이 들었다.\n그래도 그 결정이 내려진 순간부터 그 효과가 내 몸을 짓누르는 이 벽의 존재만큼이나 확실하고 심각해진다는 것을 인정하지 않을 수 없었다.\n그런 순간들에 엄마가 아버지에 대해 들려주던 이야기가 생각났다. 아버지를 알지 못했다.\n그 사람에 대해 정확하게 알고 있는 것은 어쩌면 그때 엄마가 말해준 것뿐이었다. 어떤 살인자의 처형을 보러 갔었다.\n가야 한다는 생각에 몸이 아팠다. 그래도 갔고 돌아와서 오전 내내 구역질을 했다. 그때는 아버지가 조금 역겨웠다. 이제는 이해했다.\n그토록 자연스러운 일이었다. 사형 집행보다 더 중요한 것은 없으며 결국 그것이야말로 사람에게 진정으로 흥미로운 유일한 것이라는 것을 어찌 보지 못했을까!\n이 교도소에서 나간다면 모든 사형 집행을 보러 갈 것이었다. 그런 가능성을 생각한 것은 잘못이었다고 생각한다.\n경관들의 줄 뒤에서 이른 아침 자유로운 내 모습을 상상하면, 어떤 의미에서는 반대편에 서서, 보러 왔다가 나중에 토할 수 있는 구경꾼이 된 나를 상상하면, 독이 든 기쁨의 물결이 마음속으로 밀려왔다.\n하지만 그것은 이성적이지 않았다. 그런 가정들에 자신을 내맡기는 것은 잘못이었다. 다음 순간 너무 끔찍하게 추웠기 때문이었다. 이불 속에 웅크렸다.\n이를 억제할 수 없이 달달 떨었다.\n하지만 물론 항상 이성적일 수는 없다. 어떤 때는 예를 들어 법을 만들어보았다. 형벌을 개정했다.\n핵심은 사형수에게 한 번의 기회를 주는 것이라는 것을 알아챘다. 천에 하나면 충분히 많은 것을 해결해줄 것이었다.\n그래서 예를 들어 열 번 중 아홉 번은 환자를 — 나는 \"환자\"라고 생각했다 — 죽이는 화학 혼합물을 찾아낼 수 있을 것 같았다.\n환자가 그것을 알 것이다. 그것이 조건이었다. 왜냐하면 잘 생각해보고, 침착하게 바라보면, 단두대에서 결함이 되는 것은 아무런 기회가 없다는 것, 절대적으로 아무것도 없다는 것이라는 것을 알 수 있었다.\n한마디로, 단번에 환자의 죽음이 결정됐다. 정리된 일, 확고한 배합, 돌이킬 생각이 없는 합의였다. 만에 하나 실패하면 다시 시작했다.\n따라서 성가신 것은 사형수가 기계의 원활한 작동을 바라야 한다는 것이었다. 그것이 결함이라고 말한다. 어떤 의미에서는 그렇다.\n하지만 다른 의미에서는 좋은 조직의 모든 비결이 거기에 있다는 것을 인정하지 않을 수 없었다. 요컨대 사형수는 도덕적으로 협력해야 했다.\n모든 것이 차질 없이 진행되는 것이 그의 이익이었다.\n이 문제들에 대해 지금까지 옳지 않은 생각을 가지고 있었다는 것도 인정하지 않을 수 없었다.\n오랫동안 — 왜인지는 모르겠지만 — 단두대에 가려면 발판 위에 올라서 계단을 올라야 한다고 생각했다. 1789년 혁명 때문이었을 것이다.\n그 문제들에 대해 배우거나 보여준 모든 것들 때문에. 하지만 어느 날 아침 유명한 처형을 다룬 신문에 게재된 사진이 생각났다.\n실제로 기계는 아주 단순하게 땅 위에 놓여 있었다. 내가 생각했던 것보다 훨씬 폭이 좁았다.\n더 일찍 알아채지 못한 것이 우스운 일이었다. 사진 속 기계는 그 정밀하고 완성되고 번쩍이는 모습으로 인상을 주었다.\n모르는 것에 대해서는 언제나 과장된 생각을 가지게 된다. 반대로 모든 것이 단순하다는 것을 알아야 했다.\n기계는 그것을 향해 걸어오는 사람과 같은 높이에 있다. 사람을 만나러 가듯 걸어가서 만난다. 그것도 성가셨다.\n발판 위로의 오름, 하늘 한가운데로의 상승, 거기에 상상력이 매달릴 수 있었다. 반면에 여기서도 기계가 모든 것을 짓누른다.\n조용히, 약간의 수치와 함께, 그리고 많은 정밀함으로 사람이 죽임을 당했다.\n항상 생각하는 두 가지가 있었다. 새벽과 나의 상소. 하지만 스스로에게 논리를 세워 더 이상 생각하지 않으려 했다. 누웠다. 하늘을 바라보았다.\n거기에 관심을 가지려 노력했다. 초록빛이 됐다. 저녁이었다. 다시 생각의 흐름을 돌리려 했다. 심장 소리를 들었다.\n이토록 오랫동안 나와 함께한 이 소리가 언젠가 멈출 수 있다는 것을 상상할 수 없었다. 진정한 상상력이 없었다.\n그래도 이 심장의 박동이 내 머릿속에서 더 이어지지 않을 그 어떤 순간을 머릿속에 그려보려 했다. 하지만 소용없었다.\n새벽이나 상소가 거기 있었다. 결국 스스로를 몰아붙이지 않는 것이 가장 이성적이라고 말하게 됐다.\n새벽에 그들이 올 것이었다. 알고 있었다. 결국 나는 밤들을 그 새벽을 기다리며 보냈다. 놀라는 것을 좋아한 적이 없었다.\n무슨 일이 생기면 거기 있는 편을 택한다. 그래서 결국 낮에는 조금만 자고 밤 내내 하늘의 유리창 위로 빛이 태어나기를 참을성 있게 기다렸다.\n가장 힘든 것은 그들이 보통 일을 하는 그 불확실한 시간이었다. 자정이 지나면 기다리고 귀 시를 세웠다.\n내 귀가 이토록 많은 소리를 잡아낸 적이, 이토록 미세한 소리들을 구별한 적이 없었다.\n어떤 의미에서 나는 이 기간 내내 운이 좋았다고 말할 수 있다. 발소리를 한 번도 듣지 못했으니까.\n엄마는 완전히 불행한 사람은 없다고 자주 말했다. 나는 교도소에서, 하늘에 색이 물들고 새로운 날이 감방으로 미끄러져 들어올 때 그 말에 동의했다.\n왜냐하면 발소리를 들을 수도 있었고 그러면 심장이 터질 수도 있었기 때문이었다.\n아주 작은 소리에도 몸을 일으켜 문 앞으로 달려갔고, 귀를 나무에 바짝 붙이고 자신의 숨소리가 들릴 때까지 미칠 듯이 기다렸으며, 그것이 쉰 데다 개의 숨넘어가는 소리와 너무 닮아 두려웠다 해도, 결국 심장은 터지지 않았고 이십사 시간을 또 벌었다.\n낮 내내 상소가 있었다. 이 생각을 최대한 활용했다고 생각한다. 효과를 계산하고 생각에서 최대의 수익을 얻었다. 언제나 최악의 가정을 택했다.\n상소가 기각됐다. \"그럼 나는 죽는다.\" 다른 사람들보다 일찍, 그것은 분명했다. 하지만 삶이 살 만한 가치가 없다는 것은 누구나 안다.\n결국 서른에 죽거나 일흔에 죽거나 별 차이가 없다는 것을 모르지 않았다.\n두 경우 모두 당연히 다른 남자들과 여자들이 살아갈 것이고 그것은 수천 년 동안 계속될 것이니까. 요컨대 이보다 명확한 것은 없었다.\n지금이든 이십 년 후든 어차피 죽는 것은 나였다. 이 순간 내 논리에서 조금 불편한 것은 이십 년이라는 앞으로의 삶을 생각할 때 내 안에서 느끼는 무서운 도약이었다.\n하지만 이십 년 후 내가 어쨌든 거기에 이르게 됐을 때 내 생각이 어떨지를 상상해봄으로써 억눌러버리면 됐다.\n죽는 이상 어떻게, 언제는 중요하지 않았다. 분명한 일이었다. 따라서 — 그리고 어려운 것은 이 \"따라서\"가 대표하는 논리들을 모두 시야에서 놓치지 않는 것이었다 — 따라서 나는 상소 기각을 받아들여야 했다.\n그 순간에, 그 순간에만 어떤 의미에서 나는 권리가 있었다. 나는 스스로에게 두 번째 가정에 접근할 허락을 주었다. 나는 사면됐다.\n성가신 것은 피와 몸의 충동이 — 그것이 눈에 제정신 아닌 기쁨을 찌르며 올라왔다 — 덜 격렬해지도록 해야 한다는 것이었다.\n이 외침을 줄이고 이성으로 다스려야 했다. 첫 번째 가정에서의 체념이 더 그럴듯해지도록 이 가정에서도 자연스러워야 했다.\n성공했을 때 한 시간의 평온을 얻었다. 어쨌든 그것은 고려할 만한 것이었다.\n이와 비슷한 순간에 나는 또 한 번 사제의 면회를 거절했다. 누워서 여름 저녁의 다가옴을 하늘의 어떤 금빛으로 짐작하고 있었다.\n나는 막 상소를 기각시켰고 피의 물결이 규칙적으로 흐르는 것이 느껴졌다. 사제를 볼 필요가 없었다. 아주 오랜만에 처음으로 마리를 생각했다.\n그녀가 편지를 보내지 않은 지 오래됐다. 그날 저녁 생각해보니 사형수의 정부로 있는 것에 지쳤을지도 모른다고 생각했다.\n혹시 아프거나 죽었을 수도 있다는 생각도 들었다. 당연한 일이었다. 이제 서로 떨어져 있는 우리 두 몸 외에는 우리를 묶거나 서로를 떠올리게 해주는 것이 아무것도 없었으니, 어떻게 알 수 있겠는가.\n그 순간부터 마리의 기억도 내게 무관심해졌을 것이었다. 죽었다면 더 이상 내 관심을 끌지 않았다.\n내 죽음 후에 사람들이 나를 잊는 것을 이해하는 것처럼 그것이 당연하다고 생각했다. 그들은 나와 더 이상 할 일이 없었다.\n그것이 생각하기 힘들다고조차 말할 수 없었다.\n바로 그 순간에 사제가 들어왔다. 그를 봤을 때 몸이 조금 떨렸다. 그가 알아채고 두려워하지 말라고 했다.\n보통 다른 시간에 온다고 했다. 상소와는 무관한 친선 방문이라고 했고 상소에 대해서는 아무것도 모른다고 했다.\n침상에 앉더니 내 옆에 오라고 했다. 거절했다. 그래도 그가 아주 부드러워 보였다.\n팔뚝을 무릎 위에 올리고 머리를 숙이고 두 손을 바라보며 잠시 앉아 있었다. 가늘고 근육질인 손이었다. 날렵한 짐승 두 마리 같았다.\n천천히 서로 비볐다. 그런 다음 머리를 계속 숙인 채 그 자세로 너무 오래 있어서 잠깐 그를 잊어버린 것 같다는 인상이 들었다.\n그런데 갑자기 고개를 들고 나를 정면으로 바라보았다. \"왜\"라고 그가 말했다. \"제 방문을 거절하십니까?\" 신을 믿지 않는다고 했다.\n정말 확실하냐고 물었고 그것은 스스로에게 물어볼 필요도 없는 문제라고 했다. 중요하지 않은 질문으로 보였다. 그러자 그는 뒤로 물러나 벽에 기댔다.\n두 손을 넓적다리 위에 펼쳤다. 나에게 말하는 것 같지도 않게 이따금 확신하는 것 같아도 실제로는 그렇지 않을 때가 있다고 했다.\n아무 말도 하지 않았다. 나를 바라보더니 물었다. \"어떻게 생각하십니까?\" 가능할 수도 있다고 했다.\n어쨌든 정말 관심이 있는 것에 대해서는 확실하지 않을 수 있지만 관심 없는 것에 대해서는 완전히 확실했다.\n그리고 그가 이야기하는 것이 바로 내 관심을 끌지 않는 것이었다.\n그는 눈을 돌리고, 여전히 같은 자세로, 절망이 넘쳐서 그런 말을 하는 것이 아니냐고 물었다. 절망하지 않는다고 했다. 그냥 두려울 뿐이었다.\n그것은 당연한 일이었다. \"그러면 신이 도울 것입니다\"라고 그가 했다. \"당신과 같은 처지에 있었던 모든 분들이 그분에게 돌아갔어요.\"\n그것은 그들의 권리라고 인정했다. 그것은 또 그들에게 시간이 있었다는 것을 증명하기도 했다.\n나는 도움을 원하지 않았고 바로 내게는 관심 없는 것에 관심을 가질 시간이 없었다.\n그때 그의 두 손이 짜증의 몸짓을 했지만 그는 몸을 가다듬고 법복의 주름을 정리했다. 그가 끝내고 나서 나를 \"친구\"라고 부르며 말했다.\n내가 사형 선고를 받았기 때문에 그렇게 말하는 것이 아니었다. 그의 생각으로는 우리는 모두 사형 선고를 받았다.\n하지만 나는 그것이 같은 것이 아니며 어떤 경우에도 그것이 위안이 될 수 없다고 말하며 그의 말을 끊었다. \"물론입니다\"라고 그는 동의했다.\n\"하지만 오늘 죽지 않으면 언젠가는 죽을 것입니다. 그때 같은 질문이 제기될 것입니다. 이 무서운 시련을 어떻게 맞이하시겠습니까?\"\n지금 그것을 맞이하는 것과 정확히 똑같이 맞이하겠다고 했다.\n그 말에 그는 일어서서 나를 눈 속 깊이 바라보았다. 잘 아는 게임이었다. 에마뉘엘이나 셀레스트와 자주 했고 대체로 그들이 눈을 돌렸다.\n사제도 이 게임을 잘 알았다. 바로 알 수 있었다. 그의 시선은 흔들리지 않았다. 그의 목소리도 흔들리지 않았다.\n\"그러면 아무런 희망도 없으며 완전히 죽는다는 생각으로 살아가십니까?\" \"그렇습니다\"라고 했다.\n그러자 그는 고개를 숙이고 다시 앉았다. 나를 불쌍히 여긴다고 했다. 사람이 감당할 수 없는 것이라고 했다.\n나는 그저 지루해지기 시작한다고만 느꼈다. 돌아서서 창문 밑으로 갔다. 어깨를 벽에 기댔다.\n제대로 따라가지 않고 그가 다시 질문을 시작하는 것이 들렸다. 걱정스럽고 급한 목소리로 말했다. 감동받은 것을 이해하고 더 주의 깊게 들었다.\n내 상소가 받아들여질 거라고 확신하지만 씻어내야 할 죄의 짐을 지고 있다고 했다.\n그에 따르면 인간의 정의는 아무것도 아니고 신의 정의는 전부였다. 나를 단죄한 것은 인간의 정의라고 했더니 그렇다 해도 나의 죄를 씻지는 못했다고 했다.\n죄가 무엇인지 모른다고 했다. 내가 유죄라는 것만 알게 됐다. 유죄였다. 대가를 치렀다. 더 이상 아무것도 요구할 수 없었다.\n그때 그는 다시 일어섰고 이 비좁은 감방에서 움직이고 싶으면 선택의 여지가 없다는 생각이 들었다. 앉거나 서거나 해야 했다.\n눈을 바닥에 고정하고 있었다. 그가 한 걸음 다가오다가 감히 전진하지 못하는 것처럼 멈췄다. 창살 사이로 하늘을 바라보았다.\n\"아들아, 당신이 틀렸습니다\"라고 그가 말했다. \"더 요구할 수 있습니다. 어쩌면 요구할 것입니다.\" \"그럼 무엇을요?\" \"볼 것을 요구할 수 있어요.\" \"무엇을요?\"\n사제는 주위를 둘러보더니 내가 갑자기 아주 지친 것 같다고 느낀 목소리로 대답했다.\n\"이 모든 돌들이 고통을 땀처럼 흘리고 있습니다. 그것을 압니다. 괴로움 없이는 본 적이 없어요. 하지만 마음 깊은 곳에서, 가장 비참한 분들도 그 어둠 속에서 신성한 얼굴이 나타나는 것을 보았다는 것을 압니다. 그 얼굴을 보시기를 요구하는 것입니다.\"\n나는 조금 활기가 생겼다. 몇 달째 이 벽들을 바라보고 있다고 했다. 세상에서 이것보다 잘 아는 것은 없었다.\n어쩌면 아주 오래전에 거기서 어떤 얼굴을 찾은 적이 있었을지도 모른다. 하지만 그 얼굴은 햇볕의 빛깔과 욕망의 불꽃을 가진 것이었다.\n마리의 얼굴이었다. 헛되이 찾았다. 이제 끝났다. 그리고 어떤 경우에도 이 돌의 땀에서 솟아오르는 것은 아무것도 없었다.\n사제는 일종의 슬픔을 담아 나를 바라보았다. 이제 나는 완전히 벽에 등을 기대고 있었고 빛이 이마 위로 흘러내렸다.\n내가 듣지 못한 몇 마디를 하더니 아주 빠르게 포옹해도 되냐고 물었다. \"아니요\"라고 했다. 그는 돌아서서 손을 벽 위에 천천히 얹었다.\n\"그럼 이 땅이 그렇게 좋으십니까?\"라고 그가 중얼거렸다. 아무 대답도 하지 않았다.\n꽤 오랫동안 등을 돌린 채 있었다. 그의 존재가 짓눌렸고 짜증이 났다.\n나가달라고, 나를 내버려 두라고 말하려는 순간 갑자기 무언가 폭발하듯이 나를 향해 돌아서며 외쳤다.\n\"아니요, 믿을 수 없어요. 다른 삶을 바란 적이 있으셨을 거예요.\"\n물론 그랬지만 부자가 되기를 바라거나 매우 빠르게 수영하기를 바라거나 더 잘 생긴 입을 바라는 것과 다를 바 없었다고 했다.\n같은 종류의 것이었다. 하지만 그가 내 말을 끊으며 그 다른 삶을 어떻게 보는지 알고 싶어했다. 그러자 나는 소리쳤다.\n\"이 삶을 기억할 수 있는 삶이요.\" 그러고 나서 이제 지쳤다고 바로 말했다.\n그는 신에 대해 더 이야기하고 싶었지만 나는 그에게 다가가 마지막으로 한 번 더 남은 시간이 얼마 없다고 설명하려 했다.\n신에게 그것을 낭비하고 싶지 않았다. 그는 왜 \"신부님\"이 아닌 \"선생님\"이라고 부르느냐고 물으며 화제를 바꾸려 했다.\n그것이 나를 짜증 나게 했고 그는 내 아버지가 아니며 다른 사람들 편이라고 했다.\n\"아니요, 아들아\"라고 그가 내 어깨에 손을 얹으며 말했다. \"나는 당신과 함께 있어요. 하지만 당신은 그것을 알 수 없어요. 눈먼 마음을 가졌으니까요. 당신을 위해 기도하겠어요.\"\n그때 왜인지 모르지만 내 안에서 무언가가 터졌다. 목청껏 소리를 지르기 시작했고 그를 욕하며 기도하지 말라고 했다. 그의 수단 깃을 잡았다.\n기쁨과 분노가 뒤섞여 날뛰며 마음속 깊은 것 전부를 그에게 쏟아부었다. 그는 확신에 차 있지 않은가.\n하지만 그의 확신들 중 어느 것도 여자의 머리카락 한 올만큼의 가치도 없었다. 살아있는지조차 확실하지 않았다. 죽은 사람처럼 살고 있었으니까.\n나는 빈손처럼 보였다. 하지만 나는 나 자신을 확신했다. 모든 것을 확신했다. 그보다 더, 내 삶을 확신했고, 다가올 이 죽음을 확신했다.\n그렇다, 그것밖에 없었다. 하지만 적어도 이 진리를 붙들고 있었다. 그것이 나를 붙들듯이. 옳았다, 아직 옳다, 항상 옳았다.\n이런 방식으로 살았고 다른 방식으로도 살 수 있었다. 이것을 했고 저것은 하지 않았다. 어떤 것은 하지 않았는데 다른 것은 했다.\n그래서 어쩌란 말인가. 마치 이 순간과 이 작은 새벽, 내가 정당화될 그 순간과 새벽을 내내 기다려온 것 같았다.\n아무것도, 아무것도 중요하지 않았다. 왜인지 잘 알고 있었다. 그도 왜인지 알고 있었다.\n내가 이끌어온 이 부조리한 삶 내내, 내 미래의 깊은 곳에서, 아직 오지 않은 세월들을 거쳐 어두운 숨결이 나를 향해 올라왔다.\n그 숨결이 지나가며 내가 살아온 그에 못지않게 현실적이지 않은 세월들 속에서 그때 나에게 제시되던 모든 것들을 평평하게 했다.\n다른 사람들의 죽음이, 어머니의 사랑이 내게 무슨 상관인가. 그의 신이, 사람들이 선택하는 삶이, 선택하는 운명들이 내게 무슨 상관인가.\n단 하나의 운명이 나를 선택해야 했으며 나와 함께 그처럼 자신을 나의 형제라고 말하는 수십억의 특권을 누리는 자들을 선택해야 했으니. 알겠는가?\n모두가 특권을 누리고 있었다. 특권을 누리는 자들만 있었다. 다른 사람들도 언젠가는 단죄받을 것이었다. 그도 단죄받을 것이었다.\n살인죄로 기소되어, 어머니의 장례식에서 울지 않았다는 이유로 처형된다 한들 무슨 상관이겠는가. 살라마노의 개는 그의 아내만큼의 가치가 있었다.\n자동인형 같은 작은 여자는 마송이 결혼한 파리 여자만큼, 또는 나와 결혼하고 싶어 했던 마리만큼 유죄였다.\n레몽이 셀레스트만큼 — 셀레스트가 레몽보다 나았지만 — 내 친구인 것이 무슨 상관인가.\n마리가 오늘 입술을 새로운 뫼르소에게 내민다 한들 무슨 상관인가. 이 사형수가, 미래의 깊은 곳에서 이해하겠는가… 이 모든 것을 외치며 숨이 막혔다.\n하지만 이미 사람들이 사제를 내 손에서 떼어내고 간수들이 나를 위협했다. 그런데 그는 그들을 진정시키고 잠시 말없이 나를 바라보았다.\n눈이 눈물로 가득했다. 돌아서더니 사라졌다.\n그가 떠나자 나는 평온을 되찾았다. 지쳐서 침상에 몸을 던졌다. 잠든 것 같았다. 얼굴에 별들을 느끼며 깨어났기 때문이었다. 전원의 소리들이 올라왔다.\n밤의 냄새, 흙 냄새, 소금 냄새가 관자놀이를 식혀주었다. 잠든 이 여름의 경이로운 평화가 조류처럼 내 안으로 들어왔다.\n그 순간, 밤의 끝자락에서 사이렌들이 울부짖었다. 이제 나에게 영원히 무관심한 세계로의 출발을 알리는 것이었다. 아주 오랜만에 처음으로 엄마를 생각했다.\n왜 그녀가 삶의 끝자락에서 \"약혼자\"를 두었는지, 왜 다시 시작하는 놀이를 했는지 이해하게 된 것 같았다.\n저기, 저기에서도, 삶들이 스러지는 그 양로원 주변에서 저녁은 우울한 휴전 같은 것이었다.\n죽음에 가까이 가서 엄마는 거기서 해방됨을 느끼고 모든 것을 다시 살 준비가 되어 있었을 것이다.\n아무도, 아무도 그녀 때문에 울 권리가 없었다. 나도 역시 모든 것을 다시 살 준비가 된 것을 느꼈다.\n마치 이 큰 분노가 나에게서 악을 정화시키고 희망을 비워내어, 징조들과 별들로 가득 찬 이 밤 앞에서 처음으로 세계의 다정한 무관심에 나를 열어놓은 것처럼.\n그것이 나와 그토록 닮아 있고 마침내 그토록 형제 같다는 것을 느끼며 나는 행복했고 아직도 행복하다는 것을 느꼈다.\n모든 것이 완성되고 내가 덜 외롭다고 느끼기 위해 내게 남은 것은 내 처형 날 많은 구경꾼들이 있기를, 그리고 그들이 나를 증오의 함성으로 맞이해주기를 바라는 것이었다.";

var FN={
0:[{p:0,t:"오늘, 엄마가 죽었다. 아니면 어쩌면 어제. 모르겠다.",n:"뫼르소가 날짜를 모르는 것은 기억력의 문제가 아니라 시간이 그에게 연속적으로 흐르지 않기 때문이다. 어머니의 죽음도 다른 사건과 다를 바 없이 \'그냥 일어난 일\'이다. 이 첫 세 문장이 소설 전체의 톤과 세계관을 결정한다."},
{p:0,t:"\"어머니 별세. 내일 장례. 삼가 조의를 표함.\" 그것만으로는 알 수 없다.",n:"전보(télégramme)는 당시 급한 소식을 전하는 통신 수단으로, 글자 수에 따라 요금이 청구되어 극도로 압축된 문장을 사용했다. 뫼르소가 날짜를 모르는 이유가 여기에 있다—어머니가 언제 돌아가셨는지 전보에 명시되지 않았다."},
{p:0,t:"\"해명하실 필요 없어요, 얘야. 어머니 파일을 읽었어요.\"",n:"양로원 원장의 말이다. 뫼르소가 사과하려 하자 원장이 먼저 막아선다. 그런데 이 \'해명 불필요\'가 재판에서는 뫼르소의 무감각함을 입증하는 정황으로 활용된다—변호할 기회가 있었지만 아무것도 말하지 않았다는 식으로."},
{p:0,t:"관 옆에 흰 가운을 입은 아랍인 간호사가 있었다.",n:"소설에서 아랍인은 거의 항상 이름 없이 등장한다. 이 간호사도 눈 밑 붕대 때문에 얼굴의 대부분이 보이지 않는다. 뫼르소의 시점에서 아랍인들이 고유한 인물이 아닌 배경처럼 묘사되는 방식은 이후 포스트콜로니얼 비평이 주목하는 지점이다."},
{p:0,t:"\"안 보시겠어요?\"라고 했다. \"예\"라고 했다.",n:"어머니의 시신을 보지 않겠다는 이 결정이 재판에서 결정적 증거로 쓰인다. 뫼르소에게는 단순한 선택이었지만, 법정에서는 \'범죄자의 마음\'을 보여주는 행위로 해석된다. 소설 전체 구조의 씨앗이 이 짧은 교환에 있다."},
{p:0,t:"수위가 내게 말했다. \"암이에요.\" 이해가 안 돼 간호사를 바라보았더니 눈 밑에서 머리를 감싸는 붕대를 하고 있었다.",n:"암(癌)이 있는 것은 간호사이지 어머니가 아니다. 문맥 없이 읽으면 어머니가 암으로 사망했다는 뜻으로 오해할 수 있으나, 수위는 붕대를 한 간호사를 설명하는 것이다. 1부 2장  ·  알제로 돌아온 주말"}],
1:[{p:0,t:"항구 목욕 시설에 가려고 전차를 탔다. 거기서 바다로 뛰어들었다.",n:"어머니 장례 다음 날이다. 뫼르소는 공공 해수욕장(les bains du port)에서 수영하는데, 이것이 재판에서 \'어머니 죽음 다음 날 즐거움을 추구했다\'는 핵심 혐의가 된다. 1940년대 알제의 공공 목욕 시설은 주로 노동자 계층이 이용하던 장소였다."},
{p:0,t:"그녀가 다시 웃으며 페르낭델이 나오는 영화를 보고 싶다고 했다.",n:"페르낭델(Fernandel, 1903-1971)은 당시 프랑스에서 가장 인기 있던 코미디 배우다. 그의 영화는 가볍고 웃기는 내용이 대부분이었다. 어머니 사망 다음 날 코미디 영화를 봤다는 사실이 나중에 법정에서 뫼르소의 \'비정함\'을 증명하는 증거로 인용된다."},
{p:0,t:"내 잘못이 아니라고 말하고 싶었지만 사장에게 이미 한 말이라는 생각에 멈췄다.",n:"마리가 검은 넥타이를 보고 상복임을 눈치채자 뫼르소가 \'어머니가 돌아가셨다\'고 말하는 장면이다. \'내 잘못이 아니다\'라는 말을 반복하지 않는 것은 반복이 의미 없다고 느끼기 때문이다. 이 자기 검열이 그의 의사소통 방식을 잘 보여준다. 1부 3장  ·  레몽과 편지"}],
2:[{p:0,t:"동네에서는 그가 여자들 돈으로 산다고 했다. 직업을 물으면 \"창고 관리인\"이라고 했다.",n:"레몽 생테스는 포주(proxénète)다. 당시 알제리 하층민 동네에서 흔한 인물 유형으로, 여성의 성매매를 관리해 수입을 얻으면서 공식적으로는 다른 직업을 내세웠다. 재판에서 검사가 그를 \'포주\'라고 공개 선언함으로써 뫼르소와의 우정 자체가 뫼르소의 도덕적 타락 증거가 된다."},
{p:0,t:"그는 돌아오면 잠자리를 갖고 얼굴에 침을 뱉고 내쫓겠다고 했다.",n:"레몽이 아랍인 정부에게 복수하려는 계획을 설명하는 장면이다. 뫼르소는 이 계획에 도덕적 판단을 내리지 않는다—편지 써주기를 도와달라는 부탁에 \'귀찮지 않다\'고 응한다. 이 무판단이 뫼르소를 아랍인 형제들과의 갈등 속으로 끌어들이는 계기가 된다."},
{p:0,t:"무어 여자라는 것을 알았다.",n:"무어인(Maure)은 북아프리카 이슬람계 주민을 가리키는 프랑스어 표현이다. 레몽의 정부는 이름이 한 번도 언급되지 않는다. 소설에서 아랍·무어 인물들에게 고유명이 없다는 점은 카뮈의 식민지 시각이 반영된 것이라는 비판을 받아왔다. 1부 4장  ·  살라마노 노인과 개"}],
3:[{p:0,t:"작은 방에서 둘이서만 오래 함께 살다 보니 살라마노 노인은 결국 개를 닮아버렸다.",n:"살라마노 노인과 그의 개는 소설 속 중요한 병행 서사다. 8년을 함께하며 서로를 닮아버린 두 존재—증오하면서도 떠나지 못하는 관계. 뫼르소와 어머니의 관계와 겹쳐 읽힌다. 개를 잃은 살라마노가 우는 것을 들으며 뫼르소가 \'왜인지 모르게 엄마 생각이 났다\'고 하는 것은 이 병치가 작동하는 순간이다."},
{p:0,t:"왜인지 모르겠지만 엄마 생각이 났다. 하지만 다음 날 일찍 일어나야 했다.",n:"소설에서 뫼르소가 어머니를 가장 인간적으로 상기하는 순간 중 하나다. 설명 없이 연상이 일어나고, 곧바로 실용적인 생각(\'내일 일찍 일어나야 한다\')으로 넘어간다. 감정을 억누르는 것이 아니라 그저 다음 사실로 이동하는 그의 방식이다. 1부 5장  ·  파리 제안과 결혼"}],
4:[{p:0,t:"사람은 결코 생활을 바꾸지 않으며 어차피 모든 생활은 다 마찬가지고 지금 이 생활이 전혀 싫지 않다고 했다.",n:"사장이 뫼르소에게 파리 지사 근무를 제안하는 장면이다. 뫼르소의 대답은 단순한 무욕을 넘어 존재론적 무차별성—어떤 선택도 다른 선택보다 본질적으로 낫지 않다—을 보여준다. 이 태도가 재판에서 \'사회적 위험성\'의 증거로 해석된다."},
{p:0,t:"그런 말은 아무 의미가 없지만 아마도 사랑하지 않는 것 같다고.",n:"마리의 결혼 및 사랑 질문에 대한 뫼르소의 대답이다. 그는 거짓 감정을 연기하지 않는다. 카뮈는 뫼르소를 \'거짓말을 거부하는 사람\'으로 정의했다. 이 정직성이 사회적으로는 냉담함으로 읽히지만, 카뮈에게 그것은 진정성의 형태다."},
{p:0,t:"이상한 작은 여자가 들어와 내 테이블에 앉아도 되냐고 물었다.",n:"셀레스트 식당에서 만나는 이 \'자동인형 같은 여자\'는 소설의 미스터리한 인물이다. 모든 행동이 기계적으로 정확하고 효율적이다. 그녀는 재판 장면에서 방청석에 다시 등장해 뫼르소를 빤히 바라본다. 정체와 목적은 끝까지 설명되지 않는다. 1부 6장  ·  해변과 총성"}],
5:[{p:0,t:"고원은 누르스름한 돌들과 이미 단단하게 파란 하늘 아래 온통 하얀 아스포델로 덮여 있었다.",n:"아스포델(asphodèle)은 지중해 연안에 자생하는 흰 들꽃이다. 그리스 신화에서 죽은 자의 영혼이 머무는 \'아스포델 들판\'에 피는 꽃으로 알려져 있다. 살인이 일어나기 직전 이 꽃이 가득한 고원을 지나는 장면은 죽음을 예시하는 이미지다."},
{p:0,t:"\"아니야. 사나이답게 붙어. 권총을 나에게 줘.\"",n:"뫼르소가 레몽에게서 권총을 빼앗는 이 순간이 이후 살인으로 이어진다. 뫼르소의 원래 의도는 레몽이 경솔하게 총을 쏘지 못하도록 막으려는 것이었다. 즉 그는 총을 뺏음으로써 폭력을 막으려 했다. 그러나 이 행위가 역설적으로 그를 살인범으로 만든다."},
{p:0,t:"엄마를 묻던 날의 햇볕과 똑같은 것이었다.",n:"뫼르소는 의식이 아닌 신체로 두 사건을 연결한다. 어머니의 장례와 살인이 \'같은 햇볕\'으로 묶이는 이 연결이 살인의 동기로서 터무니없어 보이지만, 카뮈에게 이 부조리한 인과성이 핵심이다. 뫼르소는 이념이나 증오가 아닌 신체적 한계로 방아쇠를 당긴다."},
{p:0,t:"마치 불행의 문을 두드리는 네 번의 짧은 노크 같았다.",n:"소설 전체에서 뫼르소가 사용하는 유일한 시적 은유다. 1부 내내 감정도 은유도 없이 사실만 나열하던 그가 가장 폭력적인 순간에 처음으로 비유를 사용한다. 이 \'이례적 문장\'이 독자에게 뫼르소의 의식이 이 순간 크게 흔들렸음을 전한다."}],
6:[{p:0,t:"\"그건 하나의 의견이죠. 하지만 법이 있어요.\"",n:"예심 판사(juge d\'instruction)는 프랑스 사법 체계에서 수사와 기소 여부를 결정하는 핵심 직책이다. 한국의 검사와 수사 판사의 역할을 동시에 수행한다고 볼 수 있다. 뫼르소는 사건이 \'아주 단순하다\'고 생각하지만, 이미 사법 기계가 그를 처리하기 시작했다."},
{p:0,t:"그는 십자가를 들어 올리며 신을 믿느냐고 소리쳤다.",n:"예심 판사가 십자가를 들고 종교적 회개를 촉구하는 장면이다. 형사 재판의 예심 과정에서 판사가 피의자에게 신앙을 요구하는 것은 당시 프랑스 식민지 알제리에서 드물지 않은 관행이었다. 법 체계와 기독교적 도덕이 얼마나 뒤섞여 있었는지를 보여준다."},
{p:0,t:"\"반그리스도\"라고 했다. 내가 무슨 말을 해야 할지 몰랐다. 그래도 맞는 말이었다.",n:"예심 판사가 뫼르소를 \'반그리스도(l\'Antéchrist)\'라고 부른다. 신앙도, 회개도, 초월적 가치도 거부하는 뫼르소에게 판사의 눈에 이것은 사회와 신의 질서에 대한 반역이다. 뫼르소가 \'그래도 맞는 말이었다\'고 인정하는 것이 소름 돋는 이유다."}],
7:[{p:0,t:"처음에는 감방이 너무 넓게 느껴졌다. 하지만 시간이 지나면서 감방이 나에게 맞춰졌다. 아니면 내가 감방에 맞춰진 것인지도 모른다.",n:"뫼르소가 감옥에 적응하는 과정은 인간이 어떤 환경에도 습관을 형성할 수 있음을 보여준다. 하루를 초 단위로 기억하는 연습을 하며 시간을 보낸다. 이 적응력—극한 상황에서도 평온을 찾는—이 카뮈가 말하는 부조리 인간의 생존 방식이다."},
{p:0,t:"마리가 교도소 면회실 유리 너머로 소리쳐야 했다.",n:"당시 프랑스 교도소 면회는 유리 칸막이를 사이에 두고 여러 죄수와 방문객이 동시에 만나는 방식이었다. 소란 속에서 서로 소리를 질러야 하는 이 상황은 뫼르소와 마리 사이의 물리적·심리적 단절을 동시에 보여준다."}],
8:[{p:0,t:"나 자신에게 바라보이는 이상한 느낌이 들었다.",n:"법정에서 뫼르소를 빤히 바라보는 젊은 기자를 묘사하는 장면이다. 이 기자는 소설에서 명확히 정체화되지 않은 채 뫼르소에게 \'거울처럼\' 느껴진다. 일부 비평가들은 이 인물이 카뮈 자신의 분신—소설을 쓰는 작가가 인물을 관찰하는 시선—이라고 해석한다."},
{p:0,t:"어떤 의미에서 이 사건은 나 없이 처리되는 것 같았다.",n:"재판에서 뫼르소는 자신이 주인공이 아닌 관객처럼 느낀다. 검사와 변호사 모두 \'뫼르소\'에 대해 이야기하지만 그것은 그들이 구성한 이미지이지 실제 뫼르소가 아니다. 이 소외(aliénation)가 근대 사법 체계에 대한 카뮈의 핵심 비판이다."},
{p:0,t:"셀레스트는 말했다. \"제 생각에는 불행한 일입니다. 불행이 뭔지는 다 아시죠.\"",n:"뫼르소의 단골 식당 주인 셀레스트의 증언이다. 법정 용어도 논리도 모르지만 진심으로 뫼르소를 변호하려 한다. \'불행한 일\'이라는 소박한 표현이 법정의 정교한 논리 앞에서 힘을 발휘하지 못하는 모습이 소설의 비극 중 하나다. 뫼르소는 이때 처음으로 \'남자를 껴안고 싶다\'고 느낀다."},
{p:0,t:"\"어머니가 돌아가신 다음 날 이 남자는 수영을 하고, 문란한 관계를 시작하고, 코미디 영화를 보며 웃었습니다.\"",n:"검사의 이 선언이 재판의 실질적 유죄 근거가 된다. 살인 행위보다 어머니 사후 뫼르소의 행동—수영, 마리와의 잠자리, 페르낭델 영화—이 \'범죄자의 마음\'을 증명한다는 논리다. 행위가 아닌 감정의 결여를 처벌하는 것이 소설의 핵심 아이러니다."}],
9:[{p:0,t:"\"나는 이 남자가 범죄자의 마음으로 어머니를 묻었다고 기소합니다.\"",n:"검사가 살인이 아닌 \'범죄자의 마음으로 어머니를 묻은 죄\'를 기소하겠다는 장면이다. 당시 프랑스 법정에서 피의자의 도덕적 성격이 양형에 광범위하게 영향을 미쳤다. 변호사의 항의(\'어머니를 묻은 죄로 기소된 겁니까, 사람을 죽인 죄로 기소된 겁니까?\')는 방청석의 웃음을 유발하지만 실제로는 아무것도 바꾸지 못한다."},
{p:0,t:"판사장이 내가 프랑스 국민의 이름으로 공개 장소에서 참수형에 처해질 것이라고 말했다.",n:"사형 판결이다. \'참수형\'은 당시 프랑스에서 사용한 기요틴(단두대) 처형을 뜻한다. 프랑스는 1981년까지 기요틴 사형을 유지했다. \'프랑스 국민의 이름으로\'라는 형식적 문구가 뫼르소에게는 터무니없이 공허하게 들린다—그는 이후 이 판결의 우연성에 대해 길게 생각한다."}],
10:[{p:0,t:"지금 내가 관심을 두는 것은 기계에서 벗어나는 것, 불가피한 것이 출구를 가질 수 있는지 아는 것이다.",n:"뫼르소가 반복적으로 언급하는 \'기계(la machine)\'는 단두대 자체뿐 아니라 체포·재판·판결·집행으로 이어지는 사법 시스템 전체를 가리킨다. 일단 작동이 시작되면 멈출 수 없는 이 \'기계\'의 냉혹한 논리가 2부 전체를 지배하는 핵심 이미지다."},
{p:0,t:"판결이 다섯 시가 아닌 여덟 시에 낭독됐다는 사실, 달리 내려질 수도 있었다는 사실, 속옷을 갈아입는 사람들이 내렸다는 사실...",n:"사형 판결의 우연성을 분석하는 이 단락은 소설에서 가장 긴 복합 문장 중 하나다. 평소의 짧은 문장 스타일과 대조적으로 문장이 길게 늘어난다. \'속옷을 갈아입는 사람들\'이라는 표현은 배심원들을 탈신성화하는 카뮈 특유의 방식이다—그들은 추상적 정의의 담지자가 아니라 땀을 흘리는 인간일 뿐이다."},
{p:0,t:"그는 왜 \"신부님\"이 아닌 \"선생님\"이라고 부르느냐고 물으며 화제를 바꾸려 했다.",n:"뫼르소가 사제를 \'신부님(mon père)\' 대신 \'선생님(monsieur)\'이라고 부르는 것은 작은 반항이자 명확한 거리 두기다. 프랑스어에서 \'mon père\'는 신부에 대한 존칭인 동시에 \'아버지\'라는 뜻이다. 뫼르소는 \'그는 내 아버지가 아니며 다른 사람들 편이다\'라고 말한다."},
{p:0,t:"\"이 삶을 기억할 수 있는 삶이요.\"",n:"사제가 다른 삶(내세, 구원)을 상상해보라고 권하자 뫼르소가 폭발적으로 외치는 말이다. 그가 원하는 \'다른 삶\'은 천국이 아니라 지금 이 삶을 다시 기억할 수 있는 삶—이 삶의 연장이다. 이 한 문장에 뫼르소의 세계관 전체가 담겨 있다."},
{p:0,t:"그의 확신들 중 어느 것도 여자의 머리카락 한 올만큼의 가치도 없었다.",n:"사제의 종교적 확신에 맞서 뫼르소가 제시하는 반대 가치는 신도 이념도 아닌 감각적 세계—여자의 머리카락, 마리의 웃음, 해변의 태양—이다. 이 이교적 감각주의가 뫼르소의 유일한 신앙이다."},
{p:0,t:"왜 그녀가 삶의 끝자락에서 \"약혼자\"를 두었는지, 왜 다시 시작하는 놀이를 했는지 이해하게 된 것 같았다.",n:"어머니는 양로원에서 \'약혼자\'인 토마 페레 노인을 사귀었다. 소설 초반에 아무 설명 없이 언급된 이 사실이 여기서 의미를 얻는다. 어머니도 죽음 앞에서 삶을 다시 긍정하려 했다—아들과 어머니가 같은 진실에 도달한 것이다."},
{p:0,t:"그들이 나를 증오의 함성으로 맞이해주기를 바라는 것이었다.",n:"소설의 마지막 문장이다. 처형에 구경꾼들의 증오를 바라는 것은 자학이 아니라 역설적 연대 요청이다. 증오하든 무관심하든 모두 같은 세계 안에 있다는 인식, 그 세계와의 마지막 접촉을 원하는 마음. 단독자로 살아온 뫼르소가 처형이라는 공적 사건을 통해 세계와 연결되려 한다."}],
};

    h+='<div class="sans" style="font-size:15px;line-height:2;color:#3a2e20">전체 해설<br>1. 알베르 카뮈와 『이방인』의 탄생<br>알베르 카뮈(Albert Camus, 1913–1960)는 프랑스 식민지 알제리의 수도 알제(Alger)에서 태어났다. 아버지는 그가 한 살 때 제1차 세계대전에서 전사했고, 어머니는 귀가 잘 들리지 않는 반문맹의 청소부였다. 카뮈는 극빈한 환경에서 자랐으나 초등학교 교사 루이 제르맹(Louis Germain)의 발견과 지원으로 장학생이 되어 고등학교를, 이어 알제 대학에서 철학을 공부했다.<br>『이방인』은 카뮈가 26세이던 1939–40년 사이에 초고가 완성되었고 1942년 갈리마르 출판사에서 출간됐다. 같은 해 철학 에세이 『시지프 신화(Le Mythe de Sisyphe)』도 함께 출간됐다. 이 두 작품은 서로 짝을 이루는 쌍둥이다—소설이 부조리를 \'살아낸다\'면 에세이는 부조리를 \'설명한다\'. 카뮈는 두 작품을 단독으로 읽기보다 함께 읽을 것을 권했다.<br>출간 당시 파리는 독일 점령 하에 있었다. 프랑스 지식인들이 실존주의와 저항 사상으로 경도되던 시기, 『이방인』은 즉각적인 반향을 일으켰다. 장폴 사르트르는 같은 해 「이방인 해설(Explication de L\'Étranger)」이라는 비평을 발표해 이 작품을 현상학적·실존주의적 문맥에서 분석했다.<br>2. 시대적·공간적 배경<br>소설의 배경은 1930년대 후반의 알제(Alger)다. 당시 알제리는 프랑스의 식민지로, 프랑스계 이주민(피에 누아르, Pieds-Noirs)과 아랍·베르베르계 원주민이 철저히 분리된 사회 구조 속에서 공존했다. 주인공 뫼르소는 하층 프랑스계 사무직 노동자이며, 그가 사는 동네는 알제의 변두리 노동자 지구다.<br>소설에서 알제의 두 가지 얼굴이 교차한다. 하나는 눈부신 지중해의 햇볕과 바다—뫼르소의 관능적 행복이 깃든 장소. 다른 하나는 군중과 법정과 교도소—사회의 규범과 형식이 작동하는 장소. 뫼르소는 전자의 세계에 속한 인간이지만 후자의 세계에서 심판받는다.<br>아랍인들은 소설에서 이름 없이 등장하며 대부분 배경의 일부로 묘사된다. 이것은 카뮈의 의도적 선택이기도 하지만 식민지 알제리의 시각 구조가 무의식적으로 반영된 것이기도 하다. 카뮈 사후 알제리 작가 카멜 다우드(Kamel Daoud)는 2014년 소설 『뫼르소 반대수사(Meursault, contre-enquête)』에서 이 침묵당한 아랍인에게 이름과 목소리를 돌려줌으로써 『이방인』의 또 다른 면을 드러냈다.<br>3. 소설의 구조<br>『이방인』은 두 부분으로 구성된다. 1부(6장)는 뫼르소의 시점에서 어머니의 죽음부터 아랍인 살인까지를 서술한다. 2부(5장)는 체포 이후 재판, 사형 선고, 그리고 처형 전야까지를 다룬다. 두 부분은 구조적으로 긴밀하게 대칭된다—1부에서 겪은 모든 사건이 2부의 재판에서 뒤집혀 다시 상연된다.<br>시제도 의미심장하다. 원문 프랑스어는 전체를 복합과거(passé composé)로 서술한다. 이것은 프랑스 소설의 전통인 단순과거(passé simple)가 아니라, 구어적이고 일상적인 과거 시제다. 롤랑 바르트는 이 시제 선택이 뫼르소를 \'보고하는 자\'가 아닌 \'겪은 자\'로 만들며, 감정적 거리를 제거해 독자를 직접 현재 속으로 던진다고 분석했다.<br>서술자이자 주인공인 뫼르소의 1인칭 시점은 의도적으로 제한되어 있다. 그는 자신의 감정 상태를 설명하거나 분석하지 않는다. 타인의 내면도 들여다보지 않는다. 그는 보이는 것, 느껴지는 것, 일어나는 것만을 말한다. 이 \'최소한의 자아(minimal self)\'가 독자에게 불안과 매혹을 동시에 준다.<br>4. 주요 인물<br>뫼르소 (Meursault)<br>소설의 화자이자 주인공. 알제의 선박 회사에 다니는 30대 초반의 프랑스계 사무직 노동자. 이름의 알파벳 배열 \'Meursault\'에서 \'meurt\'(죽다)와 \'soleil\'(태양)의 조합을 읽어내는       var crels=mRels.filter(function(r){return r.from===S.mapSel||r.to===S.mapSel;});

      h+='<div class="sans" style="width:100%;background:#FAF6EF;border-top:1px solid #E8E0D2;overflow-y:auto;padding:16px;flex-shrink:0;margin-top:8px;border-radius:12px">';
      h+='<button onclick="S.mapSel=null;S.fullAnalysis=false;render()" style="float:right;background:none;border:none;font-size:20px;color:#A89880;cursor:pointer">×</button>';
      h+='<h3 style="font-size:18px;font-weight:800;margin:0 0 2px">'+sc.name+'</h3>';
      h+='<div style="font-size:11px;color:#A89880;font-style:italic;margin-bottom:6px">'+sc.fr+'</div>';
      h+='<div style="display:inline-block;padding:2px 8px;background:#8B691412;border-radius:4px;font-size:10px;color:#8B6914;font-weight:500;margin-bottom:14px">'+sc.role+'</div>';
      if(sc.dead)h+='<div style="padding:5px 8px;background:#9B8E7E10;border-radius:4px;font-size:10px;color:#9B8E7E;margin-bottom:12px">✦ 작중 사망</div>';
      h+='<p style="font-size:13px;line-height:1.8;color:#3D3229;margin:0 0 16px;font-family:\'Noto Serif KR\'">'+brief+'</p>';
      if(crels.length>0){
        h+='<div style="font-size:10px;font-weight:700;color:#7A6E62;letter-spacing:1.5px;margin-bottom:10px">관계</div>';
        crels.forEach(function(r){
          var oid=r.from===S.mapSel?r.to:r.from;
          var oc=mCm[oid];if(!oc)return;
          var bc=r.t>=2?'border-left:3px solid #B22222':'border-left:3px solid #C5BAA8';
          h+='<div style="padding:10px 12px;margin-bottom:8px;background:#F0EBE0;border-radius:6px;cursor:pointer;'+bc+'" onclick="S.mapSel=\''+oid+'\';render()">';
          h+='<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:12px;font-weight:700">'+oc.name+'</span><span style="font-size:9px;color:#8B6914">'+r.label+'</span></div>';
          h+='<div style="font-size:11px;color:#7A6E62;line-height:1.5">'+r.desc+'</div></div>';
        });
      }
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';

  // ── Player ──
  h+='<div class="player"><div style="display:flex;align-items:center;gap:10px">';
  h+='<button class="play-btn'+(S.on?' on':'')+'" onclick="if(S.on){audio.stop();S.on=false;}else{audio.play(META[S.ci]);S.on=true;}render()">'+(S.on?'||':'▶')+'</button>';
  h+='<div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">';
  h+='<span class="sans" style="font-size:11px;font-weight:500">'+(ch.part===1?'1부':'2부')+' '+ch.id+'장</span>';
  h+='<span class="sans" style="font-size:10px;color:var(--accent);padding:1px 8px;background:color-mix(in srgb,var(--accent) 12%,transparent);border-radius:8px;font-weight:500">'+ch.mood+'</span></div>';
  var clsNames={1:'쇼팽 풍',2:'드뷔시 풍',3:'사티 풍',4:'라벨 풍',5:'드뷔시 풍',6:'스트라빈스키 풍',7:'바흐 풍',8:'사티 풍',9:'베토벤 풍',10:'쇼스타코비치 풍',11:'바흐 풍'};
  h+='<div class="sans" style="font-size:9px;color:var(--sub)">'+(S.musicMode==='classic'?'🎹 '+clsNames[ch.id]:'♪ AI 문맥 생성')+'</div>';
  h+='</div>';
  h+='<button class="sans" style="padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:'+(S.musicMode==='classic'?'color-mix(in srgb,var(--accent) 12%,transparent)':'var(--card)')+';color:var(--accent);font-size:10px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0" onclick="S.musicMode=S.musicMode===\'ai\'?\'classic\':\'ai\';if(S.on){audio.stop();audio.play(META[S.ci]);}render()">'+(S.musicMode==='classic'?'🎹':'♪')+'</button>';
  h+='</div></div>';

  document.getElementById('app').innerHTML=h;
  
}



render();

</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js");}</script>
</body>
