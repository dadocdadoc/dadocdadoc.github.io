<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>다독다독 — AI 독서몰입앱</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3a2e20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="다독다독">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>

/* FORCE LIGHT MODE */
html,body{color-scheme:light !important;background:#f5efe6 !important}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
/* 스크롤바 숨기기 (스크롤 기능은 유지) */
*::-webkit-scrollbar{display:none}
*{scrollbar-width:none;-ms-overflow-style:none}
html{background:#f5efe6;color-scheme:light}
:root{--bg:#f5efe6;--card:#fffcf5;--border:#e0d6c8;--text:#3a3228;--sub:#9a8a70;--accent:#8b7355}
body{font-family:'Noto Serif KR',serif;color:var(--text) !important;background:var(--bg) !important;min-height:100vh;display:flex;flex-direction:column;transition:background .8s}
#app{position:relative;flex:1;display:flex;flex-direction:column;overflow:hidden}
.sans{font-family:'Noto Sans KR',sans-serif}
header{padding:14px 20px;background:color-mix(in srgb,var(--bg) 94%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);flex-shrink:0;position:sticky;top:0;z-index:50}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-row h1{font-size:19px;font-weight:900;color:#3a2e20;letter-spacing:-.5px}
.tabs{display:flex;gap:2px;background:#ece4d6;border-radius:22px;padding:3px}
.tabs button{padding:5px 13px;border-radius:19px;border:none;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:#a09080;transition:all .3s}
.tabs button.on{background:var(--card);color:#5c4a32;box-shadow:0 1px 4px rgba(90,70,40,.12)}
.ch-pills{display:flex;flex-direction:column;gap:6px;padding:8px 20px;flex-shrink:0}
.ch-row{display:flex;gap:4px;align-items:center}
.ch-pills button{flex:1;padding:6px 0;border-radius:16px;font-size:11px;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:transparent;color:#a09080;font-weight:400;transition:all .3s;text-align:center}
.ch-pills button.on{border-color:color-mix(in srgb,var(--accent) 80%,transparent);background:var(--card);color:var(--accent);font-weight:700}
.ch-pills .part-label{font-size:10px;color:var(--sub);font-weight:600;padding:0 4px;flex-shrink:0;letter-spacing:1px;min-width:24px}
.content{flex:1;overflow:hidden;padding:0 20px;display:flex;flex-direction:column}
.page-text{flex:1;overflow:hidden;padding:10px 5px 0;display:flex;flex-direction:column;justify-content:flex-start}

.page-text p {
  font-size: 17px;
  line-height: 1.8;
  /* 문단 사이 간격을 살짝 줄여서 한 화면에 더 잘 들어가게 조절 */
  margin-bottom: 0.8em; 
  text-align: justify;
  text-indent: 12px;
  color: #2C2621;
  word-break: keep-all;
}
  .page-text p:not(:first-child) {
  text-indent: 12px; }
.page-text p:not(:first-child){text-indent:12px}
.page-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 0;flex-shrink:0;border-top:1px solid #e8e0d4;height:56px}
.btn-nav{padding:10px 20px;border-radius:12px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--accent)}
.btn-nav.next{border:1.5px solid color-mix(in srgb,var(--accent) 60%,transparent);background:color-mix(in srgb,var(--accent) 10%,transparent);font-weight:600}
.btn-nav:disabled{color:#ccc;border-color:#ddd}
.player{flex-shrink:0;padding:8px 20px 16px;background:color-mix(in srgb,var(--bg) 94%,transparent);backdrop-filter:blur(12px);border-top:1px solid var(--border)}
.play-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid color-mix(in srgb,var(--accent) 50%,transparent);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:15px;flex-shrink:0}
.play-btn.on{background:color-mix(in srgb,var(--accent) 12%,transparent)}
.overlay{position:absolute;inset:0;z-index:1000;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.bottom{align-items:flex-end}
.popup{background:var(--card);border-radius:20px;padding:24px;max-width:380px;width:100%;box-shadow:0 8px 40px rgba(90,70,40,.15)}
.popup.sheet{border-radius:20px 20px 0 0;max-width:420px}
.popup .label{font-size:10px;color:var(--accent);font-weight:500;letter-spacing:2px;margin-bottom:8px}
.popup .cta{width:100%;padding:12px;border-radius:12px;border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;background:var(--accent)}
.dots{display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border:2px solid transparent}
.dot.done{background:#8b7355;color:#fff}
.dot.cur{width:24px;height:24px;font-size:10px;border-color:var(--accent);color:var(--accent)}
.dot.future{background:#e0d6c8;color:#bbb}
.dot-line{width:8px;height:2px;background:#e0d6c8}.dot-line.done{background:#8b7355}
.fn-mark{cursor:pointer;position:relative}
.fn-mark:hover{color:var(--accent)}
.note-card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:12px;border:1px solid var(--border);border-left:3px solid var(--accent)}
.note-card .quote{font-size:13px;color:#3a2e20;line-height:1.5;margin:0 0 8px;font-weight:700}
/* Reward system */
.reward-overlay{position:absolute;inset:0;z-index:2000;background:#1a1710;display:flex;align-items:center;justify-content:center;flex-direction:column}
.book-cover{width:200px;height:290px;background:linear-gradient(145deg,#8b7355,#5c4a32);border-radius:4px 16px 16px 4px;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:8px 8px 30px rgba(0,0,0,.4);position:relative;overflow:hidden}
.book-cover::before{content:'';position:absolute;left:0;top:0;bottom:0;width:12px;background:linear-gradient(90deg,rgba(0,0,0,.3),transparent)}
.book-cover h2{color:#f5efe6;font-size:22px;font-weight:900;letter-spacing:2px}
.book-cover .author{color:#d4c4a8;font-size:11px;margin-top:6px;font-weight:300}
.stamp{position:absolute;top:30%;left:50%;width:100px;height:100px;border:4px solid #c45a3c;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#c45a3c;font-size:14px;font-weight:900;transform:translate(-50%,-50%) rotate(-15deg) scale(0);animation:stampDrop .6s cubic-bezier(.17,.67,.35,1.2) forwards;animation-delay:.8s;letter-spacing:1px}
@keyframes stampDrop{0%{transform:translate(-50%,-50%) rotate(-15deg) scale(3);opacity:0}60%{transform:translate(-50%,-50%) rotate(-15deg) scale(.9)}100%{transform:translate(-50%,-50%) rotate(-15deg) scale(1);opacity:1}}
.stamp-flash{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;background:rgba(196,90,60,.15);opacity:0;animation:flash .3s ease forwards;animation-delay:1.2s}
@keyframes flash{0%{opacity:0}50%{opacity:1}100%{opacity:0}}
.stats-card{background:#FAF6EF;border-radius:20px;padding:28px 24px;max-width:340px;width:100%;margin-top:24px;opacity:0;animation:fadeUp .6s ease forwards;animation-delay:1.8s}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.stat-row{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #e8e0d4}
.stat-row:last-child{border-bottom:none}
.stat-num{font-size:28px;font-weight:900;color:#3a2e20;letter-spacing:-1px}
.stat-label{font-size:11px;color:#9a8a70;font-weight:400;margin-top:2px}
.share-btn{width:100%;padding:14px;border-radius:14px;border:none;background:#3a2e20;color:#f5efe6;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;opacity:0;animation:fadeUp .6s ease forwards;animation-delay:2.4s}
.share-card{background:linear-gradient(145deg,#3a2e20,#5c4a32);border-radius:20px;padding:32px 28px;max-width:340px;width:100%;color:#f5efe6;text-align:center}
.share-card h3{font-size:24px;font-weight:900;margin-bottom:4px;letter-spacing:1px}
.share-card .divider{width:40px;height:2px;background:#8b7355;margin:12px auto}
.share-card .stat-mini{display:flex;justify-content:space-around;margin-top:16px}
.share-card .sm-item{text-align:center}
.share-card .sm-num{font-size:20px;font-weight:900;color:#d4c4a8}
.share-card .sm-label{font-size:9px;color:#9a8a70;margin-top:2px}
/* ── COMMUNITY CSS ── */
.com-wrap{position:absolute;inset:0;z-index:2000;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.com-header{padding:14px 20px;background:color-mix(in srgb,var(--bg) 94%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.com-header .back{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--accent)}
.com-header h2{font-size:17px;font-weight:900;color:#3a2e20;flex:1}
.com-body{flex:1;overflow-y:auto;padding:20px;padding-bottom:100px}
.shelf-profile{text-align:center;padding:20px 0 24px}
.shelf-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#8b7355,#c4a87c);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 4px 16px rgba(139,115,85,.25)}
.shelf-name{font-size:18px;font-weight:900;color:#3a2e20}
.shelf-grade{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:6px;background:color-mix(in srgb,#c45a3c 10%,transparent);color:#c45a3c}
.shelf-stats{display:flex;justify-content:center;gap:24px;margin-top:16px}
.shelf-stat{text-align:center}
.shelf-stat .num{font-size:20px;font-weight:900;color:#3a2e20}
.shelf-stat .lbl{font-size:10px;color:var(--sub);margin-top:2px}
.shelf-card{background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border);margin-top:16px;display:flex;gap:14px;align-items:center;cursor:pointer;transition:all .2s}
.shelf-card:active{transform:scale(.98)}
.shelf-book{width:54px;height:74px;border-radius:6px;background:linear-gradient(145deg,#3a2e20,#5c4a32);display:flex;align-items:center;justify-content:center;color:#d4c4a8;font-size:11px;font-weight:700;text-align:center;line-height:1.2;padding:4px}
.shelf-info{flex:1}
.shelf-info h4{font-size:14px;font-weight:700;color:#3a2e20}
.shelf-info p{font-size:11px;color:var(--sub);margin-top:2px}
.shelf-badge{font-size:20px}
.next-book{background:var(--card);border-radius:16px;padding:16px;border:1.5px dashed var(--border);margin-top:12px;text-align:center}
.next-book h4{font-size:13px;font-weight:700;color:var(--accent)}
.next-book p{font-size:11px;color:var(--sub);margin-top:4px}
.discuss-post{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:10px}
.discuss-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.discuss-avatar{width:32px;height:32px;border-radius:50%;background:#e8e0d4;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.discuss-nick{font-size:12px;font-weight:700;color:#3a2e20}
.discuss-grade-tag{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:600}
.discuss-time{font-size:10px;color:var(--sub);margin-left:auto}
.discuss-text{font-size:13px;line-height:1.65;color:#3a2e20;word-break:keep-all}
.discuss-actions{display:flex;gap:16px;margin-top:10px;padding-top:8px;border-top:1px solid #f0e8dc}
.discuss-actions button{border:none;background:none;font-size:11px;color:var(--sub);cursor:pointer;display:flex;align-items:center;gap:4px}
.discuss-input-wrap{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 20px;display:flex;gap:8px;z-index:2100}
.discuss-input{flex:1;border:1px solid var(--border);border-radius:20px;padding:10px 16px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;background:var(--bg);resize:none;height:40px}
.discuss-send{width:40px;height:40px;border-radius:50%;border:none;background:#c45a3c;color:#fff;font-size:16px;cursor:pointer;flex-shrink:0}
.vote-bar{background:#f0e8dc;border-radius:8px;height:28px;position:relative;overflow:hidden;margin-bottom:6px;cursor:pointer}
.vote-fill{height:100%;border-radius:8px;background:color-mix(in srgb,#8b7355 30%,transparent);transition:width .6s ease}
.vote-fill.top{background:color-mix(in srgb,#c45a3c 25%,transparent)}
.vote-text{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:11px;color:#3a2e20;font-weight:500;z-index:1}
.vote-pct{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:var(--accent);z-index:1}
.com-tabs{display:flex;gap:2px;background:#ece4d6;border-radius:22px;padding:3px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.com-tabs::-webkit-scrollbar{display:none}
.com-tabs button{flex:0 0 auto;padding:8px 14px;border-radius:19px;border:none;font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:#a09080;transition:all .3s;white-space:nowrap}
.com-tabs button.on{background:var(--card);color:#5c4a32;box-shadow:0 1px 4px rgba(90,70,40,.12);font-weight:700}
.essay-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);margin-bottom:10px}
.essay-title{font-size:14px;font-weight:700;color:#3a2e20;margin-bottom:8px;line-height:1.5}
.essay-body{font-size:12px;line-height:1.7;color:#5a5040;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.music-card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.music-emoji{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#8b7355,#c4a87c);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.music-info{flex:1}
.music-title{font-size:13px;font-weight:700;color:#3a2e20;margin-bottom:4px}
.music-desc{font-size:11px;line-height:1.6;color:#8a7a60}
.locked-room{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--border);margin-bottom:8px;opacity:.5;display:flex;align-items:center;gap:12px}
.locked-room .lock{font-size:18px}
.locked-room .info h4{font-size:13px;font-weight:600;color:#3a2e20}
.locked-room .info p{font-size:10px;color:var(--sub);margin-top:2px}
.section-label{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:1px;margin:20px 0 10px}
/* unlock animation */
.unlock-overlay{position:absolute;inset:0;z-index:3000;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;flex-direction:column;animation:fadeIn .3s ease}
.unlock-icon{font-size:64px;animation:unlockShake .5s ease forwards}
.unlock-text{color:#f5efe6;font-size:16px;font-weight:700;margin-top:16px;opacity:0;animation:fadeUp .5s ease forwards;animation-delay:.4s}
@keyframes unlockShake{0%{transform:rotate(0) scale(1)}15%{transform:rotate(-15deg) scale(1.1)}30%{transform:rotate(10deg) scale(1.1)}45%{transform:rotate(-8deg)}60%{transform:rotate(0) scale(1)}100%{transform:rotate(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* unlock animation */
.unlock-overlay{position:absolute;inset:0;z-index:3000;background:rgba(26,23,16,.85);display:flex;align-items:center;justify-content:center;flex-direction:column;animation:fadeIn .3s ease}
.unlock-icon{font-size:64px;animation:unlockShake .4s ease forwards}
.unlock-text{color:#f5efe6;font-size:16px;font-weight:700;margin-top:16px;opacity:0;animation:fadeUp .5s ease forwards;animation-delay:.5s}
.unlock-sub{color:#9a8a70;font-size:12px;margin-top:6px;opacity:0;animation:fadeUp .5s ease forwards;animation-delay:.7s}
@keyframes unlockShake{0%{transform:rotate(0) scale(1)}20%{transform:rotate(-15deg) scale(1.1)}40%{transform:rotate(10deg) scale(1.1)}60%{transform:rotate(-5deg) scale(1.05)}80%{transform:rotate(0) scale(1)}100%{transform:rotate(0) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* ── HOME SCREEN CSS ── */
.home-wrap{position:absolute;inset:0;z-index:1500;background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.home-scroll{flex:1;overflow-y:auto;padding:0 20px 100px;-webkit-overflow-scrolling:touch}
.home-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.home-logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:#3a2e20;letter-spacing:-0.5px}
.home-logo .dot{color:#c45a3c}
.home-profile{display:flex;align-items:center;gap:8px}
.home-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#8b7355,#c4a87c);display:flex;align-items:center;justify-content:center;font-size:14px}
.home-greeting{font-size:14px;color:#3a2e20;font-weight:600;margin:2px 0 10px}
.home-card{background:var(--card);border-radius:14px;padding:12px;border:1px solid var(--border);margin-bottom:8px}
.home-card.featured{padding:18px;border:1.5px solid var(--accent);box-shadow:0 4px 20px rgba(196,90,60,.08)}
.home-reading{display:flex;gap:14px;align-items:center}
.home-book-cover{width:64px;height:90px;border-radius:8px;background:linear-gradient(145deg,#3a2e20,#5c4a32);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:2px 4px 12px rgba(0,0,0,.15)}
.home-book-cover span{color:#d4c4a8;font-size:13px;font-weight:700;text-align:center;line-height:1.2}
.home-reading-info{flex:1;min-width:0}
.home-reading-info h4{font-size:14px;font-weight:700;color:#3a2e20;margin:0 0 2px}
.home-reading-info p{font-size:11px;color:var(--sub);margin:0}
.home-progress{height:6px;background:#e8e0d4;border-radius:3px;margin:8px 0;overflow:hidden}
.home-progress-fill{height:100%;background:linear-gradient(90deg,#8b7355,#c45a3c);border-radius:3px;transition:width .6s ease}
.home-continue{padding:8px 16px;border-radius:10px;border:none;background:#c45a3c;color:#fff;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px}
.home-section{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;margin:14px 0 6px}
.home-free-tag{display:inline-block;font-size:9px;padding:2px 6px;border-radius:6px;font-weight:600;margin-top:4px}
.home-stamps{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.home-stamp{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;text-align:center;line-height:1.2}
.home-stamp.done{background:linear-gradient(145deg,#3a2e20,#5c4a32);color:#d4c4a8;box-shadow:0 2px 8px rgba(58,46,32,.3)}
.home-stamp.locked{background:#e8e0d4;color:#c5baa8}
.home-nav{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:1600;padding:6px 0 12px}
.home-nav button{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0}
.home-nav .nav-icon{font-size:18px}
.home-nav .nav-label{font-size:9px;font-weight:600;color:var(--sub)}
.home-nav button.active .nav-label{color:#c45a3c}


/* ── Desktop Phone Frame ── */
@media(min-width:1024px){
  html,body{background:#d5cfc5 !important}
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px}
  #app{

var META=[
{id:1,title:"엄마의 장례",part:1,summary:"양로원에서 전보 한 장이 왔다. \'어머니 별세. 내일 장례.\' 뫼르소는 버스를 타고 마렝고로 향한다. 영안실에서 어머니의 관을 열어보기를 거부하고, 수위와 함께 담배를 피우고 커피를 마시며 밤을 보낸다. 이튿날 뙤약볕 아래 장례 행렬이 이어진다.",annot:"소설의 첫 문장에서 날짜가 불분명한 것은 기억력 문제가 아니다. 당시 전보는 글자 수에 따라 요금이 청구되어 날짜를 생략하는 경우가 많았다. 어머니 시신을 보지 않겠다는 뫼르소의 결정은 이 소설에서 특별한 무게를 갖는다. 뫼르소가 장례식에서 감정을 드러내지 않는 것은 카뮈의 의도적 설계다. 카뮈는 뫼르소를 \'거짓말을 거부하는 사람\'으로 정의했다.",mood:"무거운 고요",bg:"#f5efe6",accent:"#8b7355",key:[261.63,293.66,311.13,349.23,392.0,466.16,523.25]},
{id:2,title:"마리와의 하루",part:1,summary:"장례 다음 날, 토요일. 뫼르소는 공공 해수욕장에서 예전 사무실 동료 마리를 우연히 만난다. 함께 수영을 하고 저녁에 코미디 영화를 본 뒤 그녀가 집으로 따라온다. 다음 날 일요일, 혼자 남겨진 뫼르소는 발코니에 기대어 거리를 내려다보며 긴 오후를 보낸다.",annot:"1940년대 알제의 공공 해수욕장은 주로 노동자 계층이 이용하던 장소였다. 발코니 장면에서 뫼르소는 지나가는 가족, 청년, 노인을 거의 같은 온도로 관찰한다. 이 균등한 시선이 그가 세계를 바라보는 방식이다. 판단 없이, 호기심 없이, 그냥 바라본다.",mood:"나른한 일상",bg:"#f0efe8",accent:"#6b8f71",key:[349.23,392.0,440.0,466.16,523.25,587.33,659.25]},
{id:3,title:"레몽의 편지",part:1,summary:"이웃 레몽 생테스가 저녁 식사에 초대한다. 그는 자신의 정부가 배신했다며 편지로 불러낸 뒤 복수하겠다는 계획을 이야기한다. 뫼르소는 별다른 판단 없이 편지 작성을 도와준다. 레몽은 \'이제 진짜 친구야\'라고 한다.",annot:"레몽의 공식 직업은 \'창고 관리인\'이지만, 동네에서는 여성들의 돈으로 산다고 알려진 인물이다. 뫼르소가 편지를 써주는 것을 \'귀찮지 않다\'는 이유로 결정하는 이 장면은 그의 전형적인 의사결정 방식을 보여준다. 적극적인 동의가 아닌, 거절할 이유의 부재.",mood:"어두운 친밀함",bg:"#f2ece0",accent:"#9e7b4f",key:[293.66,329.63,349.23,392.0,440.0,493.88,523.25]},
{id:4,title:"폭력의 시작",part:1,summary:"레몽이 돌아온 정부를 때린다. 순경이 출동하고, 뫼르소는 경찰서에서 레몽 측 증인으로 서준다. 한편 이웃 살라마노 노인이 피부병에 걸린 스패니얼 개를 잃어버린다. 밤에 벽 너머로 노인의 우는 소리가 들린다.",annot:"살라마노 노인과 그의 개는 오랜 시간을 함께 보내며 서로를 닮아버린 존재들이다. 카뮈는 이 관계를 설명하지 않고 그냥 보여준다. 뫼르소가 어머니를 구체적으로 떠올리는 순간이 이 장에서다. 장례식에서도 아니고, 노인의 울음소리를 들으며 문득.",mood:"불안한 긴장",bg:"#f4ece2",accent:"#b5634b",key:[220.0,261.63,277.18,311.13,329.63,369.99,392.0]},
{id:5,title:"결혼과 무관심",part:1,summary:"사장이 파리 지사 근무를 제안한다. 뫼르소는 \'모든 생활은 다 마찬가지\'라며 관심 없다고 한다. 같은 날 마리가 결혼하고 싶냐고 묻는다. 뫼르소는 \'상관없다, 그녀가 원한다면\'이라고 답한다. 사랑하냐는 질문에는 \'아마도 아닌 것 같다\'고 한다.",annot:"뫼르소의 결혼 답변은 무관심이기도 하지만 정직이기도 하다. 그는 느끼지 않는 감정을 말하지 않는다. 사랑한다고 말할 수 있지만, 그것이 거짓이라는 것을 그는 안다. 파리에 대한 뫼르소의 묘사는 간결하다. 알제리의 태양과 바다에 익숙한 사람의 시선이다.",mood:"공허한 부유",bg:"#eeeae2",accent:"#7a7f8a",key:[311.13,349.23,392.0,415.30,466.16,523.25,554.37]},
{id:6,title:"해변의 살인",part:1,summary:"레몽 친구 마송의 해변 별장에서 오전을 보낸다. 식후 산책 중 아랍인들과 싸움이 벌어지고 레몽이 칼에 팔을 베인다. 뫼르소는 혼자 다시 해변으로 내려간다. 바위 그늘에서 아랍인을 마주친다. 타오르는 햇볕, 빛을 반사하는 칼날. 뫼르소는 방아쇠를 당기고 네 발을 더 쏜다.",annot:"1장 장례 행렬의 뙤약볕 묘사가 이 장에서 거의 그대로 반복된다. 두 장면이 신체 감각으로 연결된다. \'마치 불행의 문을 두드리는 네 번의 짧은 노크 같았다\'는 뫼르소가 1부 전체에서 사용하는 유일한 은유다. 사실만을 나열하던 문체가 이 순간 처음으로 비유를 사용한다.",mood:"작열하는 파국",bg:"#f6ede0",accent:"#c45a3c",key:[196.0,220.0,246.94,261.63,293.66,329.63,349.23]},
{id:7,title:"체포와 심문",part:2,summary:"체포 후 예심 판사를 여러 차례 만난다. 판사는 십자가를 들어 보이며 신을 믿냐고 거듭 묻고, 믿지 않는다는 뫼르소를 \'반그리스도\'라고 부른다. 변호사는 장례식에서 감정을 억눌렀다고 말해달라고 부탁하지만 뫼르소는 \'거짓이기 때문에\' 거절한다.",annot:"예심 판사는 프랑스 사법 체계에서 수사와 기소 여부를 결정하는 직책이다. 판사가 법정에서 종교적 회개를 촉구하는 장면은 당시 프랑스 식민지 알제리에서 드문 일이 아니었다. 변호사가 원하는 것은 뫼르소가 실제로 슬펐는지가 아니라 슬펐다고 말할 수 있는지다.",mood:"차가운 벽",bg:"#e8e4dc",accent:"#5a6a7a",key:[196.0,233.08,261.63,277.18,311.13,349.23,392.0]},
{id:8,title:"감옥의 시간",part:2,summary:"처음에는 공동 감방, 이후 독방으로 옮겨진다. 마리가 면회를 온다. 소란 속에서 소리를 지르며 짧은 대화를 나눈다. 뫼르소는 방 안 물건들을 하나씩 기억하는 훈련으로 시간을 채운다. \'단 하루를 살았던 사람도 교도소에서 백 년을 살 수 있다\'는 생각에 이른다.",annot:"당시 프랑스 교도소 면회는 유리 칸막이를 사이에 두고 여러 죄수와 방문객이 동시에 만나는 방식이었다. 뫼르소가 발견한 신문의 체코슬로바키아 살인 사건은 세계의 우연성과 비논리성을 한 번 더 제시하는 삽입 서사다.",mood:"멈춘 시간",bg:"#e6e2da",accent:"#6a6a72",key:[220.0,246.94,261.63,293.66,329.63,349.23,392.0]},
{id:9,title:"재판",part:2,summary:"기자들과 방청객으로 가득 찬 여름의 법정. 양로원 원장, 수위, 마리, 셀레스트, 살라마노, 레몽이 차례로 증언한다. 검사는 뫼르소를 \'도덕적 괴물\'이라고 규정한다. 뫼르소는 \'이 사건은 나 없이 처리되는 것 같다\'고 느낀다.",annot:"재판은 형식상 살인을 심판하지만, 실질적으로는 어머니 장례 이후 뫼르소의 행동을 심판한다. 살인 동기보다 감정의 결여가 중심 혐의가 된다. 당시 프랑스 법정에서 피의자의 도덕적 성격은 판결에 실질적인 영향을 미쳤다.",mood:"무대 위의 부조리",bg:"#ece6dc",accent:"#8a6a4a",key:[233.08,261.63,293.66,311.13,349.23,392.0,440.0]},
{id:10,title:"사형 선고",part:2,summary:"검사의 최후 변론. \'나는 이 남자가 범죄자의 마음으로 어머니를 묻었다고 기소합니다.\' 살인보다 장례에서의 태도가 핵심 혐의로 제시된다. 판결: 사형.",annot:"\'참수형에 처해질 것\'이라는 판결문은 기요틴 처형을 가리킨다. 프랑스는 1981년까지 기요틴 사형을 유지했다. \'프랑스 국민의 이름으로\'라는 판결 문구는 당시 모든 프랑스 법원 판결에 붙던 형식적 문구였다.",mood:"선고의 무게",bg:"#e4e0d6",accent:"#7a5a4a",key:[196.0,220.0,233.08,261.63,293.66,311.13,349.23]},
{id:11,title:"세계의 다정한 무관심",part:2,summary:"처형을 기다리는 독방. 세 번 거절한 끝에 사제가 불쑥 찾아온다. 뫼르소는 마침내 폭발한다. 사제가 떠난 후 처음으로 평온해진다. 세계의 다정한 무관심에 자신을 열어놓으며 행복하다고 느낀다.",annot:"뫼르소는 사제를 \'신부님\' 대신 \'선생님\'이라고 부른다. \'세계의 다정한 무관심(la tendre indifférence du monde)\'은 소설의 마지막 철학적 도달점이다. 세계는 인간에게 우호적이지도 적대적이지도 않다—그저 무관심하다. 카뮈는 이 무관심을 \'다정하다\'고 표현한다.",mood:"다정한 무관심",bg:"#f0ece4",accent:"#8b7355",key:[261.63,293.66,329.63,349.23,392.0,440.0,523.25]}
];

// ═══ 1부 텍스트 — 번역본 원문으로 교체하세요 (guide.md 참고) ═══
var T=[];
T[0]="오늘, 엄마가 죽었다. 아니면 어쩌면 어제. 모르겠다. 양로원에서 전보를 받았다. \"어머니 별세. 내일 장례. 삼가 조의를 표함.\" 그것만으로는 알 수 없다. 어쩌면 어제였다.\n양로원은 알제에서 팔십 킬로미터 떨어진 마렝고에 있다. 두 시에 버스를 타면 오후에 도착할 것이다.\n그렇게 하면 밤샘을 하고 내일 저녁에 돌아올 수 있다. 사장에게 이틀 휴가를 신청했는데 그런 이유라면 거절할 수 없었다.\n하지만 그는 썩 좋아 보이지 않았다. 나는 심지어 이렇게 말하기도 했다. \"제 잘못이 아니잖아요.\" 그는 대답하지 않았다.\n그 말을 해서는 안 됐다고 생각했다. 따지고 보면 내가 사과할 이유가 없었다. 오히려 그가 나에게 조의를 표해야 할 판이었다.\n하지만 아마 모레, 내가 상복을 입은 모습을 보면 그렇게 할 것이다.\n지금으로서는 마치 엄마가 죽지 않은 것 같은 느낌이 조금 든다.\n장례가 끝나면 반대로 일이 마무리되고 모든 것이 더 공식적인 분위기를 띠게 될 것이다.\n두 시에 버스를 탔다. 몹시 더웠다. 늘 그러듯 셀레스트 식당에서 밥을 먹었다. 다들 나를 걱정해주었고 셀레스트는 말했다. \"어머니는 한 분뿐이야.\"\n내가 나설 때 그들은 문까지 나와 배웅했다. 나는 조금 어리둥절했다. 에마뉘엘 집에 올라가 검은 넥타이와 완장을 빌려야 했다.\n그는 몇 달 전에 삼촌을 잃었다.\n출발을 놓치지 않으려 뛰었다. 그 서두름과 달리기, 버스의 덜컹거림, 휘발유 냄새, 도로와 하늘의 눈부심—아마 그것들 때문이었을 것이다. 나는 졸았다.\n거의 내내 잠들었다. 깨어났을 때 나는 군인에게 기대어 있었다. 그는 미소를 지으며 멀리서 왔냐고 물었다. 더 말하기 싫어서 \"예\"라고 했다.\n양로원은 마을에서 이 킬로미터 떨어져 있었다. 걸어서 갔다. 곧장 엄마를 보고 싶었다. 하지만 수위가 원장을 먼저 만나야 한다고 했다.\n원장이 바빠서 잠시 기다렸다. 그 내내 수위는 말을 했다. 그런 다음 원장을 만났다. 원장은 집무실로 나를 맞았다.\n훈장을 단 작은 노인이었다. 맑은 눈으로 나를 바라보았다. 그러고는 내 손을 잡아 너무 오래 쥐고 있어서 어떻게 뺄지 몰랐다.\n서류를 확인하더니 말했다. \"뫼르소 부인은 삼 년 전에 이곳에 입원하셨죠. 당신이 유일한 의지처셨어요.\" 나는 그가 뭔가를 나무란다고 생각해 설명하기 시작했다.\n원장이 말을 끊었다. \"해명하실 필요 없어요, 얘야. 어머니 파일을 읽었어요. 부양할 형편이 안 됐잖아요. 간호가 필요했고요. 월급도 많지 않았죠. 따져보면 어머니는 여기서 더 행복하셨어요.\"\n\"그렇습니다, 원장님\"이라고 했다. 그는 덧붙였다. \"아시다시피 어머니는 여기서 친구도 생기고 같은 연배 사람들도 사귀었어요. 다른 시절의 관심사를 함께 나눌 수 있었고요. 당신은 젊고, 어머니로서는 당신과 있으면 심심하셨을 거예요.\"\n맞는 말이었다. 집에 있을 때 엄마는 종일 말없이 눈으로 나를 쫓아다녔다. 양로원에 처음 왔을 때는 자주 울었다. 하지만 습관 때문이었다.\n몇 달이 지나면 오히려 양로원에서 나가게 되면 울었을 것이다. 역시 습관 때문에.\n지난해에 내가 거의 찾아가지 않은 것은 어느 정도 그런 이유에서였다. 그리고 일요일을 빼앗긴다는 것도 있었다.\n버스 정류장까지 걸어가고, 표를 사고, 두 시간을 가야 하는 수고까지.\n원장이 계속 말했다. 나는 거의 듣지 않았다. 그러더니 이렇게 말했다. \"어머니를 보고 싶으시겠죠.\"\n나는 아무 말 없이 자리에서 일어섰고 원장이 앞서 문으로 나갔다. 계단에서 그는 설명했다.\n\"충격을 주지 않으려고 영안실로 모셨어요. 입소자가 돌아가실 때마다 나머지 분들이 이삼 일 동안 불안해하거든요. 그러면 돌보기가 힘들어집니다.\" 우리는 안뜰을 가로질렀다.\n노인들이 작은 무리를 지어 잡담하고 있었다. 우리가 지나가면 조용해졌다. 등 뒤에서 대화가 다시 이어졌다. 목쉰 잉꼬들의 재잘거림 같았다.\n작은 건물 앞에서 원장이 작별을 고했다. \"뫼르소 씨, 이만 물러갑니다. 집무실에 있겠습니다. 장례는 원칙적으로 오전 열 시로 정해져 있어요. 이렇게 해서 고인 곁에서 밤을 지내실 수 있겠죠. 한 말씀 더: 어머니께서 종교적인 장례를 원하신다는 말씀을 동료들에게 자주 하셨다고 합니다. 필요한 조치를 취해두었어요. 하지만 알려드리고 싶었습니다.\"\n나는 감사 인사를 했다. 엄마는 무신론자는 아니었지만 살아생전에 종교를 생각해본 일은 없었다.\n들어갔다. 방은 매우 밝았다. 회칠한 벽에 유리 지붕이 덮여 있었다. 의자들과 X자 모양의 받침대들이 놓여 있었다.\n가운데 두 개의 받침대 위에 뚜껑이 닫힌 관이 있었다. 호두나무 빛으로 칠한 판자 위에 조금 박힌 광택 있는 나사들만 보였다.\n관 옆에 흰 가운을 입은 아랍인 간호사가 있었다. 머리에는 선명한 색깔의 두건을 쓰고 있었다.\n그때 등 뒤로 수위가 들어왔다. 뛰어온 것 같았다. 조금 더듬거리며 말했다. \"덮어드렸는데, 보시려면 관 뚜껑을 열어드려야 합니다.\"\n관으로 다가오자 나는 말렸다. \"안 보시겠어요?\"라고 했다. \"예\"라고 했다. 그는 멈췄다. 그 말을 해서는 안 됐다고 느꼈기 때문에 나는 민망했다.\n잠시 후 그가 나를 보며 물었다. \"왜요?\" 나무라는 어조가 아니었다. 그냥 확인하는 것처럼. \"모르겠어요\"라고 했다.\n그러자 그는 흰 콧수염을 비틀며 나를 보지 않고 말했다. \"이해합니다.\" 맑고 파란 눈에 얼굴이 약간 붉은 사람이었다.\n나에게 의자를 가져다 주고 자신은 내 약간 뒤에 앉았다. 간호사가 일어나 출구 쪽으로 향했다. 그때 수위가 내게 말했다. \"암이에요.\"\n이해가 안 돼 간호사를 바라보았더니 눈 밑에서 머리를 감싸는 붕대를 하고 있었다. 코 높이에서 붕대가 납작했다.\n얼굴에서 보이는 것은 붕대의 흰색뿐이었다.\n그녀가 나가자 수위가 말했다. \"혼자 계시게 해드릴게요.\" 내가 어떤 몸짓을 했는지 모르겠지만 그는 내 등 뒤에 선 채 그대로 있었다.\n등 뒤의 그 존재가 불편했다. 방 안은 늦은 오후의 환한 빛으로 가득했다. 말벌 두 마리가 유리 지붕을 향해 윙윙댔다.\n졸음이 밀려오는 것이 느껴졌다. 뒤돌아보지 않고 수위에게 물었다. \"여기 오래 계셨어요?\" 그는 즉시 대답했다. \"오 년\"이라고.\n처음부터 내 물음을 기다리기라도 한 것처럼.\n그러더니 한참 동안 이야기를 늘어놓았다. 자신이 마렝고 양로원의 수위로 끝나게 될 거라고 했다면 몹시 놀랐을 것이다. 예순네 살이었고 파리 출신이었다.\n이때 나는 말을 끊었다. \"아, 여기 출신이 아니세요?\" 그러자 원장실로 안내하기 전에 그가 엄마 이야기를 꺼냈던 것이 떠올랐다.\n더운 평원에서, 특히 이 땅에서는 빨리 묻어야 한다고 했었다. 그리고 자신이 파리에 살았었고 잊기가 어렵다고 했었다.\n파리에서는 시신 곁에서 사흘이나 나흘씩 있기도 한다. 여기서는 그럴 시간이 없다.\n마음의 준비도 되기 전에 벌써 영구차 뒤를 쫓아 달려야 한다. 그때 그의 아내가 말했다. \"그런 말씀은 하시는 게 아니에요.\"\n노인은 얼굴이 붉어지며 사과했다. 나는 끼어들었다. \"아니에요, 아니에요.\" 그가 하는 말이 옳고 흥미롭다고 생각했다.\n영안실에서 그는 빈민으로 양로원에 들어왔다고 했다. 아직 건강하다고 느껴 수위 자리를 자원했다고. 나는 결국 그도 입소자나 마찬가지 아니냐고 했다.\n그는 아니라고 했다. 나는 그가 입소자들을 \"그들\", \"다른 사람들\", 드물게는 \"노인들\"이라고 부르는 방식에 이미 주목한 적이 있었다.\n그 입소자들 중 일부는 그보다 나이가 많지도 않았다. 하지만 물론 다른 문제였다. 그는 수위였고 어떤 의미에서 그들에 대한 권한이 있었다.\n그때 간호사가 들어왔다. 저녁이 갑자기 찾아들었다. 유리 지붕 위로 밤이 빠르게 짙어졌다. 수위가 스위치를 켰고 갑자기 쏟아진 불빛에 눈이 부셨다.\n식당에 가서 저녁을 먹으라고 했다. 하지만 배가 고프지 않았다. 그러자 카페오레를 가져다주겠다고 했다.\n나는 카페오레를 좋아해서 받겠다고 했고, 그는 잠시 후 쟁반을 들고 돌아왔다. 마셨다. 그러고 나서 담배가 피우고 싶었다.\n엄마 앞에서 피워도 되는지 몰라서 망설였다. 생각해보니 아무 상관없었다. 수위에게 담배를 권했고 우리는 함께 피웠다.\n그때 수위가 말했다. \"아시다시피 어머니 친구분들도 빈소를 지키러 오실 거예요. 관례거든요. 의자와 블랙커피를 가져와야겠어요.\"\n나는 등을 하나 끌 수 있는지 물었다. 흰 벽에 불빛이 반사되어 눈이 피로했다. 안 된다고 했다.\n전기 배선이 그렇게 되어 있어서 전부이거나 아무것도 아니거나라고. 나는 더 이상 그에게 신경 쓰지 않았다. 그는 나갔다가 돌아와 의자들을 늘어놓았다.\n의자 하나 위에는 커피포트 주위로 컵들을 쌓아 올렸다. 그러고는 엄마 건너편 내 맞은편에 앉았다. 간호사도 안쪽에 등을 돌리고 앉아 있었다.\n무엇을 하는지 보이지 않았다. 하지만 팔의 움직임으로 보아 뜨개질을 하는 것 같았다. 날이 포근했다. 카페오레가 몸을 덥혀주었다.\n열린 문으로 밤 냄새와 꽃 냄새가 들어왔다. 잠깐 졸았던 것 같다.\n스치는 소리에 잠에서 깼다. 눈을 감고 있었더니 방이 더욱 눈부시게 하얗게 보였다.\n내 앞에 그림자 하나 없이 모든 사물, 모든 모서리, 모든 곡선이 눈에 상처를 줄 만큼 선명하게 드러났다.\n바로 그때 엄마의 친구들이 들어왔다. 모두 열 명쯤이었고 이 눈부신 빛 속으로 말없이 미끄러져 들어왔다.\n의자 소리 하나 내지 않고 앉았다. 나는 그들을 이제껏 어떤 사람도 본 적 없는 것처럼 바라보았다.\n얼굴도 옷도 세세한 것 하나 놓치지 않았다. 하지만 그들의 소리는 들리지 않았고 그들이 실재한다는 것을 믿기 어려웠다.\n여자들은 거의 모두 앞치마를 하고 있었고 허리를 조이는 끈이 불룩한 배를 더 도드라지게 했다.\n노파들의 배가 이렇게 클 수 있다는 것을 나는 미처 알지 못했다. 남자들은 거의 모두 매우 여위었고 지팡이를 짚고 있었다.\n그들의 얼굴에서 이상했던 것은 눈을 볼 수 없다는 것이었다. 주름의 둥지 한가운데서 빛 없는 광채만이 보였다.\n자리에 앉자 대부분이 나를 바라보며 어색하게 고개를 끄덕였다. 이 없는 입이 입술을 먹어버린 채.\n그것이 인사인지 습관적인 버릇인지 알 수 없었다. 인사인 것 같았다.\n바로 그때 나는 그들 모두가 수위를 중심으로 내 맞은편에 앉아 고개를 끄덕이고 있다는 것을 알아챘다.\n잠깐, 그들이 나를 심판하러 온 것 같다는 우스꽝스러운 인상을 받았다.\n잠시 후 여자 하나가 울기 시작했다. 뒷줄에 있어 다른 사람에게 가려져 잘 보이지 않았다. 규칙적으로 낮게 흐느꼈다.\n그치지 않을 것만 같았다. 다른 사람들은 듣지 못하는 것처럼 굴었다. 지치고 침울하고 말이 없었다.\n관을 바라보거나 지팡이를 보거나 그냥 어딘가를 바라보았다. 여자는 계속 울었다. 나는 몹시 놀랐다. 그녀를 알지 못했기 때문이다.\n그 소리를 더 듣고 싶지 않았다. 하지만 그렇게 말할 용기가 없었다.\n수위가 몸을 기울여 그녀에게 말을 걸었지만 그녀는 고개를 흔들고 뭔가 중얼거리며 같은 리듬으로 울음을 이어갔다. 수위가 내 쪽으로 왔다.\n내 옆에 앉았다. 한참 뒤에 그는 나를 보지 않고 알려주었다.\n\"어머니와 아주 친하게 지내셨다고 해요. 여기서 유일한 친구였는데, 이제는 아무도 없다고 하시는군요.\"\n우리는 오래 그렇게 있었다. 여자의 한숨과 흐느낌이 점점 줄어들었다. 코를 많이 훌쩍거렸다. 마침내 조용해졌다. 잠은 오지 않았지만 피곤했고 허리가 아팠다.\n이제는 이 모든 사람들의 침묵이 괴로웠다. 이따금 이상한 소리가 들렸는데 무슨 소리인지 알 수 없었다.\n한참 후에야 몇몇 노인들이 뺨 안쪽을 혀로 빠는 것이 그 소리를 내는 것임을 알아챘다. 너무 생각에 잠겨 자신들도 모르고 있었다.\n그들 사이에 누워 있는 그 망자가 자신들에게 아무 의미도 없는 것 같다는 인상마저 받았다.\n하지만 지금 생각해보면 그건 잘못된 인상이었을 것이다.\n수위가 따라준 커피를 모두 마셨다. 그 다음은 기억이 없다. 밤이 지나갔다.\n어느 순간 눈을 떠보니 노인들이 몸을 구부린 채 잠들어 있었다. 한 명만이 지팡이 위에 턱을 괸 채 나를 뚫어지게 바라보았다.\n내가 깨기만을 기다린 것처럼. 다시 잠들었다. 허리가 점점 더 아파서 깨어났다. 빛이 유리 지붕 위로 미끄러지고 있었다.\n잠시 후 노인 하나가 깨어나 심하게 기침을 했다. 체크무늬 커다란 손수건에 가래를 뱉었고 기침 한 번 할 때마다 무언가를 뽑아내는 것 같았다.\n그가 다른 사람들을 깨웠고 수위는 이제 가야 한다고 했다. 그들은 일어섰다. 이 불편한 밤샘이 그들의 얼굴을 잿빛으로 만들어놓았다.\n나갈 때, 내가 몹시 놀랍게도, 그들은 모두 나와 악수를 했다. 단 한 마디도 나누지 않은 밤이 우리를 친밀하게 해준 것처럼.\n피곤했다. 수위가 자기 집으로 데려가 몸을 씻을 수 있게 해주었다. 카페오레를 또 마셨는데 맛이 아주 좋았다.\n나왔을 때 날이 완전히 밝아 있었다. 마렝고와 바다를 가르는 언덕들 위로 하늘이 붉게 물들었다.\n그 위를 지나는 바람이 소금 냄새를 실어왔다. 좋은 날이 펼쳐지려 하고 있었다. 오래간만에 전원에 나온 것이었다.\n엄마만 없었다면 산책하는 것이 얼마나 즐거웠을지 느꼈다.\n하지만 플라타너스 아래 안뜰에서 기다렸다. 신선한 흙 냄새를 맡았고 졸음은 더 이상 없었다. 사무실 동료들을 생각했다.\n지금쯤 그들은 출근하기 위해 일어나고 있을 것이다. 나에게는 언제나 가장 힘든 시간이었다.\n그런 생각들을 조금 더 했지만 건물 안에서 울리는 종소리에 주의가 흩어졌다. 창문 뒤로 소란스러운 소리가 나다가 조용해졌다.\n해가 조금 더 높이 올라와 있었다. 발이 뜨거워지기 시작했다. 수위가 안뜰을 가로질러와 원장이 찾는다고 했다. 집무실로 갔다.\n원장은 여러 서류에 서명하게 했다. 그가 검은 옷에 줄무늬 바지를 입고 있다는 것을 알아챘다. 전화기를 들고 나에게 말했다.\n\"장의사 직원들이 잠시 전부터 와 있어요. 들어와서 관을 닫도록 할게요. 그 전에 어머니를 마지막으로 한 번 보시겠어요?\" \"아니요\"라고 했다.\n그는 수화기에 대고 목소리를 낮춰 지시했다. \"피제악, 직원들한테 들어와도 된다고 해요.\"\n그런 다음 자신도 장례에 참석하겠다고 했다. 나는 감사 인사를 했다. 그는 책상 뒤에 앉아 짧은 다리를 꼬았다.\n나와 자신 둘이서만, 그리고 담당 간호사와 함께하게 될 것이라고 했다. 입소자들은 원칙적으로 장례에 참석하면 안 됐다. 밤샘만 허락했다.\n\"인도주의적인 문제니까요\"라고 그는 말했다. 하지만 이번 경우에 엄마의 오랜 친구 한 명이 영구차를 따라갈 수 있도록 허락했다고 했다. \"토마 페레요.\"\n원장은 미소를 지었다. \"아시겠지만 좀 유치한 감정이에요. 하지만 그분과 어머니는 거의 붙어 다니셨거든요. 양로원에서 사람들이 놀려댔죠. 페레에게 '당신 약혼녀'라고요. 그는 웃었어요. 두 분 다 좋아하셨고요. 사실 뫼르소 부인의 죽음이 그분께 큰 충격이었어요. 허락을 거절하는 건 맞지 않다고 생각했어요. 하지만 담당 의사 조언에 따라 어제 밤샘은 말렸습니다.\"\n우리는 한참 동안 말이 없었다. 원장이 일어나 집무실 창으로 내다보았다. 잠시 후 이렇게 말했다. \"마렝고 신부님이 벌써 오셨네요. 일찍 오셨구나.\"\n마을 안에 있는 교회까지 걸어서 최소한 사십오 분이 걸릴 것이라고 했다. 우리는 내려갔다. 건물 앞에 신부와 복사 두 명이 있었다.\n한 명은 향로를 들고 있었고 신부는 그 쪽으로 몸을 굽혀 은색 사슬의 길이를 조절하고 있었다. 우리가 도착하자 신부가 몸을 일으켰다.\n그는 나를 \"얘야\"라고 부르며 몇 마디를 했다. 안으로 들어갔고 나는 그를 따랐다.\n관의 나사들이 모두 조여져 있었다. 방 안에 검은 옷을 입은 남자 네 명이 있었다.\n원장이 차가 도로에 기다리고 있다고 말하는 소리와 신부가 기도를 시작하는 소리가 동시에 들렸다. 그 순간부터 모든 것이 아주 빠르게 흘러갔다.\n남자들이 천을 들고 관으로 다가갔다. 신부와 복사들, 원장과 나는 밖으로 나갔다. 문 앞에 모르는 부인이 있었다. \"뫼르소 씨\"라고 원장이 말했다.\n부인의 이름은 알아듣지 못했고 담당 간호사라는 것만 알 수 있었다. 그녀는 미소 없이 길고 마른 얼굴을 숙였다.\n우리는 운구를 위해 옆으로 비켰다. 운구하는 사람들 뒤를 따랐고 양로원을 나왔다. 문 앞에 차가 있었다.\n광택 있고 길쭉하고 반짝이는 차는 필통을 연상시켰다. 옆에는 우스꽝스러운 옷차림의 작은 남자, 의식 진행자가 있었다. 그리고 어색한 차림의 노인도 있었다.\n페레 씨라는 것을 알 수 있었다. 그는 둥근 챙이 달린 부드러운 중절모를 쓰고 있었다. 관이 문을 나올 때 그것을 벗었다.\n바지는 구두 위에서 꼬여 있었고 큰 흰색 깃이 달린 셔츠에는 너무 작은 검은 넥타이를 하고 있었다.\n입술은 검은 점들로 덮인 코 아래에서 떨렸다. 꽤 가는 흰 머리 사이로 이상하게 처진 귀들이 보였다.\n창백한 얼굴에서 핏빛 붉은 귀가 인상적이었다. 의식 진행자가 우리 자리를 정해주었다. 신부가 앞장섰고 차가 뒤따랐다. 차 주위로 남자 넷.\n그 뒤로 원장과 나. 맨 뒤에 담당 간호사와 페레 씨.\n하늘은 이미 햇볕으로 가득했다. 땅을 짓누르기 시작했고 열기가 빠르게 더해졌다. 왜 우리가 출발 전에 꽤 오래 기다렸는지 모르겠다.\n어두운 옷 아래로 더웠다. 모자를 다시 쓴 작은 노인은 또 벗었다.\n나는 그 쪽으로 약간 몸을 돌려 그를 바라보고 있었고 원장이 그에 대해 이야기했다.\n엄마와 페레 씨가 저녁마다 간호사와 함께 마을까지 산책을 다녔다고 했다. 나는 주변 전원을 바라보았다.\n하늘 가까운 언덕으로 이어지는 사이프러스 나무 줄기들 사이로 적갈색과 초록의 땅, 드문드문 뚜렷하게 자리한 집들을 보며 엄마를 이해했다.\n저녁이면 이 땅은 우울한 휴전 같은 것이 되었을 것이다. 오늘은 넘쳐흐르는 햇볕이 풍경을 떨게 하며 비인간적이고 암울하게 만들었다.\n걷기 시작했다. 바로 그때 페레가 약간 절뚝인다는 것을 알아챘다. 차는 점점 속도를 높였고 노인은 뒤처졌다.\n차 주위를 걷던 남자 중 하나도 뒤처져 이제 나와 나란히 걷고 있었다. 해가 하늘에서 얼마나 빠르게 올라오는지 놀라웠다.\n이미 오래전부터 들판이 벌레 소리와 풀의 퍼석거림으로 웅웅대고 있다는 것을 알아챘다. 뺨 위로 땀이 흘렀다. 모자가 없어서 손수건으로 바람을 부쳐댔다.\n장의사 직원이 뭔가 말했지만 알아듣지 못했다. 그는 왼손에 든 손수건으로 두피를 닦으면서 오른손으로는 모자 챙을 들어올리고 있었다. \"다시요?\"라고 했다.\n그는 하늘을 가리키며 다시 말했다. \"장난 아니네요.\" \"그러네요\"라고 했다. 잠시 후 그가 물었다. \"저 안에 어머니세요?\" 다시 \"그렇습니다\"라고 했다. \"연로하셨나요?\"\n\"그런 편이요\"라고 했다. 정확한 나이를 몰라서. 그런 다음 그는 입을 다물었다.\n뒤를 돌아보니 페레 노인이 오십 미터쯤 뒤에서 모자를 손에 들고 흔들며 서두르고 있었다. 원장도 바라보았다.\n그는 쓸데없는 몸짓 하나 없이 위엄 있게 걸었다. 이마에 땀방울 몇 개가 맺혔지만 닦지 않았다.\n행렬이 조금 더 빠르게 움직이는 것 같았다. 주위는 여전히 똑같은 햇볕이 가득 찬 밝은 전원이었다. 하늘의 눈부심은 견디기 어려웠다.\n어느 순간 새로 공사한 도로 구간을 지나갔다. 햇볕이 아스팔트를 터뜨려놓았다. 발이 거기 빠져들었고 반짝이는 속살이 벌어진 채 남았다.\n차 위로 마부의 모자는 삶은 가죽 재질로 이 검은 진흙 속에서 빚어낸 것 같았다.\n나는 파랗고 하얀 하늘과 이 단조로운 색깔들 사이에서 조금 멍해졌다. 벌어진 아스팔트의 끈적한 검정, 옷들의 칙칙한 검정, 차의 옻칠한 검정.\n이 모든 것들—햇볕, 차에서 나는 가죽 냄새와 말똥 냄새, 니스 냄새와 향 냄새, 뜬눈으로 보낸 밤의 피로—이 나의 시선과 생각을 어지럽혔다.\n한 번 더 뒤를 돌아보았다. 페레는 아주 멀리 열기의 안개 속에서 보이다가 더 이상 보이지 않았다.\n눈으로 찾았더니 도로를 벗어나 들판을 가로지르는 것이 보였다. 앞쪽 도로가 꺾인다는 것도 알아챘다.\n페레가 지형을 알고 지름길로 우리를 따라잡으려 한다는 것을 이해했다. 모퉁이에서 그는 우리와 합류했다. 그런 다음 또 놓쳤다. 다시 들판을 가로질렀다.\n이것이 몇 번이나 반복되었다. 나는 관자놀이에서 피의 박동을 느꼈다.\n그 다음은 너무나 빠르고 확실하고 자연스럽게 일어나 아무것도 기억나지 않는다. 단 한 가지만: 마을 어귀에서 담당 간호사가 내게 말을 걸었다.\n그 얼굴과 어울리지 않는 이상한 목소리였다. 곱고 떨리는 목소리로 말했다.\n\"천천히 가면 열사병 위험이 있어요. 하지만 너무 빠르게 가면 땀이 나서 교회에서 감기에 걸려요.\" 그녀의 말이 맞았다. 빠져나갈 방법이 없었다.\n그날에 대해 몇 가지 이미지들은 여전히 남아 있다. 마을 가까이에서 마지막으로 우리와 합류했을 때 페레의 얼굴.\n굵은 눈물이 긴장과 슬픔으로 그의 뺨을 흘렀다. 하지만 주름 때문에 흘러내리지 못했다.\n눈물이 퍼지고 만나 이 망가진 얼굴 위에 물의 막을 만들었다.\n교회도 있었고 인도 위의 마을 사람들도, 묘지 무덤들의 붉은 제라늄도, 페레가 기절하는 것도—마치 관절이 풀린 인형 같았다—엄마의 관 위로 굴러 떨어지는 핏빛 흙도, 거기 뒤섞이는 뿌리들의 흰 살도, 또 사람들, 목소리들, 마을, 어느 카페 앞에서의 기다림, 모터의 끊임없는 웅웅거림도.\n그리고 버스가 알제의 빛들의 둥지로 들어갔을 때, 열두 시간을 자러 간다고 생각했을 때의 기쁨도.";

T[1]="깨어나서야 사장이 이틀 휴가를 신청했을 때 왜 그리 못마땅해 했는지 이해했다. 오늘이 토요일이었다. 거의 잊고 있었는데 일어나면서 그 생각이 떠올랐다.\n사장은 당연히 일요일까지 합쳐 나흘 휴가를 갖게 된다고 생각했을 것이다. 그게 마음에 들지 않았을 것이다.\n하지만 한편으로 엄마가 오늘이 아닌 어제 묻힌 것은 내 잘못이 아니었다. 다른 한편으로 토요일과 일요일은 어차피 내 것이었다.\n물론 그렇다고 사장을 이해 못 하는 건 아니다.\n일어나기가 힘들었다. 어제 하루가 고단했다. 면도를 하면서 무엇을 할지 생각했고 수영을 하러 가기로 했다. 항구 목욕 시설에 가려고 전차를 탔다.\n거기서 바다로 뛰어들었다. 젊은이들이 많았다. 물속에서 마리 카르도나를 만났다. 예전에 내 사무실에서 일하던 타자수였다. 그때 나는 그녀를 원했다.\n그녀도 그랬던 것 같다. 하지만 그녀가 곧 떠나버려서 시간이 없었다.\n그녀가 부표 위로 올라타는 것을 도왔는데 그 과정에서 그녀의 가슴을 스쳤다.\n그녀가 이미 부표 위에 엎드려 있을 때 나는 아직 물속에 있었다. 그녀가 나를 향해 돌아누웠다. 눈에 머리카락이 흘러내렸고 웃고 있었다.\n나는 그녀 옆 부표 위로 올라탔다. 날이 좋았다. 장난삼아 머리를 뒤로 젖혀 그녀의 배 위에 올려놓았다.\n그녀는 아무 말도 하지 않았고 나는 그대로 있었다. 눈 가득 하늘이 들어왔다. 파랗고 황금빛이었다.\n목 아래로 마리의 배가 천천히 뛰는 것이 느껴졌다. 우리는 부표 위에서 오래 있었다. 반쯤 잠들어 있었다.\n햇볕이 너무 강해지자 그녀가 뛰어들었고 나도 따랐다. 그녀를 따라잡아 허리를 감았고 우리는 함께 헤엄쳤다. 그녀는 여전히 웃고 있었다.\n부두에서 몸을 말리며 그녀가 말했다. \"나는 당신보다 피부가 더 까매요.\" 저녁에 영화를 보러 가겠냐고 물었다.\n그녀는 다시 웃으며 페르낭델이 나오는 영화를 보고 싶다고 했다. 옷을 입다가 그녀는 내가 검은 넥타이를 한 것을 보고 몹시 놀란 듯 상복이냐고 물었다.\n엄마가 죽었다고 했다. 언제부터냐고 묻기에 \"어제부터요\"라고 했다. 그녀는 살짝 물러났지만 아무 말도 하지 않았다.\n내 잘못이 아니라고 말하고 싶었지만 사장에게 이미 한 말이라는 생각에 멈췄다. 아무 의미가 없었다. 어차피 사람은 언제나 조금씩은 잘못이 있다.\n저녁에 마리는 모든 것을 잊은 것 같았다. 영화는 가끔 웃기다가 정말 너무 바보 같았다. 그녀의 다리가 내 다리에 닿아 있었다.\n그녀의 가슴을 어루만졌다. 상영이 끝날 무렵 키스했는데 잘 되지 않았다. 나오면서 그녀는 우리 집에 왔다.\n깨어보니 마리는 가고 없었다. 숙모 집에 가야 한다고 했다. 일요일이라는 생각이 들었고 짜증이 났다. 나는 일요일이 싫다.\n다시 침대에서 몸을 뒤척이며 베개에서 마리의 머리카락이 남긴 소금 냄새를 찾았고 열 시까지 잠들었다.\n그러고 나서 누운 채 정오까지 담배를 피웠다. 늘 그러듯 셀레스트 식당에서 점심을 먹고 싶지 않았다.\n분명히 이것저것 물어볼 것이었고 그게 싫었다. 달걀을 스스로 요리해 그릇째 먹었다. 빵이 없었지만 사러 내려가고 싶지 않았다.\n점심 후 조금 지루해져 아파트 안을 서성였다. 엄마가 있을 때는 아늑했다. 지금은 나에게 너무 넓어서 식당 테이블을 내 방으로 옮겨놓았다.\n이제 나는 이 방에서만 산다. 약간 움푹 팬 밀짚 의자들, 거울이 노래진 장롱, 세면대, 구리 침대. 나머지는 방치되어 있다.\n조금 후 뭔가를 하려고 오래된 신문을 집어 읽었다. 크뤼셴 소금 광고를 오려내어 신문에서 재미있다고 생각한 것들을 붙여두는 오래된 공책에 붙였다.\n손도 씻었다. 그리고 발코니로 나갔다.\n내 방은 변두리의 큰길로 나 있다. 오후가 아름다웠다. 하지만 포장도로는 기름지고 사람들은 드물었고 아직 서두르고 있었다.\n처음에는 산책 나온 가족들이 지나갔다. 무릎 아래로 내려오는 반바지를 입은 작은 남자아이 둘은 뻣뻣한 옷에 조금 얽매인 듯했다.\n여자아이 하나는 크고 분홍빛 리본을 달고 검은 에나멜 구두를 신고 있었다.\n그 뒤로 갈색 비단 원피스를 입은 덩치 큰 엄마와 눈에 익은 왜소하고 가냘픈 남편.\n그는 밀짚모자에 나비 넥타이를 하고 지팡이를 손에 들고 있었다. 그가 부인과 함께 있는 것을 보고서야 동네 사람들이 왜 그를 점잖다고 하는지 이해했다.\n조금 후에는 변두리 젊은이들이 지나갔다. 기름 바른 머리에 붉은 넥타이, 잘록하게 재단된 재킷, 수놓은 포켓치프, 네모난 코 구두.\n시내 극장에 가는 것 같았다. 그래서 일찍 나서며 전차를 향해 큰 소리로 웃으며 서두르는 것이었다.\n그들이 지나가자 거리는 조금씩 한산해졌다. 공연이 어디서나 이미 시작됐을 것이다. 거리에는 상인들과 고양이들뿐이었다.\n하늘은 맑았지만 거리를 따라 늘어선 벤자민나무들 위로 빛이 없었다. 맞은편 보도에서 담배 가게 주인이 의자를 꺼내 가게 앞에 놓고 두 팔을 등받이에 얹은 채 걸터앉았다.\n조금 전까지 가득 찼던 전차들이 거의 비어 있었다. 담배 가게 옆 작은 카페 '피에로 집'에서 종업원이 텅 빈 홀의 톱밥을 쓸고 있었다.\n정말 일요일이었다.\n담배 가게 주인처럼 편할 것 같아서 내 의자를 돌려 같은 방향으로 놓았다.\n담배 두 개비를 피우고 초콜릿 한 조각을 가지러 안으로 들어갔다가 창가로 돌아와 먹었다.\n잠시 후 하늘이 어두워졌고 여름 소나기가 올 것 같았다. 하지만 조금씩 개었다.\n구름이 지나가며 거리 위에 비의 약속 같은 것을 남겨 거리가 더 어두워졌다. 나는 오래 하늘을 바라보았다.\n다섯 시에 전차들이 소란스럽게 들어왔다. 교외 경기장에서 돌아오는 관중들이 발판과 난간에 매달려 있었다. 다음 전차들은 선수들을 실어왔다.\n작은 가방으로 알아볼 수 있었다. 그들은 목청껏 소리 지르고 노래했다. 자기 팀은 절대 지지 않는다고. 여럿이 나에게 손을 흔들었다.\n한 명은 \"우리가 이겼어요\"라고 소리쳤다. 나는 고개를 끄덕이며 \"예\"라고 했다. 그 순간부터 자동차들이 밀려오기 시작했다.\n하루가 조금 더 기울었다. 지붕 위로 하늘이 붉게 물들었고 저녁이 찾아오면서 거리가 활기를 띠었다. 산책하던 사람들이 하나둘 돌아왔다.\n점잖은 남자도 다른 사람들 사이에서 알아볼 수 있었다. 아이들은 울거나 질질 끌려다녔다. 이내 동네 극장들이 거리로 관객들을 쏟아냈다.\n그중 젊은이들의 몸짓이 평소보다 힘찼다. 모험 영화를 봤을 것이라고 생각했다. 시내 극장에서 돌아오는 사람들은 조금 더 늦게 도착했다.\n더 무거워 보였다. 여전히 웃고 있었지만 이따금 피곤하고 생각에 잠긴 것 같았다. 그들은 거리에 머물며 맞은편 보도를 왔다 갔다 했다.\n동네 젊은 여자들은 머리를 풀고 팔짱을 끼고 다녔다. 젊은 남자들은 그들과 엇갈리도록 자리를 잡고 농담을 던졌고 그녀들은 고개를 돌리며 웃었다.\n내가 아는 여자들 몇몇이 나에게 손을 흔들었다.\n거리의 가로등이 갑자기 켜졌다. 밤하늘로 올라오던 첫 별들이 빛을 잃었다. 사람들과 빛으로 가득 찬 보도를 바라보느라 눈이 피로해지는 것이 느껴졌다.\n가로등이 젖은 포장도로를 빛나게 했다. 전차들은 일정한 간격으로 반짝이는 머리카락, 미소, 은팔찌 위에 그 빛을 새겼다.\n잠시 후 전차가 드물어지고 나무들과 가로등 위로 밤이 이미 새카매지면서 동네가 서서히 비어갔다.\n마침내 고양이 한 마리가 다시 텅 빈 거리를 천천히 가로질렀다. 저녁을 먹어야 한다는 생각이 들었다.\n의자 등받이에 오래 기대어 있어서 목이 약간 아팠다. 빵과 파스타를 사러 내려가서 요리를 하고 서서 먹었다.\n창가에서 담배를 피우려 했지만 공기가 차가워져 있었고 조금 추웠다. 창문을 닫고 돌아오다 거울에 비친 탁자 끝이 보였다.\n알코올 램프 옆에 빵 조각들이 있었다. 어차피 일요일 하루를 또 넘겼다는 생각이 들었다. 엄마는 이제 묻혔다.\n내일부터 일을 다시 시작할 것이다. 달라진 것은 아무것도 없었다.";

T[2]="오늘 사무실에서 일을 많이 했다. 사장이 다정하게 대해주었다. 너무 피곤하지 않냐고 물었고 엄마의 나이도 알고 싶어했다.\n틀리지 않으려고 \"예순 살 정도\"라고 했다. 왜인지 모르지만 그는 안도한 것 같았고 이제 다 끝난 일이라고 여기는 것 같았다.\n서류 뭉치가 내 책상 위에 쌓여 있었고 하나하나 다 처리해야 했다. 점심을 먹으러 나가기 전에 손을 씻었다.\n정오에 그 순간이 좋다. 저녁에는 그다지 즐겁지 않다. 하루 종일 쓴 수건이 완전히 젖어 있기 때문이다.\n언젠가 사장에게 그 말을 한 적이 있다. 그는 유감이지만 사소한 문제라고 했다.\n조금 늦게, 열두 시 반에 발송 담당 에마뉘엘과 함께 나왔다.\n사무실이 바다 쪽으로 나 있어서 우리는 잠깐 햇볕에 타오르는 항구의 화물선들을 바라보았다.\n그때 쇠사슬 소리와 폭음을 내며 트럭 한 대가 들어왔다. 에마뉘엘이 \"타고 갈까요?\"라고 했고 나는 뛰기 시작했다.\n트럭이 우리를 앞질렀고 우리는 그 뒤를 쫓았다. 소리와 먼지 속에 휩쓸렸다. 더 이상 아무것도 보이지 않았다.\n윈치와 기계들, 수평선 위에서 춤추는 돛대들, 옆으로 스쳐가는 선체들 사이에서 오직 달리기의 그 무질서한 추진력만이 느껴졌다.\n내가 먼저 발판을 딛고 뛰어올랐다. 그런 다음 에마뉘엘이 앉는 것을 도왔다. 우리는 숨이 차 있었다.\n트럭은 부두의 울퉁불퉁한 포장도로 위를 먼지와 햇볕 속에서 덜컹거리며 달렸다. 에마뉘엘은 숨이 넘어가도록 웃었다.\n땀을 흘리며 셀레스트 집에 도착했다. 그는 여전히 그 자리에 있었다. 커다란 배, 앞치마, 흰 콧수염. \"그래도 괜찮으세요?\"라고 물었다.\n괜찮다고 했고 배가 고프다고 했다. 아주 빠르게 먹고 커피를 마셨다.\n그런 다음 집으로 돌아와 포도주를 너무 많이 마신 탓에 잠깐 잠들었고, 깨어나서 담배가 피우고 싶었다. 늦어져서 전차를 잡으려고 뛰었다.\n오후 내내 일했다. 사무실이 몹시 더웠고 저녁에 나와서 부두를 따라 천천히 걸어서 돌아오는 것이 좋았다. 하늘이 초록빛이었고 마음이 좋았다.\n그래도 삶은 감자를 만들어 먹고 싶어서 곧장 집으로 들어갔다.\n계단을 오르다 어두운 층계에서 이웃인 살라마노 노인과 마주쳤다. 그는 개와 함께 있었다.\n그들이 함께 다니는 것을 본 지 팔 년이 됐다. 스패니얼은 피부병을 앓고 있었다.\n홍반 같은 것으로, 거의 모든 털이 빠지고 갈색 반점과 딱지로 뒤덮여 있었다.\n작은 방에서 둘이서만 오래 함께 살다 보니 살라마노 노인은 결국 개를 닮아버렸다. 얼굴에 붉은 딱지가 있고 털이 누렇고 듬성듬성했다.\n개는 주인의 모습을 닮아 허리를 구부리고 주둥이를 내밀며 목을 뻗는 자세가 되어 있었다. 같은 종처럼 보이지만 그들은 서로 미워한다.\n하루에 두 번, 열한 시와 여섯 시에, 노인은 개를 데리고 산책을 나간다. 팔 년째 경로가 바뀐 적이 없다.\n리옹 거리를 따라 개가 노인을 끌다가 살라마노 노인이 비틀거리면 개를 때리고 욕을 퍼붓는다. 개는 두려워서 엎드리고 질질 끌려간다.\n그러면 이번엔 노인이 끌게 된다. 개가 잊어버리면 다시 주인을 끌다가 또 맞고 또 욕을 먹는다.\n그러면 둘 다 보도에 멈춰 서서 바라본다. 개는 공포에 질려, 노인은 증오를 담아. 매일 그렇다.\n개가 오줌을 누려 하면 노인은 기다려주지 않고 끌어당긴다. 스패니얼은 뒤에 작은 물방울 자국을 남긴다. 집 안에서 실수를 하면 또 맞는다.\n팔 년째 계속되고 있다. 셀레스트는 언제나 \"안됐지요\"라고 하지만 결국 아무도 알 수 없는 일이다.\n계단에서 만났을 때 살라마노는 개에게 욕을 퍼붓고 있었다. \"이 쓰레기! 이 썩은 것!\" 개는 낑낑댔다.\n\"안녕하세요\"라고 했지만 노인은 계속 욕을 했다. 그래서 개가 무슨 짓을 했느냐고 물었다. 대답이 없었다. \"이 쓰레기! 이 썩은 것!\"만 되풀이했다.\n개의 목걸이를 만지작거리며 뭔가를 손보고 있는 것이 보였다. 더 큰 소리로 말했다.\n그러자 뒤돌아보지 않고 억눌린 분노 같은 것을 담아 대답했다. \"항상 저러니까요.\"\n그런 다음 네 발로 질질 끌려가며 낑낑대는 짐승을 끌고 가버렸다.\n바로 그때 다른 층계 이웃이 들어왔다. 동네에서는 그가 여자들 돈으로 산다고 했다. 직업을 물으면 \"창고 관리인\"이라고 했다.\n대체로 좋아하는 사람이 없었다. 하지만 그는 나에게 자주 말을 걸었고 때로는 내 방에 잠깐 들르기도 했다.\n내가 그의 말을 들어주기 때문이었다. 그가 하는 말이 흥미롭다고 생각했다. 게다가 그와 말하지 않을 이유도 없었다. 이름은 레몽 생테스였다.\n작은 키에 어깨가 넓고 코가 권투 선수 같았다. 언제나 아주 말끔하게 차려입고 있었다. 그도 살라마노에 대해 \"안됐지요\"라고 했다.\n역겹지 않냐고 묻기에 아니라고 했다.\n함께 올라갔고 막 작별을 하려는데 그가 말했다. \"집에 순대랑 포도주가 있어요. 저랑 한 끼 드실래요?\"\n요리를 안 해도 된다는 생각에 승낙했다. 그의 방도 하나뿐이었고 창문 없는 부엌이 딸려 있었다.\n침대 위에는 하얗고 분홍빛의 석고 천사상, 챔피언들의 사진, 누드 여자 사진 두세 장이 걸려 있었다. 방은 지저분했고 침대는 흐트러져 있었다.\n그는 먼저 석유 램프를 켜고 주머니에서 꽤 낡은 붕대를 꺼내 오른손을 감쌌다. 무슨 일이냐고 물었다. 시비를 거는 놈과 싸웠다고 했다.\n\"저 말이에요, 뫼르소 씨,\" 그가 말했다. \"저는 나쁜 사람이 아니에요. 하지만 성격이 급해요. 그놈이 '사나이라면 전차에서 내려봐'라고 했어요. 저는 '됐어, 진정해'라고 했죠. 그러자 사나이가 아니라고 했어요. 그래서 내렸죠. 그리고 말했어요. '그만해, 그게 낫겠어. 안 그러면 두들겨 패줄 테니까.'\n그놈이 '뭐가 어째?'라고 했어요. 그래서 한 대 쳤어요. 넘어졌죠. 일으켜 세우려고 했는데 바닥에서 발로 차는 거예요. 그래서 무릎으로 한 번, 주먹으로 두 번 쳤죠. 얼굴이 피투성이가 됐어요. 실컷 맞았냐고 물었더니 그렇다고 했어요.\"\n그 내내 생테스는 붕대를 매만지고 있었다. 나는 침대에 앉아 있었다. 그는 말했다.\n\"보다시피 제가 먼저 시비를 건 게 아니에요. 그놈이 저를 무시했으니까요.\" 맞는 말이었고 그렇다고 인정했다.\n그러자 그는 바로 이 일 때문에 내 조언이 필요했다고 했다.\n나는 세상 물정을 알고 인생을 아는 사람이니 도움을 줄 수 있을 것이고 그러면 자신도 내 친구가 되겠다고 했다.\n나는 아무 말도 하지 않았고 그는 친구가 되고 싶냐고 다시 물었다. 상관없다고 했더니 그는 기뻐하는 것 같았다.\n순대를 꺼내 팬에 구웠고 잔, 접시, 식기, 포도주 두 병을 꺼내 늘어놓았다. 모두 말없이 했다. 그런 다음 우리는 자리를 잡았다.\n먹으면서 그는 이야기를 시작했다. 처음에는 조금 망설였다. \"어떤 여자가 있었어요... 말하자면 내 정부였죠.\" 그가 싸운 남자는 그 여자의 오빠였다.\n그가 여자를 먹여 살렸다고 했다. 나는 아무 말도 하지 않았지만 그는 동네에서 뭐라고들 하는지 알지만 자신은 양심에 거리낄 게 없고 창고 관리인이라고 바로 덧붙였다.\n\"본론으로 들어가서,\" 그가 말했다. \"속임수가 있다는 걸 알게 됐어요.\" 그는 그녀가 살아가기에 딱 충분한 것만 주었다.\n방세는 자신이 직접 냈고 하루 식비로 이십 프랑을 주었다. \"방세 삼백 프랑, 식비 육백 프랑, 가끔 스타킹, 그러면 천 프랑이에요. 그런데 부인은 일도 안 하면서 내가 주는 걸로는 부족하다고 했어요. 그래서 제가 말했죠. '반나절이라도 일하면 어때? 그 작은 것들에서 나를 좀 도와주는 거잖아. 이번 달에 원피스도 사줬고, 하루에 이십 프랑도 주고, 집세도 내주는데, 오후에 친구들과 카페에 가서 커피를 얻어마시고 있잖아. 커피도 설탕도 당신 친구들한테 사주면서. 나는 돈을 주잖아. 잘 대해줬는데 당신은 그걸 그렇게 갚는 거야.'\n그런데도 일을 안 했어요. 늘 부족하다고만 했어요. 그래서 속임수가 있다는 걸 알게 된 거예요.\"\n그러더니 그녀의 가방에서 복권을 발견했는데 어떻게 샀는지 설명을 못 했다고 했다.\n조금 후에는 그녀 집에서 전당포 \"영수증\"을 발견했고 두 팔찌를 맡긴 것이 밝혀졌다. 그때까지 그 팔찌들의 존재를 몰랐다.\n\"속임수가 있다는 게 분명했어요. 그래서 헤어졌죠. 헤어지기 전에 한 대 쳤어요. 그리고 할 말을 다 했죠. 그녀가 원하는 건 그저 자기 몸으로 즐기는 것뿐이라고. 뫼르소 씨, 제가 이렇게 말했어요. '세상이 내가 너한테 주는 행복을 얼마나 부러워하는지 몰라? 나중에 네가 가지고 있던 행복을 알게 될 거야.'\"\n피가 나도록 때렸다. 전에는 때리지 않았다. \"그냥 살살 쳤어요, 말하자면 다정하게. 조금 소리를 질렀어요. 덧문을 닫으면 늘 그렇게 끝났죠. 하지만 이번엔 심각했어요. 나로선 아직 충분히 벌을 준 게 아니에요.\"\n그는 그래서 조언이 필요하다고 설명했다. 그을음이 생기는 램프 심지를 손보려고 잠깐 멈췄다. 나는 여전히 그의 말을 듣고 있었다.\n포도주를 거의 리터 가까이 마셔서 관자놀이가 몹시 뜨거웠다. 내 담배가 다 떨어져서 레몽의 것을 피웠다.\n마지막 전차들이 지나가며 이제 멀어진 변두리의 소음들을 싣고 갔다. 레몽이 계속했다. 그를 괴롭히는 건 \"아직도 그 여자한테 감정이 있다\"는 것이었다.\n하지만 벌을 주고 싶었다. 처음에는 호텔로 데려가 풍기 단속반을 불러 추문을 일으키고 그녀를 포주에게 등록시킬까 생각했다. 그러다가 아는 사람들에게 부탁했다.\n아무것도 안 됐다. 레몽이 말했듯 그런 사람들을 알아봤자 아무 소용이 없었다. 그들이 그 말을 듣고는 그녀를 \"낙인찍자\"고 했다.\n하지만 그것도 원하는 게 아니었다. 더 생각해보기로 했다. 그 전에 먼저 뭔가를 물어보고 싶었다.\n사실 물어보기 전에 내가 이 이야기를 어떻게 생각하는지 알고 싶다고 했다. 특별히 생각하는 건 없고 흥미롭다고 했다.\n속임수가 있다고 생각하느냐고 물었다. 그런 것 같다고 했다. 벌을 줘야 한다고 생각하느냐, 자신이라면 어떻게 하겠느냐고 물었다.\n알 수 없는 일이지만 벌을 주고 싶다는 마음은 이해한다고 했다. 포도주를 한 잔 더 마셨다.\n그는 담배에 불을 붙이고 자신의 생각을 털어놓았다. 그녀에게 편지를 쓰고 싶다고 했다. \"찍어 누르면서 동시에 후회하게 만드는\" 편지를.\n그녀가 돌아오면 잠자리를 갖고 \"딱 끝나는 순간에\" 얼굴에 침을 뱉고 내쫓겠다고 했다. 그렇게 하면 확실히 벌을 받는 것이라고 생각했다.\n그런데 레몽은 필요한 편지를 쓸 자신이 없어서 나를 생각했다고 했다.\n내가 아무 말도 하지 않자 지금 바로 써줄 수 있겠냐고 물었다. 귀찮지 않다고 했다.\n그러자 그는 포도주 한 잔을 마신 후 자리에서 일어났다. 접시와 남은 순대 조각들을 치웠다. 테이블의 기름 천을 꼼꼼하게 닦았다.\n침대 옆 서랍장에서 모눈종이 한 장, 노란 봉투, 작은 빨간 나무 펜대, 네모난 보라색 잉크병을 꺼냈다.\n여자의 이름을 말했을 때 무어 여자라는 것을 알았다. 편지를 썼다. 조금 되는 대로 썼지만 레몽을 만족시키려고 신경을 썼다.\n만족시키지 않을 이유가 없었기 때문이었다. 그런 다음 편지를 소리 내어 읽었다. 그는 담배를 피우며 고개를 끄덕이며 들었다.\n그러고는 다시 읽어달라고 했다. 몹시 만족스러워했다. \"역시 세상 물정을 알고 있군\"이라고 했다. 처음에는 그가 나에게 반말을 한다는 것을 알아채지 못했다.\n\"이제 진짜 친구야\"라고 했을 때 비로소 그것이 눈에 들어왔다. 그 말을 반복했고 나는 \"그래요\"라고 했다.\n그의 친구가 되는 것은 상관없었고 그는 정말로 원하는 것 같았다. 그는 편지 봉투를 봉하고 우리는 포도주를 다 마셨다.\n잠시 말없이 담배를 피웠다. 밖은 고요했다. 지나가는 차 한 대의 미끄러지는 소리가 들렸다. \"늦었네요\"라고 했다. 레몽도 그렇게 생각했다.\n세월이 빠르다고 했고 어떤 의미에서는 맞는 말이었다. 졸렸지만 일어나기가 힘들었다. 피곤해 보였는지 레몽이 기운을 잃으면 안 된다고 했다.\n처음에는 무슨 말인지 이해하지 못했다. 그는 엄마의 죽음을 알고 있었지만 언젠가는 있을 일이라고 했다. 나도 그렇게 생각했다.\n자리에서 일어나자 레몽이 내 손을 꽉 쥐며 남자끼리는 항상 이해할 수 있다고 했다.\n그의 집을 나와 문을 닫고 잠시 어둠 속에 층계참에 서 있었다.\n집이 조용했고 계단 통 깊은 곳에서 어둡고 습한 기운이 올라왔다. 귓속에서 피가 웅웅대는 소리만 들렸다. 나는 움직이지 않고 서 있었다.\n그런데 살라마노 노인의 방에서 개가 낮게 낑낑댔다.";

T[3]="한 주 내내 일을 잘 했다. 레몽이 와서 편지를 부쳤다고 했다. 에마뉘엘과 두 번 영화를 보러 갔다.\n그는 화면에서 일어나는 일을 늘 다 이해하지는 못했다. 설명을 해줘야 했다. 어제는 토요일이었고 마리가 왔다. 약속대로였다. 그녀가 무척 탐났다.\n빨간색과 흰색 줄무늬의 예쁜 원피스에 가죽 샌들을 신고 있었다. 단단한 가슴이 드러났고 햇볕에 탄 피부가 얼굴을 꽃처럼 만들었다.\n버스를 타고 알제에서 몇 킬로미터 떨어진 해변으로 갔다. 바위 사이에 끼인 좁은 해변이었고 육지 쪽으로 갈대가 늘어서 있었다.\n네 시의 햇볕은 그리 뜨겁지 않았고 물은 미지근했다. 작고 길고 나른한 파도가 일었다. 마리가 놀이를 가르쳐주었다.\n헤엄을 치면서 파도 마루에서 물을 마시고 입 안에 거품을 가득 담은 다음 뒤로 누워 하늘을 향해 뿜어내는 것이었다.\n그러면 거품 레이스가 공중에서 사라지거나 미지근한 비가 되어 얼굴 위로 내려왔다. 하지만 잠시 후 입 안이 소금의 쓴맛에 타올랐다.\n그때 마리가 다가와 물속에서 몸을 내게 밀착시켰다. 그녀의 입이 내 입에 닿았다. 그녀의 혀가 내 입술을 식혀주었다.\n우리는 잠시 파도 속에서 뒹굴었다.\n해변에서 옷을 입을 때 마리는 빛나는 눈으로 나를 바라보았다. 키스했다. 그 순간부터 우리는 더 이상 말하지 않았다. 나는 그녀를 안았다.\n버스를 찾고, 돌아가고, 내 집으로 가고, 침대에 몸을 던지는 것이 급했다.\n창문을 열어놓았고 여름 밤이 우리의 탄 몸 위로 흐르는 것이 좋았다.\n오늘 아침 마리는 남아 있었고 나는 함께 점심을 먹겠다고 했다. 고기를 사러 내려갔다. 돌아오면서 레몽의 방에서 여자 목소리가 들렸다.\n조금 후 살라마노 노인이 개를 꾸짖었고 계단 나무 디딤판 위로 구두 소리와 발톱 소리가 들리더니 \"이 쓰레기, 이 썩은 것\"이라는 소리와 함께 그들이 거리로 나갔다.\n마리에게 노인 이야기를 해주었더니 웃었다. 그녀는 소매를 걷어 올린 내 파자마를 입고 있었다. 그녀가 웃을 때 나는 다시 그녀가 탐났다.\n잠시 후 그녀가 나를 사랑하느냐고 물었다. 그런 말은 아무 의미가 없지만 아마도 아닌 것 같다고 했다. 슬픈 표정이었다.\n하지만 점심을 준비하다가 아무 이유도 없이 다시 웃었고 나는 그녀에게 키스했다. 바로 그때 레몽의 방에서 다투는 소리가 터졌다.\n먼저 날카로운 여자 목소리가 들렸고 이어서 레몽이 말했다. \"나한테 그럴 수가 있어, 나한테 그럴 수가 있어. 어떻게 되는지 두고 봐.\"\n둔탁한 소리들이 났고 여자가 소리를 질렀다. 너무 끔찍한 비명이어서 즉시 층계참에 사람들이 몰렸다. 마리와 나도 나갔다.\n여자는 여전히 소리치고 있었고 레몽은 계속 때리고 있었다. 마리가 끔찍하다고 했고 나는 아무 말도 하지 않았다.\n순경을 부르러 가달라고 했지만 나는 순경이 싫다고 했다. 하지만 2층에 사는 배관공 세입자와 함께 순경이 한 명 들어왔다.\n그가 문을 두드렸지만 아무 소리도 들리지 않았다. 더 세게 두드렸고 잠시 후 여자가 울었고 레몽이 문을 열었다.\n담배를 입에 물고 부드러운 표정이었다. 여자가 문 앞으로 달려나와 레몽이 때렸다고 순경에게 말했다. \"이름\"이라고 순경이 말했다. 레몽이 대답했다.\n\"나한테 말할 때 담배 빼\"라고 순경이 말했다. 레몽은 망설이다가 나를 바라보더니 담배를 빨았다.\n그 순간 순경이 뺨 위로 묵직하고 두터운 손바닥으로 세게 때렸다. 담배가 몇 미터 앞에 떨어졌다.\n레몽은 얼굴빛이 변했지만 그 자리에서는 아무 말도 하지 않았다. 그러더니 꽁초를 주워도 되겠냐고 공손하게 물었다. 순경이 그러라고 하며 덧붙였다.\n\"다음에는 알아. 순경이 광대가 아니라는 거.\" 그 사이에 여자가 울면서 다시 말했다. \"때렸어요. 이 포주가.\" \"뫼르소 씨, 순경님\"이라고 레몽이 말했다.\n\"남자한테 포주라고 하는 게 법에 맞아요?\" 하지만 순경은 \"닥쳐\"라고 했다. 레몽은 여자를 향해 돌아서며 말했다. \"기다려, 꼬마야. 다시 만나자.\"\n순경이 여자는 나가고 레몽은 방에서 기다리라고 했다. 레몽이 떨고 있는 것은 취했기 때문이라고도 했다. 그때 레몽이 설명했다.\n\"취하지 않았어요, 순경님. 다만 이렇게 앞에 서 있으니 떨리는 겁니다. 어쩔 수 없어요.\" 그는 문을 닫았고 모두 떠났다.\n마리와 나는 점심 준비를 마쳤다. 하지만 마리는 식욕이 없었고 나는 거의 다 먹었다. 한 시에 그녀가 떠났고 나는 잠깐 잤다.\n세 시쯤 내 방 문을 두드렸고 레몽이 들어왔다. 나는 누운 채로 있었다. 그는 침대 가장자리에 앉았다.\n한동안 말이 없었고 어떻게 됐냐고 물었다. 그는 하고 싶었던 것을 했는데 여자가 그의 뺨을 때렸고 그래서 때렸다고 했다.\n나머지는 내가 봤다. 이제 벌을 받았으니 만족할 것 같다고 했다. 그도 그렇게 생각했다.\n순경이 어떻게 하든 여자가 맞은 것은 바뀌지 않는다고 했다. 그리고 순경들을 잘 알고 어떻게 다뤄야 하는지 안다고 했다.\n그러더니 순경이 뺨을 때렸을 때 내가 어떻게 반응하길 기다렸냐고 물었다. 아무것도 기다리지 않았고 순경이 싫다고 했다. 레몽은 몹시 기뻐했다.\n같이 나가겠냐고 물었다. 나는 일어나 머리를 빗기 시작했다. 증인이 되어달라고 했다. 상관없었지만 무슨 말을 해야 할지 몰랐다.\n레몽에 따르면 여자가 자신을 무시했다고 말하면 됐다. 증인이 되겠다고 했다.\n나가서 레몽이 브랜디를 샀다. 그런 다음 당구를 한 판 치고 싶어했고 나는 아슬아슬하게 졌다.\n유곽에 가고 싶다고 했지만 나는 그런 게 싫어서 싫다고 했다. 그래서 우리는 천천히 돌아왔다.\n그는 정부를 벌주는 데 성공해서 얼마나 기쁜지 이야기했다. 나한테 아주 다정하게 대했고 좋은 시간이라는 생각이 들었다.\n멀리서 현관 앞에 살라마노 노인이 보였다. 안절부절못하는 것 같았다. 가까이 다가갔더니 개가 없었다.\n사방을 바라보며 몸을 돌렸고 복도의 어둠을 뚫어보려 했고 두서없는 말들을 중얼거리다가 다시 작고 붉은 눈으로 거리를 샅샅이 훑었다.\n레몽이 무슨 일이냐고 물었지만 바로 대답하지 않았다. \"이 쓰레기, 이 썩은 것\"이라고 중얼거리는 것이 어렴풋이 들렸고 계속 안절부절못했다.\n개가 어디 있냐고 물었다. 그는 퉁명스럽게 가버렸다고 했다. 그러더니 갑자기 술술 말하기 시작했다.\n\"훈련장에 데려갔어요, 늘 하던 대로요. 야시장 주변에 사람들이 많았어요. '탈출의 왕'을 구경하려고 멈췄죠. 다시 가려는데 녀석이 없었어요. 물론 오래전부터 더 작은 목걸이를 사줘야 했는데. 하지만 그 썩은 놈이 그렇게 가버릴 줄은 꿈에도 몰랐어요.\"\n레몽은 개가 길을 잃었을 수 있고 돌아올 거라고 설명했다. 주인을 찾아 수십 킬로미터를 달려온 개들의 예를 들었다.\n그래도 노인은 더 불안해하는 것 같았다. \"잡아가겠죠, 아시잖아요. 누가 거둬준다면 모르지만. 그건 불가능해요. 딱지 때문에 모두들 역겨워하거든요. 순경들이 잡아갈 거예요, 틀림없어요.\"\n그러면 보호소에 가서 수수료를 내고 찾아오면 된다고 했다. 얼마나 비싸냐고 물었다. 몰랐다. 그러자 노인이 화를 냈다.\n\"그 썩은 놈한테 돈을 줘? 에라, 죽어버리면 그만이지!\" 그러더니 욕을 퍼붓기 시작했다. 레몽은 웃으며 집 안으로 들어갔다.\n나도 따라 들어갔고 우리는 층계참에서 헤어졌다. 잠시 후 노인의 발소리가 들렸고 그가 내 문을 두드렸다.\n문을 열었더니 그는 잠시 문지방에 서 있다가 말했다. \"미안해요, 미안해요.\" 들어오라고 했지만 거절했다.\n구두 끝을 바라보고 있었고 딱지 투성이의 손이 떨렸다. 나를 보지 않고 물었다.\n\"잡아가지 않겠죠, 뫼르소 씨? 돌려주겠죠. 안 그러면 저는 어떻게 되죠?\" 보호소는 사흘간 주인을 기다렸다가 그 후에는 알아서 처리한다고 했다.\n그는 말없이 나를 바라보았다. 그러더니 \"안녕히 계세요\"라고 했다. 문을 닫았고 그가 왔다 갔다 하는 소리가 들렸다. 침대가 삐걱댔다.\n그리고 칸막이 벽을 통해 전해지는 이상한 작은 소리에서 그가 울고 있다는 것을 알았다. 왜인지 모르겠지만 엄마 생각이 났다.\n하지만 다음 날 일찍 일어나야 했다. 배가 고프지 않아서 저녁을 먹지 않고 잠자리에 들었다.";

T[4]="레몽이 사무실로 전화를 했다. 친구 하나가 — 레몽이 나에 대해 얘기해두었다고 했다 — 일요일을 알제 근처 별장에서 함께 보내자고 초대한다고 했다.\n좋다고 했지만 친구와 약속이 있다고 했다. 레몽은 바로 그녀도 초대하겠다고 했다.\n친구의 아내가 남자들만 있는 무리에 혼자 있지 않아도 돼서 기뻐할 거라고 했다.\n사장이 시내에서 전화 오는 것을 싫어해서 바로 끊으려 했다. 하지만 레몽이 기다리라고 했다.\n저녁에도 이 초대를 전할 수 있었지만 다른 것도 알려주고 싶었다고 했다.\n전 정부의 오빠가 낀 아랍인 무리가 하루 종일 그를 따라다녔다고 했다. \"저녁에 집 근처에서 보이면 알려줘.\" 알겠다고 했다.\n잠시 후 사장이 불렀다. 순간 전화를 덜 받고 일을 더 열심히 하라는 말을 하려는 것 같아서 불편했다.\n전혀 그런 게 아니었다. 아직 막연한 계획 이야기를 하려 한다고 했다. 내 의견을 듣고 싶을 뿐이라고 했다.\n파리에 지사를 열어 현지에서 대형 회사들과 직접 거래할 생각이고 내가 갈 의향이 있는지 알고 싶다고 했다.\n파리에서 살 수도 있고 일 년 중 일부는 여행도 할 수 있을 거라고 했다.\n\"젊으니까, 그런 생활이 마음에 들 것 같은데요.\" 그렇다고 했지만 사실 상관없었다. 그러자 생활을 바꾸는 것에 관심이 없냐고 물었다.\n사람은 결코 생활을 바꾸지 않으며 어차피 모든 생활은 다 마찬가지고 지금 이 생활이 전혀 싫지 않다고 했다.\n그는 못마땅한 표정으로 내가 늘 엉뚱한 대답을 하고 야심이 없다고 했다. 사업에서 그것은 치명적인 결함이라고 했다. 나는 다시 일하러 갔다.\n그를 불쾌하게 만들고 싶지 않았지만 생활을 바꿀 이유가 없었다. 잘 생각해보면 나는 불행하지 않았다. 학생 때는 그런 종류의 야심이 많았다.\n하지만 학업을 그만두어야 했을 때 그런 것들이 아무 실제적인 의미가 없다는 것을 아주 빨리 이해했다.\n저녁에 마리가 나를 찾아와 결혼하고 싶냐고 물었다. 상관없고 그녀가 원하면 하겠다고 했다. 그러자 나를 사랑하냐고 물었다.\n전에 이미 한 번 했던 대답을 했다. 그런 말은 아무 의미가 없지만 아마도 사랑하지 않는 것 같다고.\n\"그럼 왜 결혼해요?\"라고 그녀가 말했다. 아무 상관없고 그녀가 원한다면 결혼할 수 있다고 설명했다.\n어차피 먼저 물어본 것은 그녀였고 나는 그냥 그러겠다고 한 것이었다. 그러자 결혼은 중요한 일이라고 했다. \"아니요\"라고 했다.\n그녀는 잠시 말이 없다가 나를 조용히 바라보았다. 그런 다음 말했다.\n같은 방식으로 마음이 있는 다른 여자가 같은 제안을 해도 받아들였겠냐는 것이었다. \"당연하죠\"라고 했다. 그러자 그녀는 자신이 나를 사랑하는지 생각해보았다.\n나는 그 점에 대해 아무것도 알 수 없었다. 다시 잠시 침묵이 흐른 뒤 그녀가 중얼거렸다.\n내가 이상하고 바로 그 때문에 아마도 나를 사랑하지만 어쩌면 언젠가 같은 이유로 나에게 역겨움을 느낄지도 모른다고.\n나는 덧붙일 말이 없어서 아무 말도 하지 않았고 그녀는 웃으며 내 팔을 잡고 나와 결혼하고 싶다고 했다.\n그녀가 원할 때 하면 된다고 했다. 그러고 나서 사장의 제안 이야기를 했더니 마리가 파리를 알고 싶다고 했다.\n한때 거기 살았다고 했더니 어떠냐고 물었다. \"더러워요. 비둘기들이 있고 안마당은 어둡죠. 사람들은 피부가 하예요.\"라고 했다.\n그런 다음 우리는 걸었다. 큰 길들을 지나 시내를 가로질렀다. 여자들이 아름다웠고 마리에게 그걸 알아채느냐고 물었다.\n그렇다고 했고 내 마음을 이해한다고 했다. 잠시 우리는 더 이상 말하지 않았다.\n하지만 그녀가 함께 있어주길 바랐고 셀레스트 집에서 같이 저녁을 먹자고 했다. 그녀도 그러고 싶었지만 할 일이 있다고 했다.\n우리 집 근처였고 나는 작별 인사를 했다. 그녀가 나를 바라보았다. \"내가 무슨 할 일이 있는지 물어보고 싶지 않아요?\"\n알고 싶었지만 생각을 못 했고 그것이 그녀가 나무라는 것 같았다.\n그러자 내가 어쩔 줄 모르는 표정을 보더니 다시 웃으며 온몸을 내 쪽으로 기울여 입술을 내밀었다.\n셀레스트 집에서 저녁을 먹었다. 이미 먹기 시작했을 때 이상한 작은 여자가 들어와 내 테이블에 앉아도 되냐고 물었다. 당연히 됐다.\n그녀는 동작이 끊어지고 사과처럼 작은 얼굴에 눈이 반짝였다. 재킷을 벗고 앉아 메뉴판을 정신없이 들여다보았다.\n셀레스트를 불러 정확하고 빠른 목소리로 요리를 전부 한꺼번에 주문했다. 전채 요리를 기다리는 동안 가방을 열어 작은 종이 한 장과 연필을 꺼내 미리 계산서를 뽑아놓았다.\n그런 다음 주머니에서 팁까지 더한 정확한 금액을 꺼내 자기 앞에 올려놓았다. 그때 전채 요리가 나왔고 그녀는 맹렬한 속도로 먹어치웠다.\n다음 요리를 기다리며 다시 가방에서 파란 연필과 그 주의 라디오 프로그램이 실린 잡지를 꺼냈다.\n아주 꼼꼼하게 거의 모든 방송에 하나씩 체크를 했다. 잡지가 십여 페이지여서 식사 내내 그 작업을 정성스럽게 계속했다.\n내가 이미 다 먹었을 때도 그녀는 똑같은 집중력으로 계속 체크하고 있었다. 그런 다음 일어나서 자동인형처럼 정확한 동작으로 재킷을 입고 떠났다.\n할 일이 없어서 나도 나가 잠깐 그녀를 따라갔다. 그녀는 인도 가장자리에 자리를 잡고 믿을 수 없는 속도와 확신으로 흔들림도 뒤돌아봄도 없이 길을 걸어갔다.\n결국 그녀를 놓쳐버리고 발걸음을 돌렸다. 이상한 여자라고 생각했지만 꽤 빨리 잊어버렸다.\n내 집 문 앞에서 살라마노 노인을 만났다. 들어오라고 했더니 개가 사라졌다고 했다. 보호소에 없었던 것이다. 직원들이 치였을지도 모른다고 했다.\n경찰서에서 알 수 없냐고 물었더니 그런 일은 매일 있는 일이라 기록하지 않는다고 했다.\n살라마노 노인에게 다른 개를 들이면 된다고 했지만 그 개에 익숙해져 있다는 말이 맞았다.\n나는 침대에 걸터앉았고 살라마노는 테이블 앞 의자에 앉았다. 나를 마주하고 두 손을 무릎 위에 올려놓고 있었다.\n낡은 중절모를 그대로 쓰고 있었다. 누런 콧수염 아래로 문장 조각들을 우물거렸다. 조금 지루했지만 할 일도 없었고 졸리지도 않았다.\n뭔가 말을 걸려고 개에 대해 물었다. 아내가 죽은 후에 얻었다고 했다. 결혼을 꽤 늦게 했다고 했다.\n젊었을 때는 연극을 하고 싶었다고 했다. 군 복무 때는 군 보드빌에서 연기를 했다고.\n하지만 결국 철도에 들어갔고 그것을 후회하지 않는다고 했다. 지금 조금이나마 퇴직금이 있으니까. 아내와 행복하지는 않았지만 대체로 잘 적응했다고 했다.\n아내가 죽었을 때 몹시 외로웠다. 그래서 공장 동료에게 개를 부탁했고 아주 어린 개를 얻었다. 젖병으로 먹여야 했다.\n개는 사람보다 수명이 짧으니 둘은 함께 늙어버렸다. \"성격이 나빴어요\"라고 살라마노가 말했다. \"가끔 다퉜어요. 그래도 좋은 개였죠.\"\n혈통이 좋다고 했더니 살라마노가 기뻐하는 것 같았다. \"게다가\"라고 그가 덧붙였다. \"병들기 전 모습은 못 보셨잖아요. 털이 가장 아름다웠는데.\"\n개가 그 피부병에 걸린 이후로 살라마노는 매일 아침저녁 연고를 발라주었다.\n하지만 그의 말로는 진짜 병은 노령이고 노령은 고칠 수 없는 것이었다.\n그때 나는 하품을 했고 노인이 가겠다고 했다. 있어도 된다고 했고 개 일이 안됐다고 했더니 고마워했다.\n엄마가 그의 개를 몹시 좋아했다고 했다. 엄마를 이야기하면서 그는 \"당신 가엾은 어머니\"라고 불렀다.\n엄마가 돌아간 뒤로 많이 슬프겠다는 말을 했고 나는 아무 말도 하지 않았다. 그러더니 빠르게, 그리고 어색한 표정으로 말했다.\n동네에서 내가 엄마를 양로원에 넣었다고 나쁘게 보는 것을 알지만 자신은 나를 알고 내가 엄마를 많이 사랑했다는 것도 안다고.\n왜인지는 아직도 모르겠지만 그 점에서 나쁘게 볼 거라는 것을 여태 몰랐다고 했다.\n하지만 엄마를 돌봐줄 돈이 없었으니 양로원은 당연한 일이었다고 했다. \"게다가\"라고 덧붙였다. \"오래전부터 엄마는 나에게 할 말이 없었고 혼자 지루해하고 있었어요.\"\n\"그렇죠\"라고 노인이 말했다. \"그래도 양로원에서는 동료들이 생기잖아요.\" 그런 다음 그는 실례라고 했다. 자고 싶었다.\n이제 생활이 달라졌고 어떻게 해야 할지 잘 모르겠다고 했다. 내가 그를 알게 된 후 처음으로 그는 슬그머니 손을 내밀었고 나는 그의 피부 딱지가 느껴졌다.\n그는 조금 미소를 짓다가 가기 전에 말했다. \"오늘 밤은 개들이 짖지 않으면 좋겠네요. 항상 내 녀석인 것 같아서요.\"";

T[5]="일요일, 일어나기가 힘들었다. 마리가 불러 흔들어야 했다. 일찍 수영을 하고 싶어서 먹지 않았다.\n몸이 완전히 텅 빈 느낌이었고 머리가 조금 아팠다. 담배 맛이 썼다. 마리는 내가 \"장례식 얼굴\"을 하고 있다며 놀렸다.\n그녀는 흰 무명 원피스를 입고 머리를 풀고 있었다. 예쁘다고 했더니 기뻐서 웃었다.\n내려가면서 레몽의 문을 두드렸다. 내려간다고 했다. 거리에서 피곤함 때문에, 그리고 덧문을 열지 않고 있었기 때문에 이미 햇볕으로 가득 찬 낮이 뺨을 때리듯 왔다.\n마리는 기뻐서 펄쩍펄쩍 뛰며 날씨가 좋다는 말을 멈추지 않았다. 기분이 나아졌고 배가 고프다는 것을 알아챘다.\n마리에게 말했더니 그녀는 수영복 두 벌과 수건을 넣은 기름 천 가방을 보여주었다.\n기다리는 일만 남았고 우리는 레몽이 문 닫는 소리를 들었다. 파란 바지에 반팔 흰 셔츠를 입고 있었다.\n하지만 밀짚모자를 써서 마리를 웃겼다. 검은 털 아래로 팔뚝이 매우 하얬다. 조금 역겨웠다.\n그는 내려오면서 휘파람을 불었고 아주 기분 좋아 보였다. 나에게는 \"잘 있었어, 친구\"라고 했고 마리는 \"아가씨\"라고 불렀다.\n전날 우리는 경찰서에 갔고 나는 여자가 레몽을 \"무시했다\"고 증언했다. 레몽은 경고만 받았다. 내 진술은 확인하지 않았다.\n문 앞에서 레몽과 그 이야기를 했다가 버스를 타기로 했다. 해변이 그리 멀지는 않았지만 그쪽이 빠를 것이었다.\n레몽은 친구가 우리가 일찍 오는 것을 기뻐할 거라고 했다. 막 출발하려는데 레몽이 갑자기 맞은편을 보라는 신호를 했다.\n담배 가게 앞에 아랍인 무리가 기대어 있었다. 말없이 우리를 바라보고 있었다. 하지만 돌멩이나 죽은 나무를 보듯, 그 이상도 이하도 아니게.\n레몽이 왼쪽에서 두 번째가 그놈이라고 했고 불안한 기색이었다. 하지만 이제 끝난 일이라고 덧붙였다. 마리는 잘 이해하지 못해 무슨 일이냐고 물었다.\n레몽에게 원한을 품은 아랍인들이라고 했다. 바로 떠나자고 했다. 레몽은 허리를 펴고 웃으며 서둘러야 한다고 했다.\n조금 더 가서 버스 정류장으로 갔고 레몽이 아랍인들이 따라오지 않는다고 했다. 뒤를 돌아보았다.\n그들은 여전히 같은 자리에서 우리가 떠난 곳을 같은 무관심으로 바라보고 있었다. 버스를 탔다.\n완전히 안도한 듯한 레몽이 마리에게 끊임없이 농담을 던졌다. 그녀가 그의 마음에 드는 것이 느껴졌지만 그녀는 거의 대꾸하지 않았다.\n이따금 웃으며 그를 바라보았다.\n알제 교외에서 내렸다. 해변은 버스 정류장에서 멀지 않았다. 하지만 바다를 내려다보다가 해변으로 내려가는 작은 고원을 가로질러야 했다.\n고원은 누르스름한 돌들과 이미 단단하게 파란 하늘 아래 온통 하얀 아스포델로 덮여 있었다.\n마리는 기름 천 가방으로 꽃잎을 세게 쳐서 날리며 즐거워했다. 초록이나 흰 담장이 달린 작은 별장들 사이로 걸었다.\n타마리스크 나무 아래 베란다가 묻힌 것들도 있었고 돌 한가운데 아무것도 없이 서 있는 것들도 있었다.\n고원 끝에 닿기 전에 이미 잔잔한 바다가 보였고 더 멀리 맑은 물속에 졸리고 육중한 곶이 보였다.\n고요한 공기 속으로 가벼운 엔진 소리가 올라왔다. 저 멀리 아주 작은 트롤선 한 척이 눈부신 바다 위를 감지할 수 없을 듯이 천천히 나아가고 있었다.\n마리는 바위 붓꽃 몇 송이를 꺾었다. 바다로 내려가는 비탈에서 이미 몇몇 물놀이객이 있는 것이 보였다.\n레몽의 친구는 해변 끝에 있는 작은 나무 별장에 살았다. 집은 바위에 기대어 있었고 앞쪽을 받치는 기둥들은 이미 물에 잠겨 있었다.\n레몽이 소개했다. 친구는 마송이라고 했다. 키가 크고 체격이 좋고 어깨가 넓었다. 아내는 작고 통통하고 다정했으며 파리 억양을 썼다.\n바로 편하게 있으라고 했고 아침에 직접 잡은 생선 튀김이 있다고 했다. 집이 정말 예쁘다고 했더니 토요일, 일요일, 휴일마다 온다고 했다.\n\"아내와 잘 지내거든요\"라고 덧붙였다. 마침 그의 아내가 마리와 웃고 있었다. 처음으로 정말 결혼을 하게 되겠다는 생각이 들었다.\n마송은 수영을 하고 싶었지만 그의 아내와 레몽은 가지 않겠다고 했다. 우리 셋이 내려갔고 마리는 바로 물에 뛰어들었다.\n마송과 나는 잠깐 기다렸다. 그는 말이 느렸고 자신이 하는 말에 \"게다가 더 말하자면\"이라는 말을 덧붙이는 버릇이 있다는 것을 알아챘다.\n실제로는 아무것도 덧붙이지 않을 때도 그랬다. 마리에 대해 \"대단해요, 게다가 더 말하자면, 매력적이에요\"라고 했다.\n그 다음에는 그 버릇에 더 이상 신경 쓰지 않았다. 머리 위의 햇볕이 좋다는 것을 느끼는 데 바빴다.\n발 아래 모래가 뜨거워지기 시작했다. 물에 들어가고 싶은 마음을 조금 더 참다가 마송에게 \"가시죠?\"라고 했다. 뛰어들었다.\n마송은 천천히 들어가다가 발이 닿지 않자 뛰어들었다. 평영을 쳤는데 꽤 서툴러서 마리에게 합류하려고 그를 두고 갔다.\n물이 차가웠고 수영하는 것이 좋았다. 마리와 함께 멀리 나갔다. 우리는 동작에서도 기쁨에서도 하나가 된 것이 느껴졌다.\n먼 바다에서 물 위에 누웠다. 하늘을 향한 내 얼굴 위로 햇볕이 입 안으로 흘러드는 마지막 물기를 걷어냈다.\n마송이 해변으로 돌아가 햇볕 속에 눕는 것이 보였다. 멀리서 그는 거대해 보였다. 마리가 함께 헤엄치자고 했다.\n나는 그녀 뒤에 자리를 잡고 허리를 감았다. 그녀는 두 팔의 힘으로 나아갔고 나는 발로 차며 도왔다.\n아침 속으로 물 두드리는 작은 소리가 따라왔다. 피곤함이 느껴질 때까지. 그러고는 마리를 두고 규칙적으로 숨을 쉬며 헤엄쳐 돌아왔다.\n해변에서 마송 옆에 납작 엎드려 모래에 얼굴을 묻었다. \"좋군요\"라고 했더니 그도 그렇다고 했다. 잠시 후 마리가 왔다.\n나는 뒤집어 그녀가 다가오는 것을 바라보았다. 온몸에 소금물이 끈적거렸고 머리카락을 뒤로 젖히고 있었다. 그녀는 내 옆에 나란히 누웠다.\n그녀의 몸과 햇볕, 두 가지 온기가 나를 조금 잠들게 했다.\n마리가 나를 흔들며 마송이 올라갔다고 했다. 점심을 먹어야 한다고 했다.\n배가 고파서 바로 일어났는데 마리가 오늘 아침부터 키스를 안 했다고 했다. 맞는 말이었고 하고 싶기도 했다. \"물속으로 와요\"라고 그녀가 말했다.\n달려가 작은 첫 파도 속에 몸을 뻗었다. 몇 번 헤엄을 치고 그녀가 몸을 내게 붙였다.\n그녀의 다리가 내 다리를 감는 것이 느껴졌고 나는 그녀가 탐났다.\n돌아오니 마송이 벌써 불렀다. 몹시 배가 고프다고 했더니 그는 바로 아내에게 내가 마음에 든다고 했다.\n빵이 맛있었고 생선 몫을 게걸스럽게 먹었다. 이어서 고기와 감자튀김이 나왔다. 우리는 모두 말없이 먹었다. 마송은 포도주를 자주 마셨고 끊임없이 따라주었다.\n커피가 나왔을 때 머리가 조금 무거웠고 담배를 많이 피웠다. 마송과 레몽과 나는 함께 비용을 내고 8월을 해변에서 보내는 것을 이야기했다.\n마리가 갑자기 말했다. \"지금 몇 시인지 아세요? 열한 시 반이에요.\" 우리는 모두 놀랐지만 마송은 아주 일찍 먹었다고 했다.\n배고플 때가 점심 시간이니 당연하다고 했다. 마리가 왜 웃었는지 모르겠다. 조금 너무 마신 것 같았다.\n마송이 나에게 해변에서 같이 산책할 의향이 있냐고 물었다. \"아내는 점심 후에 항상 낮잠을 자요. 나는 그게 싫어요. 걸어야 해요. 건강에 좋다고 늘 얘기하죠. 하지만 어차피 그녀의 권리니까요.\"\n마리는 마송 부인의 설거지를 도우려 남겠다고 했다. 작은 파리 여자는 그러면 남자들을 내보내야 한다고 했다. 우리 셋은 내려갔다.\n햇볕이 모래 위에 거의 수직으로 내리쬐었고 바다 위의 눈부심은 견디기 어려웠다. 해변에는 아무도 없었다.\n고원을 따라 바다 위로 솟은 별장들 안에서 접시와 식기 소리가 들렸다. 땅에서 올라오는 돌의 열기 속에서 숨이 거의 막혔다.\n처음에 레몽과 마송은 내가 모르는 사람들과 일들에 대해 이야기했다. 그들이 오래전부터 알고 지냈고 한때 함께 산 적도 있다는 것을 알 수 있었다.\n물 쪽으로 걷다가 바다를 따라갔다. 가끔 다른 것보다 긴 작은 파도가 와서 캔버스 신발을 적셨다. 아무 생각도 없었다.\n맨머리 위의 햇볕에 반쯤 잠들어 있었다.\n그때 레몽이 마송에게 뭔가 말했는데 잘 들리지 않았다. 그런데 동시에 해변 저 끝 멀리서 작업복 차림의 아랍인 둘이 우리 쪽으로 오는 것이 보였다.\n레몽을 바라보았더니 \"그놈이야\"라고 했다. 우리는 계속 걸었다. 마송이 어떻게 여기까지 따라올 수 있었냐고 물었다.\n해수욕 가방을 들고 버스 타는 것을 봤을 거라고 생각했지만 아무 말도 하지 않았다.\n아랍인들이 천천히 다가왔고 이미 훨씬 가까워져 있었다. 우리는 걸음을 바꾸지 않았지만 레몽이 말했다.\n\"싸움이 나면 너, 마송, 두 번째를 맡아. 나는 내 놈을 맡겠어. 뫼르소, 다른 놈이 오면 네 몫이야.\"\n\"알았어\"라고 했고 마송은 두 손을 주머니에 넣었다. 뜨겁게 달아오른 모래가 이제 붉게 보였다. 우리는 일정한 걸음으로 아랍인들을 향해 나아갔다.\n거리가 규칙적으로 줄었다. 몇 걸음 앞에 왔을 때 아랍인들이 멈췄다. 마송과 나는 걸음을 늦췄다. 레몽은 곧바로 자기 놈에게 걸어갔다.\n그가 무슨 말을 했는지 잘 들리지 않았지만 상대가 박치기를 하려는 시늉을 했다. 레몽이 먼저 한 번 쳤고 바로 마송을 불렀다.\n마송은 자기 담당인 놈에게 가서 온몸의 무게로 두 번 쳤다. 아랍인은 얼굴을 아래로 하고 물속에 납작하게 엎어졌다.\n그 자리에 몇 초 있었고 그의 머리 주위로 거품이 수면에서 터졌다. 그 사이에 레몽도 쳤고 상대의 얼굴이 피투성이가 됐다.\n레몽이 나를 향해 돌아서며 말했다. \"어떻게 되는지 보여줄게.\" \"조심해, 칼이 있어!\" 하고 소리쳤다.\n하지만 레몽은 이미 팔이 열려 있었고 입이 찢겨 있었다.\n마송이 앞으로 뛰었다. 하지만 다른 아랍인이 일어나 무장한 놈 뒤에 자리를 잡았다. 우리는 감히 움직이지 못했다.\n그들은 칼로 우리를 제압하면서 우리를 바라보기를 멈추지 않고 천천히 물러났다. 충분한 거리가 확보됐다고 판단하자 그들은 빠르게 도망쳤다.\n우리는 햇볕 아래 못 박힌 채 남아 있었고 레몽은 피가 뚝뚝 떨어지는 팔을 꼭 쥐고 있었다.\n마송이 바로 고원에 일요일마다 오는 의사가 있다고 했다. 레몽은 바로 가고 싶어했다. 하지만 말을 할 때마다 상처에서 피가 거품을 만들었다.\n우리는 그를 부축해 최대한 빠르게 별장으로 돌아왔다. 레몽은 상처가 가볍고 의사에게 갈 수 있다고 했다.\n마송과 함께 떠났고 나는 남아 여자들에게 무슨 일이 있었는지 설명했다. 마송 부인은 울었고 마리는 매우 창백했다. 설명하기가 귀찮았다.\n결국 말을 멈추고 바다를 바라보며 담배를 피웠다.\n한 시 반쯤 레몽이 마송과 함께 돌아왔다. 팔에 붕대를 감고 입 끝에 반창고를 붙이고 있었다.\n의사가 별것 아니라고 했지만 레몽은 몹시 침울해 보였다. 마송이 웃기려 했지만 그는 여전히 말이 없었다.\n해변에 내려가겠다고 했을 때 어디 가냐고 물었다. 바람을 쐬고 싶다고 했다. 마송과 나는 같이 가겠다고 했다.\n그러자 레몽이 화를 내며 욕을 했다. 마송은 건드리지 말자고 했다. 나는 그래도 따라갔다.\n해변에서 오래 걸었다. 햇볕이 이제 짓누르듯 내리쬐었다. 모래 위에서, 바다 위에서 산산조각이 났다.\n레몽이 어디로 가는지 아는 것 같았지만 아마 아닐 것이었다. 해변 저 끝에 이르러 마침내 큰 바위 뒤 모래 속으로 흐르는 작은 샘물을 발견했다.\n거기서 그 두 아랍인을 만났다. 그들은 기름때 낀 작업복을 입고 누워 있었다. 완전히 침착하고 거의 만족스러운 듯 보였다.\n우리가 나타나도 달라지는 것이 없었다. 레몽을 친 놈이 아무 말 없이 그를 바라보았다.\n다른 놈은 작은 갈대를 불며 우리를 흘깃흘깃 바라보면서 그 악기에서 나오는 세 음을 끊임없이 반복했다.\n그 내내 햇볕과 이 침묵만 있었다. 샘물 소리와 세 음과 함께.\n그러더니 레몽이 권총 주머니에 손을 뻗었지만 상대는 움직이지 않았고 그들은 여전히 서로 바라보고 있었다.\n피리를 부는 놈의 발가락이 매우 크게 벌어져 있다는 것을 알아챘다. 하지만 상대에게서 눈을 떼지 않고 레몽이 내게 물었다. \"쏠까?\"\n아니라고 하면 혼자 흥분해서 분명히 쏠 거라는 생각이 들었다. 그래서 이렇게만 말했다. \"아직 아무 말도 안 했잖아. 그냥 쏘면 꼴사납지.\"\n침묵과 열기의 심장에서 물과 피리 소리가 다시 들렸다. 레몽이 말했다. \"그럼 욕을 해서 대꾸하면 쏘겠어.\"\n\"그래. 하지만 칼을 꺼내지 않으면 쏠 수 없어.\" 레몽이 조금 흥분하기 시작했다.\n상대는 여전히 불고 있었고 둘 다 레몽의 모든 동작을 지켜보았다. \"아니야\"라고 나는 레몽에게 말했다.\n\"사나이답게 붙어. 권총을 나에게 줘. 다른 놈이 끼어들거나 칼을 꺼내면 내가 쏠게.\"\n레몽이 권총을 건네줄 때 햇볕이 그 위에서 미끄러졌다. 하지만 우리는 여전히 움직이지 않았다. 마치 모든 것이 우리 주위에서 닫혀버린 것처럼.\n눈을 내리깔지 않고 서로를 바라보았다. 바다와 모래와 햇볕 사이에서, 피리와 물의 이중 침묵 속에서 모든 것이 여기에서 멈춰 있었다.\n이 순간 쏠 수도 있고 쏘지 않을 수도 있다고 생각했다. 그런데 갑자기 아랍인들이 뒤로 물러나며 바위 뒤로 미끄러져 들어갔다.\n레몽과 나는 그때 발걸음을 돌렸다. 그는 나아진 것 같았고 돌아가는 버스 이야기를 했다.\n별장까지 함께 갔고 그가 나무 계단을 오르는 동안 나는 첫 번째 계단 앞에 서 있었다. 머리가 햇볕으로 울리고 있었다.\n나무 층계를 올라가 다시 여자들을 상대해야 한다는 것이 막막했다. 하지만 눈멀게 하는 빛의 비가 하늘에서 쏟아지는 가운데 움직이지 않고 있는 것도 견디기 어려웠다.\n여기 있거나 떠나거나 마찬가지였다. 잠시 후 나는 해변으로 돌아가 걷기 시작했다.\n똑같은 붉은 작열이었다. 모래 위에서 바다가 작은 파도들의 빠르고 숨막히는 숨결로 헐떡이고 있었다.\n나는 바위를 향해 천천히 걸었고 햇볕 아래 이마가 부풀어 오르는 것이 느껴졌다. 이 열기 전부가 나를 짓누르며 내 전진을 막았다.\n뜨거운 큰 숨결이 얼굴에 닿을 때마다 이를 악물었고 바지 주머니 안에서 주먹을 쥐었다.\n온몸을 팽팽하게 조여 햇볕을, 그리고 그것이 나에게 쏟아붓는 불투명한 현기증을 이겨내려 했다.\n모래에서, 하얗게 바랜 조개껍데기에서, 유리 조각에서 빛의 칼날이 솟을 때마다 턱이 조여들었다. 오래 걸었다.\n멀리서 빛과 바다 먼지가 만든 눈부신 후광에 싸인 바위의 작고 어두운 덩어리가 보였다. 바위 뒤 시원한 샘물을 생각했다.\n그 물 소리를 다시 찾고 싶었고 햇볕과 노력과 여자의 울음에서 벗어나고 싶었고 마침내 그늘과 그 안식을 다시 찾고 싶었다.\n그런데 더 가까이 갔을 때 레몽의 그 아랍인이 돌아와 있는 것이 보였다.\n그는 혼자였다. 바위 그늘에 이마를 두고 누운 채 두 손을 목 아래 받치고 온몸을 햇볕에 노출하고 있었다.\n작업복이 열기 속에서 수증기를 피웠다. 조금 놀랐다. 나에게는 끝난 일이었고 나는 생각 없이 거기로 온 것이었다.\n그가 나를 보자마자 조금 몸을 일으키며 주머니에 손을 넣었다. 나는 당연히 윗도리 안에 레몽의 권총을 꼭 쥐었다.\n그러자 다시 뒤로 누웠지만 주머니에서 손을 빼지 않았다. 나는 그로부터 꽤 멀리, 열 미터쯤 떨어져 있었다.\n반쯤 감긴 눈꺼풀 사이에서 이따금 그의 시선이 느껴졌다. 하지만 대부분 그의 형상은 불타는 공기 속에서 내 눈앞에서 춤추었다.\n파도 소리는 정오보다 더 나른하고 잔잔했다. 똑같은 햇볕, 같은 모래 위의 같은 빛이 여기까지 이어지고 있었다.\n이미 두 시간째 낮이 더 이상 나아가지 않았다. 두 시간째 들끓는 금속의 바다에 닻을 내리고 있었다. 수평선에 작은 증기선이 지나갔다.\n나는 아랍인을 보기를 멈추지 않았기 때문에 그것의 검은 점을 눈 끝으로 어렴풋이 보았다.\n반 바퀴만 돌면 끝난다고 생각했다. 하지만 햇볕으로 진동하는 해변 전체가 내 뒤에 바짝 붙어 있었다. 샘물 쪽으로 몇 걸음 나아갔다.\n아랍인은 움직이지 않았다. 그래도 여전히 꽤 멀리 있었다. 어쩌면 얼굴의 그늘 때문에 웃고 있는 것처럼 보였다. 기다렸다.\n햇볕의 작열이 뺨을 타올랐고 눈썹에 땀방울들이 모이는 것이 느껴졌다. 엄마를 묻던 날의 햇볕과 똑같은 것이었다.\n그날처럼 이마가, 특히 이마가 아팠고 모든 혈관이 피부 아래에서 한꺼번에 뛰었다.\n더 이상 견딜 수 없는 이 작열 때문에 앞으로 한 동작을 했다.\n한 걸음 움직여도 햇볕에서 벗어나지 못한다는 것을 알고 있었다. 어리석은 짓이었다. 하지만 한 걸음, 딱 한 걸음 앞으로 나아갔다.\n그러자 이번에는 몸을 일으키지 않고 아랍인이 칼을 꺼내 햇볕 속에 내밀었다.\n빛이 강철 위에서 튀었고 그것은 마치 이마에 내리꽂히는 길고 번쩍이는 칼날 같았다.\n바로 그 순간 눈썹에 고였던 땀이 한꺼번에 눈꺼풀 위로 흘러내려 따뜻하고 두터운 베일로 덮었다. 눈물과 소금의 커튼 뒤에서 눈이 멀었다.\n이마 위에 햇볕의 심벌즈만 느껴졌고 여전히 내 앞에 있는 칼에서 터져 나온 빛나는 칼날이 희미하게.\n이 타오르는 검이 내 속눈썹을 갉아먹고 쑤시는 눈 속으로 파고들었다. 그때 모든 것이 흔들렸다. 바다가 두텁고 뜨거운 숨결을 실어왔다.\n하늘이 온 사방으로 열려 불비를 내리는 것 같았다. 온몸이 팽팽하게 조여들었고 손이 권총 위에서 경련했다. 방아쇠가 당겨졌다.\n매끄러운 손잡이 배를 만졌다. 그리고 그 건조하면서도 귀를 찌르는 소리 속에서 모든 것이 시작됐다. 땀과 햇볕을 털어냈다.\n내가 낮의 균형을, 내가 행복했던 해변의 예외적인 침묵을 부쉈다는 것을 이해했다.\n그런 다음 움직임도 없는 시체 위에 네 발을 더 쐈다. 총알들이 박혀 들어갔지만 드러나지 않았다.\n마치 불행의 문을 두드리는 네 번의 짧은 노크 같았다.";

T[6]="체포 직후 여러 번 심문을 받았다. 하지만 신원 확인 심문이었고 오래 걸리지 않았다.\n처음에 경찰서에서는 내 사건이 아무에게도 흥미를 끌지 않는 것 같았다. 팔 일 후, 예심 판사는 반대로 호기심을 담아 나를 바라보았다.\n하지만 처음에는 이름과 주소, 직업, 생년월일과 출생지만 물었다. 그런 다음 변호사를 선임했냐고 알고 싶어했다.\n하지 않았다고 했고 반드시 필요한 것인지 물었다. \"왜요?\"라고 그가 말했다. 내 사건이 아주 단순하다고 생각한다고 했다. 그는 웃으며 말했다.\n\"그건 하나의 의견이죠. 하지만 법이 있어요. 변호사를 선임하지 않으면 우리가 국선 변호인을 지정하겠습니다.\"\n사법부가 이런 세부적인 것들을 처리해준다는 것이 아주 편리하다고 생각했다. 그렇게 말했더니 그는 동의하며 법이 잘 만들어져 있다고 했다.\n처음에는 그를 진지하게 받아들이지 않았다. 그는 커튼으로 둘러쳐진 방에서 나를 맞았다.\n책상 위에 램프가 하나만 있었고 그것은 그가 앉혀준 안락의자를 비추었고 그 자신은 그늘 속에 있었다.\n책에서 비슷한 묘사를 읽은 적이 있었고 모든 것이 게임처럼 보였다. 하지만 대화를 나눈 뒤 나는 그를 바라보았다.\n이목구비가 섬세하고 파란 눈이 움푹 들어간 키 큰 남자였다. 길고 회색빛 콧수염에 거의 흰 머리카락이 풍성했다.\n이따금 입을 당기는 신경성 경련이 있긴 했지만 아주 이성적이고 전체적으로 호감이 가는 사람이었다.\n나오면서 그에게 손을 내밀려다가 내가 사람을 죽였다는 것을 제때 기억해냈다.\n다음 날 변호사가 교도소로 면회를 왔다. 키가 작고 통통했고 꽤 젊었으며 머리카락을 단정하게 붙이고 있었다.\n더운 날씨였는데도 — 나는 셔츠 차림이었다 — 짙은 색 양복에 뻣뻣한 깃, 굵은 흑백 줄무늬의 이상한 넥타이를 하고 있었다.\n옆구리에 끼고 온 서류 가방을 내 침대에 놓고 자기소개를 하더니 내 사건 파일을 검토했다고 했다.\n사건이 미묘하지만 성공을 의심하지 않는다고 했다. 자신을 믿어주면 된다고. 감사 인사를 했더니 \"본론으로 들어가죠\"라고 했다.\n그는 침대에 앉아 내 사생활에 대해 정보를 수집했다고 설명했다. 얼마 전 어머니가 양로원에서 돌아가셨다는 것이 알려졌다. 그래서 마렝고에서 조사를 했다.\n수사관들이 장례식 날 내가 \"무감각함을 드러냈다\"는 것을 알게 됐다고 했다. \"아시다시피\"라고 변호사가 말했다.\n\"이걸 물어보기가 조금 곤란해요. 하지만 매우 중요한 문제입니다. 반박할 것을 찾지 못하면 검찰 측의 큰 논거가 될 수 있거든요.\"\n그는 내 도움을 원했다. 그날 슬픔을 느꼈냐고 물었다. 그 질문이 몹시 놀라웠다.\n내가 그 질문을 해야 했다면 몹시 당혹스러웠을 것 같았다. 하지만 스스로를 돌이켜보는 습관을 잃은 것 같다고, 알려드리기 어렵다고 대답했다.\n분명히 엄마를 좋아했지만 그것이 아무 의미도 없었다. 건강한 사람은 누구나 사랑하는 사람의 죽음을 어느 정도 바란 적이 있다.\n여기서 변호사가 말을 끊으며 몹시 당황한 것 같았다. 법정에서도 예심 판사 앞에서도 절대로 그런 말을 하지 말라고 다짐을 받았다.\n하지만 나는 내 본성이 그런 것이라고, 신체적 욕구가 감정을 자주 방해한다고 설명했다. 엄마를 묻던 날 몹시 피곤했고 졸렸다.\n그래서 무슨 일이 일어나고 있는지 제대로 알아채지 못했다. 분명히 말할 수 있는 것은 엄마가 돌아가시지 않았으면 더 좋았을 것이라는 점이었다.\n하지만 변호사는 만족스럽지 않은 표정이었다. \"그것으로는 충분하지 않아요\"라고 했다.\n그는 잠시 생각했다. 그날 내가 자연스러운 감정을 억눌렀다고 말할 수 있겠냐고 물었다. \"아니요. 거짓이니까요\"라고 했다. 그는 나를 이상하게 바라보았다.\n마치 내가 약간 역겹다는 듯이. 거의 심술궂게 어차피 양로원의 원장과 직원들이 증인으로 불릴 것이고 그것이 \"나에게 매우 불리하게 작용할 수 있다\"고 했다.\n그 이야기는 내 사건과 관계가 없다고 지적했더니 법정을 한 번도 상대해본 적이 없다는 것이 분명하다는 말만 돌아왔다.\n그는 화난 표정으로 떠났다. 붙잡아서 더 잘 변호받으려는 것이 아니라 그냥 자연스럽게 — 그렇게 말할 수 있다면 — 그의 호감을 원한다고 설명하고 싶었다.\n무엇보다 그를 불편하게 만들고 있다는 것이 보였다. 그는 나를 이해하지 못했고 나를 조금 원망했다.\n나도 다른 모든 사람들과 똑같은 사람이라고 확인시켜 주고 싶었다. 완전히 똑같이.\n하지만 결국 이 모든 것이 그다지 쓸모가 없었고 귀찮아서 그냥 두었다.\n얼마 지나지 않아 다시 예심 판사 앞에 섰다. 오후 두 시였고 이번에는 그의 집무실이 엷은 망사 커튼으로 걸러진 빛으로 가득 차 있었다.\n몹시 더웠다. 나를 앉히더니 아주 정중하게 변호사가 \"사정이 생겨\" 오지 못했다고 했다.\n하지만 그의 질문에 대답하지 않고 변호사가 함께할 때까지 기다릴 권리가 있다고 했다. 혼자 대답할 수 있다고 했다.\n그는 테이블 위의 단추를 건드렸다. 젊은 서기가 와서 거의 내 등 뒤에 자리를 잡았다.\n우리는 둘 다 안락의자에 자리를 잡았다. 심문이 시작됐다. 그는 먼저 내가 말이 없고 내성적인 성격이라고들 한다며 그에 대해 어떻게 생각하냐고 했다.\n\"별로 할 말이 없어서요. 그러면 입을 다물고 있습니다\"라고 했다. 그는 처음처럼 미소를 지으며 그것이 가장 좋은 이유라고 했다.\n\"어차피 아무 상관없는 일이지만요\"라고 덧붙였다. 잠시 말이 없다가 나를 바라보더니 갑자기 몸을 세우며 빠르게 말했다. \"내가 관심을 갖는 것은 당신입니다.\"\n그 말의 의미를 잘 이해하지 못했고 아무 말도 하지 않았다. \"당신의 행동에서 이해하기 어려운 부분들이 있어요\"라고 그가 덧붙였다.\n\"당신이 이해할 수 있도록 도와줄 거라고 믿어요.\" 모든 것이 아주 단순하다고 했다. 그는 그날의 경위를 다시 말해달라고 했다.\n이미 이야기한 것들을 다시 말했다. 레몽, 해변, 수영, 다툼, 다시 해변, 작은 샘물, 햇볕, 권총 다섯 발.\n문장마다 그는 \"좋아요, 좋아요\"라고 했다. 쓰러진 시체에 이르자 \"좋습니다\"라고 했다.\n같은 이야기를 반복하는 것이 지겨웠고 이렇게 많이 말한 적이 없다는 생각이 들었다.\n침묵 후 그는 일어나 나를 도와주고 싶다고 했다. 내가 흥미롭다고 했다. 신의 도움으로 무언가를 해보겠다고 했다.\n하지만 그 전에 몇 가지를 더 묻고 싶다고 했다. 아무 맥락 없이 엄마를 사랑했냐고 물었다.\n\"그렇습니다, 다른 모든 사람들처럼\"이라고 했더니 지금까지 규칙적으로 타이핑하던 서기가 자판을 잘못 친 것인지 얽혀서 되돌아가야 했다.\n여전히 뚜렷한 논리 없이 판사는 다섯 발을 연속으로 쐈냐고 물었다.\n생각해보더니 처음에 한 발을 쏘고 몇 초 후에 나머지 네 발을 쐈다고 정확하게 말했다.\n\"왜 첫 번째와 두 번째 발 사이에 기다렸나요?\"라고 그가 말했다. 다시 한번 붉은 해변이 보이고 이마에 햇볕의 작열이 느껴졌다.\n하지만 이번에는 아무 대답도 하지 않았다. 그 뒤의 침묵 내내 판사는 안절부절못하는 것 같았다.\n앉았다가 머리를 헝클었다가 팔꿈치를 책상에 올리고 이상한 표정으로 나를 향해 약간 몸을 기울였다. \"왜, 왜 쓰러진 몸에 총을 쐈습니까?\"\n그것도 대답할 수 없었다. 판사는 두 손으로 이마를 짚었다가 조금 변한 목소리로 같은 질문을 반복했다. \"왜요? 말해주셔야 합니다. 왜요?\"\n나는 계속 침묵했다.\n갑자기 그는 일어나 큰 걸음으로 책상 끝으로 걸어가 서랍장에서 서랍을 열었다. 거기서 은십자가를 꺼내 나에게 다가오며 들어 올렸다.\n완전히 달라진, 거의 떨리는 목소리로 외쳤다. \"이분을 아십니까?\" \"그럼요, 당연하죠\"라고 했다.\n그러자 아주 빠르고 열정적으로 자신은 신을 믿으며, 어떤 인간도 신이 용서하지 못할 만큼 죄가 클 수 없다는 것이 그의 신념이지만, 그러기 위해서는 인간이 회개로 영혼이 비어 모든 것을 받아들일 준비가 된 아이처럼 되어야 있다고 말했다.\n그는 온몸을 테이블 위로 기울이며 십자가를 거의 내 머리 위에서 흔들었다. 솔직히 그의 논리를 잘 따라가지 못했다.\n첫째로 더웠고 집무실에 큼직한 파리들이 내 얼굴 위에 앉았기 때문이었다. 또 그가 조금 무서웠기 때문이기도 했다.\n동시에 그것이 우스꽝스럽다는 것도 알았다. 어차피 범인은 나였으니. 하지만 그는 계속했다.\n그의 생각으로는 내 자백에서 불분명한 점이 딱 하나, 두 번째 총을 쏘기 전에 기다린 것이라는 것을 대략 이해했다.\n나머지는 좋았지만 그것만은 이해가 안 된다고 했다.\n그 마지막 점은 그다지 중요하지 않다고 고집하는 것은 틀렸다고 말하려 했다.\n하지만 그가 말을 끊고 온 키로 일어서며 마지막으로 신을 믿냐고 물었다. 아니라고 했다. 그는 분개하며 앉았다.\n그것은 불가능하고 모든 인간은 신을 믿는다고 했다. 신의 얼굴에서 돌아선 사람들도.\n그것이 그의 신념이었고 만약 그것을 의심하게 된다면 그의 삶은 더 이상 의미가 없다고 했다. \"내 삶이 의미 없기를 바라세요?\"\n그것은 내 소관이 아니라고 했다. 하지만 그는 이미 테이블 너머로 그리스도를 내 눈앞에 들이밀며 터무니없이 외쳤다.\n\"나는 그리스도인입니다. 저분에게 당신의 죄를 용서해달라고 빌어요. 그분이 당신을 위해 고통받았다는 것을 어찌 믿지 않을 수 있습니까?\"\n그가 나에게 반말을 하는 것은 알아챘지만 이미 지쳐 있었다. 열기가 점점 더해졌다.\n늘 그렇듯이 귀찮아서 거의 듣지 않는 사람에게서 벗어나고 싶을 때 동의하는 것처럼 굴었다. 놀랍게도 그가 의기양양해했다. \"그것 봐요, 봐요\"라고 했다.\n\"믿어요, 그렇죠. 그분에게 자신을 맡길 거죠?\" 당연히 또 아니라고 했다. 그는 안락의자에 주저앉았다.\n몹시 피곤해 보였다. 대화를 내내 따라오던 서기가 마지막 문장들을 이어 치는 동안 그는 잠시 말이 없었다.\n그런 다음 나를 주의 깊게, 그리고 약간 슬픈 눈으로 바라보았다. 중얼거렸다.\n\"이렇게 완고한 영혼은 본 적이 없어요. 내 앞에 왔던 범죄자들은 이 고통의 형상 앞에서 항상 울었습니다.\"\n그것은 바로 그들이 범죄자들이기 때문이라고 대답하려 했다. 하지만 나도 그들과 같다는 생각이 들었다. 좀처럼 익숙해지기 어려운 생각이었다. 판사는 그때 일어섰다.\n심문이 끝났다는 신호 같았다. 지친 표정으로 내가 내 행동을 후회하냐고만 물었다. 생각해보더니 진정한 후회보다는 일종의 짜증 같은 것을 느낀다고 했다.\n그가 나를 이해하지 못하는 것 같았다. 하지만 그날은 그 이상 가지 않았다.\n그 후 예심 판사를 자주 다시 만났다. 다만 그때마다 변호사와 함께였다. 이전 진술들의 일부를 명확히 하는 것으로 그쳤다.\n또는 판사가 변호사와 혐의를 놓고 논의하기도 했다. 하지만 사실 그런 순간들에 그들은 나에게 관심을 기울이지 않았다.\n어쨌든 차츰 심문의 어조가 달라졌다. 판사가 더 이상 나에게 관심이 없는 것 같았고 어떤 의미에서 내 사건을 정리해둔 것 같았다.\n신 이야기는 다시 꺼내지 않았고 첫날의 흥분 속의 그 모습을 다시는 보지 못했다. 결과적으로 우리의 면담은 더 우호적이 됐다.\n몇 가지 질문, 변호사와의 짧은 대화, 그러면 심문이 끝났다. 판사 자신의 표현으로도 내 사건은 \"진행 중\"이었다.\n가끔 일반적인 성격의 대화를 나눌 때는 나도 끼워주었다. 그런 시간에 나는 숨통이 트이기 시작했다.\n그 시간들에는 아무도 나에게 나쁘게 굴지 않았다. 모든 것이 이토록 자연스럽고 잘 조율되어 있었으며 절제되게 진행되어서 \"가족의 일원이 된 것 같다\"는 우스꽝스러운 인상을 받았다.\n그리고 이 수사가 지속된 열한 달이 끝날 무렵 나는 판사가 집무실 문까지 나를 바래다주며 어깨를 두드리고 다정하게 \"오늘은 끝났어요, 적그리스도 씨\"라고 했던 그 드문 순간들 말고 다른 무엇이 즐거웠던 적이 있었나 거의 의아할 지경이었다.\n그러면 나는 헌병들의 손에 넘겨졌다.";

T[7]="말하고 싶지 않은 것들이 있다. 교도소에 들어오고 며칠 지나서 내 삶의 이 부분에 대해 말하고 싶지 않다는 것을 알았다.\n나중에는 그 꺼림칙함이 더 이상 중요하지 않았다. 사실 처음 며칠은 제대로 교도소에 있는 것이 아니었다.\n막연하게 어떤 새로운 일이 생기길 기다리고 있었다. 모든 것이 시작된 것은 마리의 단 한 번의 방문 이후였다.\n그녀가 편지를 보내온 날부터 — 아내가 아니기 때문에 더 이상 면회를 올 수 없다는 내용이었다 — 그날부터 나는 내 감방이 내 집이라고 느꼈고 내 삶이 거기서 끝난다고 느꼈다.\n체포되던 날 이미 여러 명의 죄수들이 있는 방에 먼저 갇혔다. 대부분 아랍인들이었다. 그들은 나를 보고 웃었다.\n그런 다음 내가 무슨 짓을 했냐고 물었다. 아랍인을 죽였다고 했더니 조용해졌다. 하지만 잠시 후 저녁이 왔다.\n그들은 내가 자야 할 돗자리를 어떻게 정리하면 되는지 설명해주었다. 한쪽 끝을 말면 베개를 만들 수 있었다.\n밤새 빈대가 얼굴 위를 기어다녔다. 며칠 후 나는 나무 침상이 있는 독방으로 옮겨졌다. 나무 변기통과 철제 대야가 있었다.\n교도소는 도시 가장 높은 곳에 있었고 작은 창문을 통해 바다가 보였다.\n어느 날 창살을 붙잡고 빛을 향해 얼굴을 내밀고 있는데 간수가 들어와 면회객이 있다고 했다. 마리일 것이라고 생각했다. 마리였다.\n면회실로 가기 위해 긴 복도를, 그런 다음 계단을, 마지막으로 또 다른 복도를 따라갔다.\n아주 넓은 창문으로 빛이 들어오는 큰 방으로 들어갔다. 방은 길이 방향으로 두 개의 큰 쇠창살로 세 부분으로 나뉘어 있었다.\n두 창살 사이에 팔에서 열 미터 간격의 공간이 있어 면회객과 죄수를 갈라놓았다.\n맞은편으로 줄무늬 원피스를 입고 얼굴이 햇볕에 탄 마리가 보였다. 내 쪽에는 열 명쯤 되는 죄수들이 있었는데 대부분 아랍인들이었다.\n마리는 무어 여자들 사이에 있었고 양옆에 면회객이 한 명씩 있었다.\n꼭 다문 입술에 검은 옷을 입은 작은 노파와 머리를 풀어 내리고 몸짓을 크게 하며 아주 큰 소리로 말하는 뚱뚱한 여자였다.\n두 창살 사이의 거리 때문에 면회객과 죄수 모두 아주 크게 말해야 했다.\n들어서을 때 벽 위에 부딪히는 목소리들의 소음, 그 유리창을 통해 하늘에서 쏟아져 방 안으로 튀어오르는 날카로운 빛이 일종의 현기증을 일으켰다.\n내 감방이 더 조용하고 어두웠다. 적응하는 데 몇 초가 필요했다.\n그래도 결국 환한 빛 속에서 분리된 각각의 얼굴을 선명하게 볼 수 있었다.\n두 창살 사이 통로 끝에 간수 하나가 앉아 있는 것을 알아챘다.\n대부분의 아랍인 죄수들과 그 가족들은 서로 마주보고 쪼그리고 앉아 있었다. 그들은 소리를 지르지 않았다.\n소란 속에서도 아주 낮게 말하며 서로의 말을 들을 수 있었다.\n그들의 둔탁한 중얼거림은 더 아래에서 출발해 머리 위에서 엇갈리는 대화들의 통주저음 같은 것을 이루었다.\n마리에게 다가가면서 이 모든 것을 아주 빨리 알아챘다. 이미 창살에 바짝 붙어 그녀는 온 힘을 다해 나에게 미소 짓고 있었다.\n매우 아름답다고 생각했지만 말할 수 없었다.\n\"어때요?\"라고 그녀가 크게 말했다. \"그냥 이렇게요.\" \"잘 있어요? 필요한 거 다 있어요?\" \"네, 다 있어요.\"\n우리는 침묵했고 마리는 여전히 웃고 있었다. 뚱뚱한 여자가 옆 죄수를 향해 소리를 지르고 있었다. 그의 남편인 것 같았다.\n솔직한 눈빛을 가진 키 큰 금발의 남자였다. 이미 시작된 대화의 연속이었다.\n\"잔이 받지 않으려 했어요\"라고 그녀가 목청껏 외쳤다. \"그래, 그래\"라고 남자가 말했다. \"나올 때 당신이 가져가라고 했는데 받지 않으려 하더라고요.\"\n마리가 레몽이 안부를 전한다고 소리쳤고 나는 \"고마워요\"라고 했다. 하지만 내 목소리가 옆 죄수 목소리에 묻혔다. 그가 \"잘 있냐\"고 물었다.\n그의 아내는 웃으며 \"이렇게 좋았던 적이 없다\"고 했다. 왼쪽 옆 죄수는 손이 가는 작은 젊은이였는데 아무 말도 하지 않았다.\n그가 그 작은 노파와 마주하고 있으며 둘이 강렬하게 서로를 바라보고 있다는 것을 알아챘다. 하지만 더 이상 그들을 관찰할 시간이 없었다.\n마리가 희망을 가져야 한다고 소리쳤기 때문이었다. \"그래요\"라고 했다. 동시에 그녀를 바라보며 원피스 너머로 그녀의 어깨를 껴안고 싶었다.\n그 얇은 천이 탐났고 그 밖에 무엇을 희망해야 할지 잘 몰랐다. 하지만 그것이 아마 마리가 말하려는 것이었을 것이다.\n그녀는 여전히 웃고 있었으니까. 그녀의 치아의 반짝임과 눈가의 작은 주름들만 보였다. 그녀가 다시 소리쳤다. \"나오면 결혼해요!\" \"그럴까요?\"라고 했다.\n하지만 뭔가 말하려고 한 것이었다. 그녀는 빠르게, 여전히 크게, 그럴 거라고, 내가 무죄 방면될 거라고, 우리는 또 수영하러 갈 거라고 했다.\n하지만 다른 쪽 여자가 자기 쪽에서 소리치며 접수처에 바구니를 맡겨두었다고 했다. 무엇을 넣었는지 하나하나 열거했다. 다 확인해야 한다고 했다.\n다 돈이 든다고. 다른 옆 죄수와 그의 어머니는 여전히 서로를 바라보고 있었다. 아랍인들의 중얼거림이 우리 아래에서 계속됐다.\n바깥에서 빛이 창문 위에서 부풀어 오르는 것 같았다.\n조금 메스꺼웠고 떠나고 싶었다. 소음이 아팠다. 하지만 다른 한편으로 마리의 존재를 조금 더 누리고 싶었다. 얼마나 시간이 흘렀는지 모른다.\n마리가 자신의 일 이야기를 하면서 계속 웃었다. 중얼거림과 외침과 대화가 엇갈렸다.\n내 옆의 그 젊은이와 노파가 서로를 바라보는 것만이 유일한 침묵의 섬이었다. 아랍인들을 데려가기 시작했다.\n첫 번째 아랍인이 나가자마자 거의 모두가 입을 다물었다. 작은 노파가 창살에 가까이 다가왔고 동시에 간수가 그녀의 아들에게 신호를 보냈다.\n그는 \"잘 계세요, 어머니\"라고 했고 그녀는 두 창살 사이로 손을 넣어 느리고 길게 작은 손짓을 했다.\n그녀가 떠나는 동안 한 남자가 모자를 손에 들고 들어와 그 자리를 차지했다. 죄수가 들어와 그들은 생기 있게 이야기했다.\n하지만 방이 다시 조용해졌기 때문에 반쯤 낮춘 목소리로. 오른쪽 옆 죄수를 데리러 왔고 아내가 더 이상 소리 지를 필요가 없다는 것을 알아채지 못한 것처럼 목소리를 낮추지 않고 말했다.\n\"몸 잘 챙겨요, 조심하고요.\" 그러더니 내 차례가 됐다. 마리가 나에게 입맞춤을 보내는 시늉을 했다. 사라지기 전에 뒤를 돌아보았다.\n그녀는 움직이지 않고 얼굴을 창살에 바짝 대고 있었다. 같은 미소가 벌어지고 조여들어 있었다.\n그로부터 얼마 지나지 않아 그녀가 편지를 보냈다. 그리고 그 순간부터 내가 말하고 싶지 않았던 것들이 시작됐다.\n어차피 아무것도 과장하면 안 된다. 그것은 다른 사람들보다 나에게 더 수월했다.\n하지만 수감 초기에 가장 힘들었던 것은 자유로운 사람의 생각들이 밀려온다는 것이었다.\n예를 들어 해변에 있고 싶고 바다를 향해 내려가고 싶은 욕구가 밀려왔다.\n발바닥 아래 첫 파도 소리를, 물속으로 들어가는 몸을, 거기서 느끼는 해방감을 상상하다 보면 갑자기 감방 벽이 얼마나 가까운지 느꼈다.\n하지만 그것은 몇 달간이었다. 그 다음에는 죄수의 생각들만 있었다. 매일 하는 안뜰 산책을 기다리거나 변호사의 면회를 기다렸다.\n나머지 시간은 아주 잘 보냈다. 그때 자주 생각했다. 만약 마른 나무 몸통 안에서 머리 위 하늘 꽃잎을 바라보는 것 외에는 아무것도 할 수 없이 살아야 했다면, 조금씩 익숙해졌을 것이라고.\n새들의 이동이나 구름의 만남을 기다렸을 것이다. 여기서 변호사의 이상한 넥타이를 기다리듯이, 또 다른 세계에서 마리의 몸을 안기 위해 토요일을 기다리듯이.\n잘 생각해보면 나는 마른 나무 속에 있는 것이 아니었다. 나보다 더 불행한 사람들이 있었다. 게다가 그것은 엄마의 생각이기도 했다.\n엄마는 그 말을 자주 했다. 무엇에든 결국 익숙해진다고.\n그래도 보통은 그 정도까지 생각이 나아가지 않았다. 처음 몇 달은 힘들었다.\n하지만 바로 내가 기울여야 했던 노력이 그 시간을 넘기는 데 도움이 됐다. 예를 들어 여자에 대한 욕망에 시달렸다. 당연한 일이었다.\n나는 젊었다. 마리를 특별히 생각하지는 않았다. 하지만 한 여자, 여자들, 내가 알았던 모든 여자들, 그들을 사랑했던 모든 상황들을 이토록 많이 생각했기 때문에 내 감방이 모든 얼굴들로 가득 차고 나의 욕망들로 채워졌다.\n어떤 의미에서 그것이 나를 불안정하게 했다. 하지만 다른 의미에서는 시간을 죽였다.\n식사 시간에 주방 담당을 데리고 오는 교도소장의 호감을 사게 됐다. 그가 먼저 여자 이야기를 꺼냈다.\n다른 죄수들이 가장 먼저 불평하는 것이 그것이라고 했다. 나도 그들과 같고 그런 처우는 부당하다고 생각한다고 했다. \"하지만\"이라고 그가 말했다.\n\"바로 그것 때문에 교도소에 넣는 거잖아요.\" \"무슨 말씀이세요, 그것 때문에요?\" \"그렇죠. 자유라는 게 그거잖아요. 자유를 빼앗는 거죠.\"\n그 생각을 해본 적이 없었다. 그 말이 맞다고 했다. \"그렇죠, 당신은 이해하는군요. 다른 사람들은 못 이해해요. 하지만 결국 스스로 해결하게 되죠.\"\n간수는 그런 다음 떠났다.\n담배도 있었다. 교도소에 들어올 때 허리띠와 신발 끈, 넥타이, 주머니 안에 있던 것들, 특히 담배를 압수당했다. 감방에 들어가서 돌려달라고 했다.\n하지만 금지되어 있다고 했다. 처음 며칠이 매우 힘들었다. 아마도 그것이 나를 가장 무너뜨린 것 같았다.\n침대 판자에서 뜯어낸 나무 조각들을 빨았다. 하루 종일 끊임없는 메스꺼움을 끌고 다녔다.\n아무에게도 해가 없는 것을 왜 빼앗아 가는지 이해할 수 없었다. 나중에 그것도 처벌의 일부라는 것을 이해했다.\n하지만 그때쯤에는 담배를 피우지 않는 데 익숙해져 있었고 그 처벌은 더 이상 나에게 처벌이 아니었다.\n이 성가심들을 제외하면 그다지 불행하지 않았다. 문제는 다시 한번 시간을 죽이는 것이었다.\n기억하는 법을 배운 순간부터 더 이상 지루함을 느끼지 않게 됐다. 가끔 내 방을 생각하기 시작했다.\n상상 속에서 한쪽 구석에서 출발해 길에 있는 모든 것을 속으로 헤아리며 제자리로 돌아왔다. 처음에는 금방 끝났다.\n하지만 다시 할 때마다 조금 더 길어졌다. 가구 하나하나를 기억하고, 그 위의 물건 하나하나를, 각 물건의 세부들을, 세부들 자체에 대해서는 박혀 있는 것이나 균열이나 깨진 가장자리의 빛깔이나 질감을 기억했기 때문이었다.\n동시에 목록의 실을 놓치지 않고 완전한 열거를 하려고 노력했다. 몇 주가 지나자 내 방에 있는 것들을 헤아리는 것만으로 몇 시간을 보낼 수 있었다.\n더 생각할수록 기억에서 낯설고 잊혔던 것들이 더 많이 나왔다. 단 하루를 살았던 사람도 교도소에서 백 년을 충분히 살 수 있다는 것을 이해했다.\n지루하지 않을 만큼 충분한 기억이 있을 것이었다. 어떤 의미에서는 이점이었다.\n잠도 있었다. 처음에는 밤에 잠을 잘 못 자고 낮에는 전혀 자지 못했다. 조금씩 밤이 나아졌고 낮에도 잘 수 있게 됐다.\n마지막 몇 달 동안은 하루에 열여섯 시간에서 열여덟 시간을 잤다.\n그러면 식사, 생리적 욕구, 기억, 그리고 체코슬로바키아인의 이야기로 여섯 시간이 남았다.\n사실 침요와 침대 판자 사이에서 천에 거의 달라붙어 있는 오래된 신문 조각을 발견했다. 누렇게 바래 투명했다.\n도입부가 없는 사건 기사가 실려 있었는데 체코슬로바키아에서 일어난 일인 것 같았다. 어떤 남자가 체코 시골을 떠나 돈을 벌러 갔다.\n이십오 년 후 부자가 돼 아내와 아이를 데리고 돌아왔다. 그의 어머니는 여동생과 함께 고향 마을에서 호텔을 운영하고 있었다.\n그들을 놀래켜 주려고 아내와 아이를 다른 숙소에 남겨두고 어머니 집으로 갔다. 어머니는 들어온 그를 알아보지 못했다.\n장난 삼아 방을 잡는다는 생각을 했다. 돈을 보여주었다. 밤에 어머니와 여동생은 그를 망치로 때려 죽이고 시체를 강에 던졌다.\n다음 날 아침 아내가 와서 자신도 모르게 나그네의 신원을 밝혔다. 어머니는 목을 매달았다. 여동생은 우물에 뛰어들었다.\n이 이야기를 수천 번 읽었을 것이다. 한편으로는 있을 법하지 않은 이야기였다. 다른 한편으로는 자연스러웠다.\n어차피 나그네가 어느 정도 그것을 받아 마땅했고 장난을 치면 안 된다는 생각이 들었다.\n이렇게 수면의 시간들, 기억들, 사건 기사 읽기, 빛과 어둠의 교대로 시간이 흘러갔다.\n교도소에 있으면 결국 시간 감각을 잃게 된다는 것을 읽은 적이 있었다. 하지만 그것이 나에게는 그다지 의미가 없었다.\n하루가 동시에 얼마나 길고 짧을 수 있는지 이해하지 못했다. 살아가기에는 길었지만 너무 늘어져서 결국 서로 흘러넘쳤다. 그러면서 이름을 잃었다.\n어제나 내일이라는 말만이 나에게 의미를 간직하고 있었다.\n어느 날 간수가 내가 거기 온 지 다섯 달이 됐다고 했다. 믿었지만 이해하지 못했다.\n나에게는 항상 똑같은 하루가 감방 안에 밀려들고 똑같은 일을 계속하는 것이었다. 간수가 떠난 후 나는 철제 밥그릇에서 내 얼굴을 바라보았다.\n웃으려 해도 표정이 여전히 진지해 보이는 것 같았다. 밥그릇을 앞에서 흔들어 보았다. 웃었더니 여전히 같은 엄격하고 슬픈 표정이었다.\n낮이 저물어가고 있었다. 그 시간이 찾아왔다. 말하고 싶지 않은 그 시간. 이름 없는 시간.\n저녁의 소리들이 교도소 모든 층에서 침묵의 행렬 속으로 올라오는 시간.\n창문 가까이 다가가 마지막 빛 속에서 한 번 더 내 얼굴을 바라보았다. 여전히 진지했다.\n그 순간 나도 진지했으니 놀랄 것도 없었다. 하지만 동시에, 몇 달 만에 처음으로, 내 목소리를 또렷이 들었다.\n오래전부터 귀에 울리던 그 목소리라는 것을 알아챘고 그 내내 혼자 말하고 있었다는 것을 이해했다.\n그때 엄마 장례식에서 간호사가 했던 말이 생각났다. 아니었다. 출구는 없었다. 교도소의 저녁이 어떤 것인지 아무도 상상할 수 없었다.";

T[8]="결국 여름은 여름을 아주 빠르게 대체했다고 말할 수 있다. 처음 더위가 오를 즈음 나에게 뭔가 새로운 일이 생길 것이라는 것을 알고 있었다.\n내 사건은 중죄 재판소의 마지막 회기에 올라 있었고 그 회기는 6월에 끝날 것이었다. 재판이 열렸다. 밖에는 햇볕이 가득했다.\n변호사는 이틀이나 사흘 이상 걸리지 않을 거라고 했다. \"게다가\"라고 그는 덧붙였다.\n\"재판부가 서두를 겁니다. 당신 사건이 이번 회기에서 가장 중요한 것이 아니니까요. 그 다음에 존속 살인 사건이 있어요.\"\n아침 일곱 시 반에 데리러 왔고 호송차가 나를 법원으로 데려갔다. 헌병 둘이 어둠 냄새가 나는 작은 방으로 안내했다.\n문 앞에 앉아 기다렸다. 문 너머로 목소리들, 부름 소리들, 의자 끄는 소리들, 온갖 소란이 들렸다.\n공연이 끝난 뒤 무도회를 위해 홀을 정리하는 동네 축제 같은 느낌이었다.\n헌병들이 재판부를 기다려야 한다고 했고 그중 한 명이 담배를 권했다. 거절했다. 잠시 후 \"떨리느냐\"고 물었다. 아니라고 했다.\n사실 어떤 의미에서는 재판을 보는 것이 흥미로웠다. 살면서 한 번도 기회가 없었다. \"그렇죠\"라고 다른 헌병이 말했다. \"하지만 결국 지치게 되죠.\"\n잠시 후 방 안에서 작은 벨이 울렸다. 그들이 수갑을 풀어주었다. 문을 열고 피고인석으로 안내했다. 방청석이 꽉 차 있었다.\n블라인드에도 불구하고 햇볕이 군데군데 스며들었고 공기는 이미 숨막힐 듯했다. 유리창은 닫힌 채였다. 자리를 잡았고 헌병들이 양옆에 섰다.\n그때 내 앞에 얼굴들이 한 줄로 늘어선 것이 보였다. 모두 나를 바라보고 있었다. 배심원들이라는 것을 알았다.\n하지만 그들을 서로 구분할 수 없었다. 인상 하나만 남았다. 전차 좌석 앞에 있는 것 같았고 이 익명의 승객들 모두가 새로 탄 사람의 우스꽝스러운 점을 찾아내려 살피는 것 같았다.\n물론 어리석은 생각이었다. 여기서 그들이 찾는 것은 우스꽝스러운 점이 아니라 범죄였으니. 하지만 그 차이는 크지 않았다. 어쨌든 그런 생각이 들었다.\n이 막힌 방 안의 모든 사람들에 또 조금 어지러웠다. 다시 법정을 둘러보았지만 어떤 얼굴도 구분할 수 없었다.\n처음에 이 모든 사람들이 나를 보러 몰려왔다는 것을 제대로 알아채지 못했던 것 같다. 보통 사람들은 나라는 사람에 관심을 두지 않았다.\n이 모든 소동의 원인이 내가 된다는 것을 이해하는 데 노력이 필요했다. 헌병에게 \"사람이 정말 많네요\"라고 했다.\n신문 때문이라고 했고 배심원석 아래 테이블 근처에 서 있는 한 무리를 보여주었다. \"저기 있어요\"라고 했다.\n\"누가요?\"라고 물었고 그는 \"기자들\"이라고 다시 말했다. 그는 기자 중 한 명과 아는 사이였는데 그때 그것을 보고 우리 쪽으로 다가왔다.\n이미 나이가 든 호감 가는 남자였고 얼굴이 약간 일그러져 있었다. 헌병과 아주 다정하게 악수를 했다.\n그 순간 모두가 만나고 인사를 나누고 대화를 하는 것이 눈에 들어왔다. 마치 같은 세계의 사람들끼리 만나서 즐거운 클럽 같았다.\n그래서 내가 느꼈던 이상한 인상, 내가 너무 많은 사람, 약간 침입자 같은 느낌도 이해됐다. 하지만 기자는 웃으며 나에게 말을 걸었다.\n잘 되길 바란다고 했다. 고맙다고 했더니 덧붙였다. \"아시다시피 우리가 당신 사건을 좀 키웠어요. 여름은 신문에 비수기거든요. 당신 사건하고 존속 살인 사건만이 볼 만한 것이었어요.\"\n그런 다음 방금 떠나온 무리에서 살찐 족제비를 닮은 검은 테 커다란 안경을 쓴 작은 남자를 가리켰다. 파리 신문의 특파원이라고 했다.\n\"그는 당신 때문에 온 게 아니에요. 존속 살인 사건을 취재하러 왔는데 당신 사건도 함께 타전해달라는 요청을 받은 거죠.\"\n하마터면 고맙다고 할 뻔했다. 하지만 우스꽝스러울 것 같았다. 그는 다정하게 손을 흔들며 우리를 떠났다. 몇 분을 더 기다렸다.\n변호사가 법복을 입고 다른 동료들에 둘러싸여 도착했다. 기자들에게 다가가 악수를 했다. 농담을 나누고 웃으며 완전히 편안해 보였다.\n법정에서 벨이 울릴 때까지. 모두가 자리로 돌아갔다. 변호사가 내게 와서 악수를 하고 받는 질문에 간략하게 대답하고, 스스로 먼저 나서지 말고, 나머지는 자신에게 맡기라고 조언했다.\n왼쪽에서 의자를 뒤로 끄는 소리가 들렸다. 빨간 법복을 입고 코안경을 쓴 키 크고 마른 남자가 법복을 조심스럽게 접으며 자리에 앉는 것이 보였다.\n검사였다. 법원 집행관이 재판부를 알렸다. 동시에 커다란 선풍기 두 대가 윙윙거리기 시작했다.\n검은 옷 둘, 빨간 옷 하나, 판사 셋이 서류를 들고 들어와 홀을 내려다보는 단상으로 아주 빠르게 걸어갔다.\n빨간 법복을 입은 남자가 가운데 의자에 앉아 앞에 법관모를 놓고 조그만 대머리를 손수건으로 닦은 다음 개정을 선언했다.\n기자들은 이미 펜을 손에 들고 있었다. 모두 무관심하고 약간 비웃는 듯한 표정이었다.\n하지만 그중 하나, 훨씬 어리고 회색 플란넬에 파란 넥타이를 한 사람이 펜을 앞에 놓고 나를 바라보고 있었다.\n약간 비대칭인 얼굴에서 정의할 수 없는 것은 아무것도 표현하지 않으면서 나를 주의 깊게 살피는 두 눈, 아주 맑은 두 눈만이 보였다.\n나 자신에게 바라보이는 이상한 느낌이 들었다. 어쩌면 그 때문에, 또 그 자리의 관례를 몰랐기 때문에 이후에 일어난 일들, 배심원 추첨, 판사장이 변호사와 검사와 배심단에게 던진 질문들 — 그때마다 배심원들의 머리가 모두 동시에 법원 쪽으로 돌아갔다 — 기소장의 빠른 낭독, 거기서 지명이나 인명들이 귀에 들어오고, 내 변호사를 향한 새로운 질문들, 이것들을 그다지 잘 이해하지 못했다.\n그런데 판사장이 증인 출석을 명하겠다고 했다. 집행관이 이름들을 읽었고 그것이 내 주의를 끌었다.\n조금 전까지 형태 없이 뭉쳐 있던 방청석에서 양로원 원장과 수위, 토마 페레 노인, 레몽, 마송, 살라마노, 마리가 하나씩 일어나 옆문으로 사라졌다.\n마리가 불안한 작은 신호를 보냈다. 아직 그들을 더 일찍 알아채지 못했던 것이 의아했을 때, 마지막으로 이름이 불리자 셀레스트가 일어섰다.\n그 옆에 식당의 그 작은 여자가 재킷 차림에 정확하고 단호한 모습으로 있는 것이 보였다. 그녀는 강렬하게 나를 바라보고 있었다.\n하지만 더 생각할 시간이 없었다. 판사장이 발언했다. 본격적인 심리가 이제 시작될 것이라고 했고, 방청객들에게 조용히 해달라고 당부하는 것은 불필요하다고 했다.\n그의 역할은 객관적으로 다루고 싶은 이 사건의 심리를 공정하게 진행하는 것이라고 했다.\n배심단이 내릴 평결은 정의의 정신으로 내려질 것이며 어떤 경우에도 작은 소란에도 퇴정을 명하겠다고 했다.\n열기가 높아졌다. 방청석 사람들이 신문으로 부채질하는 것이 보였다. 구겨지는 종이의 작고 연속적인 소리가 났다.\n판사장이 신호를 보내자 집행관이 배심원 세 명이 바로 사용한 짚으로 엮은 부채 세 개를 가져다주었다.\n내 심문이 바로 시작됐다. 판사장은 차분하게, 심지어 약간 다정하게 느껴질 만한 어조로 질문했다. 다시 인적 사항을 말하게 했다.\n짜증이 났지만 생각해보니 그것도 꽤 자연스러운 일이었다. 엉뚱한 사람을 재판하는 것은 너무 심각한 일이었으니.\n그런 다음 판사장은 내가 한 일의 경위를 다시 이야기하며 세 문장마다 나에게 \"맞습니까?\"라고 물었다. 매번 변호사의 지시대로 \"그렇습니다, 재판장님\"이라고 했다.\n판사장이 경위 설명에 아주 꼼꼼했기 때문에 오래 걸렸다. 그 내내 기자들이 받아 적었다.\n그중 가장 어린 기자와 작은 자동인형의 시선이 느껴졌다. 전차 좌석이 모두 판사장을 향해 있었다.\n판사장이 기침을 하고 파일을 넘기더니 부채질을 하며 나를 돌아보았다.\n그는 내 사건과 언뜻 무관해 보이지만 어쩌면 아주 밀접한 질문들을 해야 할 것이라고 했다.\n엄마 이야기를 또 꺼내려는 것을 알아채는 동시에 그것이 얼마나 짜증나는지가 느껴졌다. 왜 엄마를 양로원에 넣었냐고 물었다.\n돈이 없어서 돌봐드릴 수 없었기 때문이라고 했다. 그것이 나에게 개인적으로 힘들었냐고 물었다.\n엄마도 나도 서로에게서 더 이상 아무것도 기대하지 않았고 사실 누구에게서도 그랬으며 우리 둘 다 새로운 생활에 익숙해져 있다고 했다.\n
